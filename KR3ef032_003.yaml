body:
  text: 卷三傷寒變症傷寒有本病有變病本病者如太陽有頭痛項強陽明有潮熱譫語是也治法不外本經故即附於本經之下變病者本不應有此病只因治不中窾或遷延日久而變生諸症如蓄血結胸等症是也治法不得不隨症用藥因病施治用列於左以盡傷寒之變衄血新法衄血者血從鼻中來也傷寒衄血其因有三太陽失表熱瘀於經而衄者有頭疼目瞑之徵宜清解之羚羊角黑梔子連翹赤芍丹皮元參薄荷黑荊芥鮮生地牛膝澤瀉茅根之屬降之清之不可再汗也陽明失下熱瘀於裡而衄者有漱水不欲咽之徵宜下解之生地赤芍丹皮牛膝楂肉桃仁大黃之屬下之清之此釜底抽薪大黃不妨重用也更有溫熱之症藥宜涼解誤用辛溫而動經血亦能致衄宜清血分犀角連翹赤芍丹皮元參生地牛膝茜根茅根之屬清之解之如衄後身涼脈靜邪從紅汗而解也若衄後病勢反劇者更傷其陰也大為危候其衄勢必重須大劑六味飲加麥冬五味主之衄止則生有衄勢太甚陽隨陰走四肢厥冷者六味加牛膝肉桂以鎮之仲景論云若頭痛者必衄宜桂枝湯此桂枝湯補在上文當鬚髮汗下又云劇者必衄衄乃解麻黃湯主之此麻黃湯補在上文當發其汗下乃古人倒筆法是申明致衄之由於失表非謂衄後服麻黃桂枝也觀下文衄家不可發汗之戒義可知矣吐血新法傷寒吐血每因失治所致有因太陽感寒無汗惡寒頭痛發熱寒邪外束法當發汗若失於表散陽氣不得外泄則逆走陽絡絡血妄行則致吐血或由其人素有血症寒邪犯肺而咳震傷血絡亦致咳血均當以清疏營衛表散寒邪為治古人皆以麻黃桂枝等湯治血症是也然未免太峻當小其制用羌活蘇葉荊防薄荷等以去風散寒橘紅杏仁以降氣芍藥甘草以安營微兼渴者少佐黃芩以清熱則營衛之邪解散自然嗽止身涼血不治自止矣邵評此二方是風寒初起邪在於表用為表散之劑至見吐血衄血其邪已化熱入里豈有再用辛溫表散之理麻桂二方斷非治血之方古人所言風寒在表之時不用麻桂發表以致邪郁成熱熱入傷營分而吐血衄血非見血之後再用麻桂止血也學者切勿以麻桂二湯治血症致誤大事此方實治寒邪不從表達鬱而成熱熱入於裡營絡傷而吐血之正法若內有伏火外感寒邪熱被寒束火逼絡血而致衄血咳血者外症亦惡寒發熱但兼口渴舌乾為異治宜辛涼清解營衛須用川羌桂枝石膏羚羊角黑梔丹皮黃芩桑杏之屬散之清之次用和血清絡之品調之邵評此與上條合是傷寒而成吐血上條寒邪在表失於表散寒鬱化熱入里傷絡而吐血此條內有伏火寒束於外火逼傷絡而吐血學者最宜甄別有因風溫之邪誤汗動血有因三陽熱盛沸騰經血皆致吐衄凡見眼閉目紅神昏語亂煩躁漱水皆熱傷血絡之症也宜犀角生地丹皮山楂川鬱金淨銀花赤芍連翹川連之屬以清絡中之瘀熱大便祕者加製大黃尤妙邵評此風溫症誤用辛溫發汗熱盛傷營而吐衄之正法與前二條傷寒吐衄不同若兼胸滿而痛者血瘀於絡也當攻之犀角生地歸尾桃仁赤芍楂肉青皮降香大黃之屬行之清之邵評此治瘀血阻於絡中之正法有誤發少陰之汗動其經血從口鼻耳目中出者名下厥上竭不治有暴吐臭腐之血名內潰不治蓄血述古凡太陽病不解其邪由經入腑熱結膀胱則血凝蓄血瘀則心氣結其人故如狂血自下者愈邪從血下而解也其外不解者當先解其外宜桂枝湯外已解但少腹急痛者是蓄血也桃仁承氣湯下之邵評太陽邪熱不從表出隨經入腑腑者膀胱也腑有餘熱則經中之血與熱相搏蓄於下焦名曰蓄血熱邪上熏於心故其人如狂若血不結而下出則熱隨血下而愈如不愈而少腹急結者必用攻法以去之欲用攻法須先審其外症如外不解而攻之血雖去而外邪復入於裡也故必先解外邪外邪已而但少腹急痛者是蓄血也用桃仁承氣湯以下血散熱乃先表后里之治法也然此治蓄血之輕症太陽病六七日表症仍在脈微而沉者病邪向里也反不結胸者熱結下焦也其人發狂少腹硬滿小便自利者以太陽隨經瘀血蓄於裡也抵當湯下之則愈同一蓄血桃仁承氣治瘀血將結之時抵當治瘀血已結之後邵評太陽六七日表症仍在而脈微沉是經邪陷入太陽之府也反不結胸而發狂其邪不在上而熱瘀下焦血分也夫蓄血而致發狂熱勢攻心非用單刀直入之將必不能斬關取勝是舍抵當逐血一法更有何藥破其堅壘哉然此蓄血之重症故用抵當湯直攻其血而不顧表症與上條先表后里不同又評此條經文表症仍在下當有而反下之之句誤下熱邪自經入腑結於膀胱而下焦蓄血不成血結胸病則知覺昏昧故發狂此經病傳腑表病傳裡氣病傳血上焦病而傳下焦也少腹居下焦為膀胱之室瘀血留結故硬滿小便自利者病不在氣而在血也下其血而氣自舒攻其里而表自解矣太陽病身黃脈沉結少腹硬小便不利者為無血也此濕熱不行之故小便自利其人如狂者血症諦也邵評身黃脈沉結少腹硬水病血病皆有之小便不利知水與熱結為無血而有水五苓散症也若小便自利其人如狂乃熱與血蓄於下焦為有血無水抵當湯症也故太陽熱入膀胱有水結血結之分也陽明病其人喜忘者必有蓄血蓋心主血血凝則心氣結而失其官矣故喜忘此素有瘀血非傷寒所得者屎雖硬大便反易其色必黑以浮血隨便而下故也俱宜抵當湯下之邵評此借發黃小便不利以辨蓄血之小便自利瘀血是病根喜忘是病情此陽明未病前症夫心為血之主瘀血與熱蓄積既久上干於心故令喜忘屎硬者大便當難今大便反易而黑色是宿血瘀蓄之故以此大便反易之機因究其色之黑乃得其病之根因知前此喜忘之病情耳當用抵當湯入血破結之劑下其瘀血血去熱亦不留矣傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可峻藥宜抵當丸緩下其血以上述仲景論兼參來蘇集類方注釋之邵評有熱身熱而表症仍在也少腹滿熱入下焦也但滿而不硬其人未發狂何以知其有血但熱入下焦而少腹滿應小便不利今小便利預知其有蓄血也蓋少腹之滿比硬稍輕當小其制故用丸以緩之又評此預蓄血亦以小便之利與不利驗之上條以便易而黑定其為蓄血此條以小便反利辨其為蓄血審症之精極當細玩蓄血一症雖病在血分亦須分別陰陽治之如血瘀上焦為陽血蓄下焦為陰太陽失表熱瘀於裡血蓄下焦為陽太陽誤下陽氣下陷血蓄下焦為陰邵評蓄血有陰陽之分在上焦者為陽在下焦者為陰上焦由太陽失表熱與血瘀下焦由太陽誤下陽氣下陷上焦蓄血因不得汗不能發斑而蓄血也其脈人迎必緊緊者數而有力之象也外症面紅舌燥發躁欲狂或頭搖目瞪大便下血水兩手除食指之外其餘各指皆抽掣是也宜犀角桃仁生地赤芍歸尾丹皮丹參鬱金之類清之行之邵評蓄血上焦有陽症而無陰症治以清熱破血之法蓄血下焦有陰症陽症之不同非比上焦蓄血有陽症而無陰症也下焦陽症由邪熱內入下焦熱邪與瘀血蓄結膀胱用攻血攻下治之下焦陽症蓄血即仲景所稱熱結膀胱之症桃仁大黃之屬下之是也若下焦陰症蓄血乃因誤下陽氣下陷陰血受傷血因寒而凝也其見症面白目青眉皺目瞪寒戰口噤舌苔白滑大便下血水兩手除食指之外其餘各指皆抽掣是也宜溫補之如人參附子白朮當歸肉桂桃仁升麻炙草之類溫補以升陽氣如服藥後寒噤稍止一二時復作者此藥力不及再進之以續陽氣寒噤得止者生不已則死參傷寒第一書凡蓄血症大便下血水見糞者生不見者死邵評下焦陰症蓄血由於誤下正氣受傷陽虛氣陷陰血凝蓄此陰寒症也與陽邪內結而蓄血者大為不同醫者極當留心熱入血室附婦人傷寒當經水適來適斷之時熱邪乘虛而入血室其證晝日明瞭夜則譫語如見鬼狀若發熱惡寒日輕夜重小腹脹滿者血為熱瘀也當用柴芩紫蘇荊芥當歸川芎益母香附楂肉丹參丹皮等和血散邪藥下咽即得汗而解有汗者為表虛前方去紫蘇加桂枝和解之寒熱如瘧者前方亦加桂枝和解之若厥而下利者此非熱邪乃為寒邪所襲也前方去黃芩加桂枝乾薑溫散之煩渴者屬裡熱去紫蘇香附加黑梔子清之若小腹硬滿作痛當以逐瘀為急前方去紫蘇加桃仁紅花延胡牛膝等攻以行之合參金鑑第一書邵評血室者營血停留之所經脈集會之處即衝脈所謂血海是也其脈起於氣街並少陰之經挾臍上行至胸中而散婦人經水來則血下行血下則經脈空虛熱邪乘虛而入血室也晝屬陽而主氣暮陰而主血熱邪入血室而為病故晝輕而暮重夫血室雖衝脈所屬而心君屬血室之主熱入其室其主必昏故有譫語肝藏血而藏魂血去熱入則肝虛魂不安而妄見故如見鬼狀少腹是沖之部分邪入於衛沖血室血與熱邪積蓄於中故小腹脹滿也用散邪行血之劑邪去經調其病自解又評熱入血室而譫語其病由肝故仲聖有刺期門穴法以瀉肝之募恐人見譫語誤認陽明胃腑之症故又戒曰無犯胃氣及上焦必自愈痞述古注釋參來蘇集痞與結胸同為硬滿之症當以痛為辨滿而硬痛為結胸為實熱宜陷胸法治之滿而不痛為痞滿為虛熱宜用瀉心法治之然結胸未甚亦以瀉心法治之足矣蓋實者為結胸虛者為痞滿兩症兼參可也邵評痛者為結胸不痛者為痞痞屬虛而無形結胸為實而有形也論曰傷寒五六日嘔而發熱柴胡症具而以他藥下之但滿而不痛此為痞宜半夏瀉心湯邵評此少陽病誤下而成痞結之症也嘔而發熱小柴胡症也設有下症亦宜大柴胡而以他藥下之誤矣此因誤下寒反入里阻君火之熱化而結無形氣痞故用乾薑散寒芩連泄熱半夏散結止嘔參草補胃氣以助半夏開寒結而痞自解傷寒中風醫反下之其人下利日數行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故使硬也甘草瀉心湯主之邵評邪盛於表醫誤下之而下利腹鳴完穀不化腸胃之裡虛可知矣心下痞硬而滿乾嘔而心煩不得安是表間邪熱因誤下而內陷於心間上攻而復下注非中氣之空虛何致致邪氣之淫溢若此則痞為虛痞硬為虛硬滿為虛滿也明矣醫者不識是虛以為結熱未盡而復誤下之是已虛而益虛也虛則胃不化而邪上逆痞滿更加矣故復申明上文之症曰此非結熱以胃中虛客氣上逆故使硬也此痞因胃虛水氣上逆火氣不得下降結而為痞故以甘棗和胃之陰半夏啓胃之陽坐鎮中州不使下焦客氣上逆仍用芩連以瀉已逆痞氣傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯邵評大下復汗正虛邪入而心下痞似宜治痞然外有惡寒之症邪雖入里而表猶未解內外俱病不可輕攻其痞當先以桂枝湯解其表後用大黃黃連瀉心湯攻其痞不然恐痞不解而表邪復入於裡病益增重耳此先表而後里之治法至大黃瀉心湯治君火亢甚不得下交於陰而成痞也此君火亢甚不得下交於陰而成痞故藥不煎而泡欲其輕揚清淡以滌之用其氣不用其味也心下痞大便硬心煩不得眠惡寒汗出者附子瀉心湯主之邵評痞而便硬心煩不眠里之邪熱有餘也而復惡寒汗出者表陽虛而正不足也故用三黃以瀉熱加附子以復其陽氣也雖然此邪熱有餘而正陽不足設治邪而遺正則惡寒益甚或補陽而遺熱則痞滿愈增不得已用寒熱並投補瀉互治之法三黃寒而生用附子熱而煮汁生熟異性寒熱異氣合和與服各奏其功亦一片苦心也此熱在三焦故用三黃泄熱惡寒汗出又慮亡陽故即用附子徹上下以溫經附子別煮取汁者取三黃之氣輕取附子之力重也傷寒汗解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯邵評汗解之後胃中不和既不能運行真氣又不能消化飲食症見心下痞硬乾嘔食臭是中焦不和不能消穀故令人噫噯脅下有水氣腹鳴下利是土虛不制水而水邪為患實則胃氣不和是太陽之餘熱挾陰寒之水氣內侵而處其中也故以瀉心開痞主生薑散水胃藏津液發汗則津液亡故胃不和而成痞生薑能生髮胃中升騰之氣故名湯佐以人參甘棗則益胃氣以生津液乾薑半夏破陰以導陽芩連瀉陽以交陰通方破滯宣陽亦瀉心之義邵評觀此條可見痞症不皆由誤下而成有汗後津液干脾胃氣虛陰陽不得升降而成痞者用生薑瀉心湯以開痞清濕熱兼助脾胃之氣也傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆花代赭石湯主之邵評發汗吐下火邪已去而心下痞硬噫氣不除者心氣大虛表寒乘虛結於心下心氣不降而上出於口也乃中虛胃弱而不和痰氣上逆之症用此湯補中和胃而止虛逆方中旋覆花味鹹咸以軟堅行水下氣代赭味苦質重而降逆氣半夏生薑辛溫而消痰行水參甘大棗甘溫補中而和胃氣也此因三法後心氣虛不可復用瀉心故制此湯以散結消痞痞滿新法葉案按胃居心下心下痞即胃痞也不曰瀉胃而曰瀉心恐人誤認為傳入陽明而以治陽明法治之也傷寒誤治成痞五瀉心法已盡但此外尚有暑濕痰食痧穢凝結成痞者亦宜兼參如膈悶心煩痞滿而喘急者熱痰內閉也宜梔豉湯加川鬱金栝蔞仁枳實杏仁之類開之宣之邵評此痰熱內結於肺之正法如脘中痞悶而兼頭脹目黃脈象濡澀者此暑濕伏邪凝滯胸中也宜清疏中宮川連枳實半夏厚朴鬱金草蔻滑石粉茯苓皮之類邵評此暑邪挾濕凝滯肺胃之正法如脘中痞悶身熱口渴舌苔白燥者此暑邪阻於氣分也宜滑石粉川鬱金枳實橘紅黃芩知母桔梗竹茹之類以清氣分之熱痞自開矣邵評此暑熱入於肺衛之正法如脘痞滿悶舌苔白膩脈濡緩口不渴者此濕邪阻於氣分也法宜開泄用二陳湯去甘草加茅朮白蔻鬱金枳實厚朴杏仁通草之屬以開濕結痞滿自除若觸穢暑兼挾食滯脘中痞滿飽悶嘔惡腹中板痛亦宜清疏中宮如廣藿梗川鬱金川連枳實白蔻厚朴木香汁生楂肉萊蔔子之類邵評此暑濕挾食滯伏中宮中上二焦又吸穢濁阻滯氣機之正法若穢暑挾食結於下焦二便不通胸腹脹滿痛楚難忍者非枳實大黃承氣輩不除邵評此暑穢食滯結於下焦之正法若怒動肝火或怒後加餐而成痞滿或結於左脅之下舌黃口渴脈弦數或兼脅痛吞酸左金加川鬱金枳實之類主之邵評此肝火挾食阻滯氣機而成痞滿之正法若暑濕之邪未清誤投補劑以致胸膈脹滿脘中痞悶硬痛幾成結胸者亦宜瀉心法治之如二陳枳實厚朴川連楂肉鬱金萊蔔子木香汁之類邵評此暑濕未清誤用補藥與邪相結幾成重病之正法結胸述古傷寒病發於陰下之太早則成痞硬病發於陽下之太早則成結胸均為表邪乘虛入里而成硬滿按之不痛者為痞滿屬虛邪硬滿按之大痛者為結胸實邪也因熱入有淺深故結胸分大小從心下至小腹硬滿而痛不可按者為大結胸其脈沉緊其症但頭汗出項強如痙此由太陽失表而誤下邪入胃中與不得化汗之水氣相結而成也夫太陽寒水之氣結於陽明當以大陷胸湯猛烈之劑竟從陽明攻陷大黃陷熱結甘遂攻水結佐以芒硝之咸制二者之苦不令直行而下使其引入硬滿之處軟堅破積導去熱邪邵評此推原結胸與痞之故下之太早一句是此二症之關鍵病發於陰誤下而熱不得散則為痞硬病發於陽誤下而熱邪內陷則為結胸所以然者病邪在經本當發散而反下之裡氣則虛邪氣因入而與飲相搏為病也但痞滿而按之不痛者乃無形熱結故曰虛邪硬滿而按之大痛者乃有形之邪熱結於胸中故曰實邪若大結胸邪入深故硬痛從心下至小腹小結胸邪入淺故痛只在心下此明所以成結胸與痞之因結胸有大小之分痞與結胸有虛實之別誤下而邪內入水邪結於胸脅熱邪入於腸胃為熱實結胸以致心下小腹痛不可按脈沉為邪入里緊為水氣內結但頭汗出是水熱內結而氣上蒸也熱與水結胸膈緊實上連於項但仰而不能俯如痙狀也如此脈症由於太陽經病失表而誤下熱入內實與水相結水結於內則熱不能散熱實於內則水不能行故用大陷胸湯甘遂以直攻其水硝黃以大下其熱也又評此脈症不異於寒實結胸故審其為病發於陽誤下熱入者方可用大陷胸湯若不誤下則熱不入熱不入則水不結若胸脅無水氣則邪入陽明而成胃實之症不作結胸矣此因誤下熱入太陽之邪隨熱陷入與水相結而成熱實結胸心下至小腹痛滿而不可按其脈又沉緊似是大承氣症然滿痛雖至小腹而尚未離心下是水熱互結與陽明之燥屎不同故用甘遂破飲而不宜枳朴之散氣也若誤用承氣水結不散其變不可勝言矣且大結胸著重在熱實外雖無熱內有大熱也太陽誤下成熱實結胸太陰誤下成寒實結胸所謂病發於陽誤下熱入而成結胸也如止在心下不及胸腹按之知痛不甚硬者為小結胸其脈浮滑是水與熱邪凝結痰飲留於胸膈脈絡間也故用小陷胸湯以陷中焦脈絡之邪使從無形之氣而散栝蔞生於蔓草故能入絡以陷膈上之痰半夏成於陰月故能通陰以散結氣黃連以陷胸中之熱熱解痰開其結自散邵評小結胸症其痛止在心下不及脅腹按之不硬者是痰熱搏結於心下不因妄下而成也視大陷胸輕故立方分大小其脈浮滑浮為熱而滑為痰也痰熱結於中上二焦用小陷胸湯黃連之清熱輕於大黃之攻下半夏之滌痰輕於甘遂之破水栝蔞之潤利輕於芒硝之軟堅而其開除胸中之結邪之意無不同也且小結胸痰熱阻於上中二焦乃無形之氣結水熱結於中下二焦是有形之實結結胸有輕重故立方分大小若結胸身有微熱頭自汗出胸中漉漉有聲者水結胸也大陷胸丸主之邵評水結胸身有微熱頭自汗出是水氣熱結於胸脅之間而上蒸也漉漉有聲者水與氣結而氣滯不利也用硝黃以下微熱葶杏以開氣甘遂以泄水也且水結胸水結因於氣結氣結因於熱結以大陷胸丸破結泄水蕩滌邪熱此病在上膈故加葶杏以開氣閉若結胸硬滿而痛漱水不欲咽者血結胸也由於血瘀不能衄解或已衄未盡或婦人經水適來適斷皆能成之內實者桃仁承氣攻之未實者和血散結治之合參來蘇集選注金鑑邵評此條血結胸由瘀血邪熱凝結而成有已實未實之分宜辨別施治太陰腹滿時痛誤下之成寒實結胸無熱症者濕氣與寒邪所結之痰飲也三物白散主之參來蘇集邵評太陰寒邪在裡而誤下之寒邪與寒藥相結成寒實結胸與結胸實熱者不同無熱症者不四肢煩疼也此非陽邪無口燥煩渴等見症故用三物白散溫下之劑以散寒而除實也若飲食在胃未當下而早下之胸膈高起手不可近此食因寒凝而成結胸宜理中加枳實厚朴之類溫胃和中不可進寒涼參奧旨邵評食停胃中在中上二焦未化糟粕切不可下必待其食化成屎而滯於腸胃之間者方可下之若早下之寒藥與食凝結中宮而成食滯結胸之症是必用溫運中陽化滯散結之劑使中陽健運食化而寒結自開矣結胸又有不因誤下而成者如論云傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之是也此不云下早但云熱實乃傷寒實邪傳裡不因誤下而自結聚於胸者也治法總當以痞滿門諸法酌其輕重從乎緩治為當再用外罨法以解散胸中實邪取效尤捷參景嶽邵評此熱實二字最宜著眼熱邪傳裡填實胸中而內結既熱且實脈復沉緊似是大承氣症然結在心下而不在腹中雖按之石硬而痛亦是水食互結於胸膈與腸胃之燥糞迥別故用大陷胸湯硝黃以下其結熱甘遂以破其水飲也然此為大結胸而設若不因誤下而邪入於裡或但痞結而不石硬或按之不痛者此結而未實故不用陷胸而以痞滿門瀉心諸法治之因病未甚治亦從緩又評此結胸不由誤下而成是邪熱自入於裡與內蓄水飲及痰食互結於胸中也結胸與臟結皆因下早邪氣入里而成邪與陽結為結胸邪與陰結為臟結結胸在心之分臟結在腎之分結胸可治陽主生也臟結不治陰主殺也參來蘇集下利述古三陽合病下利有熱無寒三陰下利自利屬寒陽邪屬熱太陽陽明合病自下利者此風邪入胃也脈浮而長所見皆太陽症以下利故知與陽明合病也用葛根湯表提風邪利自止矣邵評下利有寒熱之不同三陽合病下利邪化熱而入里無寒症也三陰下利有直中傳經二因直中下利為寒從陽經傳入者為熱利也太陽之邪併入陽明而自下利為太陽陽明合病合病下利者裡氣得熱而下行也脈浮為太陽長為陽明脈見太陽症者太陽之邪初入陽明之裡兩陽合明邪氣火盛表實裡虛故外見太陽症而里則下利也用葛根湯辛甘發散以從陽解兩陽相合之邪下者舉之之法也且太陽陽明合病下利是太陽症內陷陽明故用表劑中加葛根以清裡熱若桂枝症誤下而利不止脈促者表未解也汗出而喘當用葛根黃芩黃連湯外解表邪內清裡熱邵評陽陷於內者十之七留於表者十之三故曰表未解也邪束於表陽擾於內故喘而汗出表裡俱病用葛根之辛涼以解表用芩連之苦寒以清裡也太陽少陽合病自下利者黃芩湯此熱邪已入少陽之裡膽火大熾移熱於脾故自下利脈浮而弦外症必頭痛胸滿口苦咽乾目眩或往來寒熱熱邪不在半表而在半里故不用柴胡而主黃芩嘔加半夏生薑治痰飲也邵評少陽半表半裡比陽明為尤深邪熱更易內侵太少兩陽合病陽盛陰虛陽氣下陷入陰中故自下利而治法與陽明不同矣太陽陽明合病其邪初入陽明之表邪近於外故用葛根驅邪使從外出為順太陽少陽合病是邪已入少陽之裡邪入於內故用黃芩治之使從內出為易夫熱淫於內黃芩之苦以清之腸胃得熱而不固芍藥之酸甘草之甘以收固之酸苦湧泄為陰亦通因通用之法也若嘔者熱邪上逆也故加半夏生薑以散逆氣而黃芩之清裡亦法之所不易矣且黃芩湯小柴胡加減方也熱不在半表已入半里故以黃芩清裡雖非胃實亦非胃虛故不須人參補中也或云此少陽指三焦不指膽少陽陽明合病自下利者其脈不負者順也負者失也滑而數者有宿食也當下之如發熱嘔惡心下痞硬或往來寒熱大柴胡湯主之陽明脈勝則洪緩為不負而順少陽脈勝則弦緊為負而逆按三陽合病下利惟少陽陽明為重土受木克也故陽明脈勝為順陽明脈負為失失者死也注釋參來蘇集三陰下利俱詳見本病下如腹滿而痛吐利交作或下利清穀吐利四逆或下利身重小便不利等症皆屬三陰本臟虛寒當以理中四逆真武輩治之邵評此三陰自受寒邪而下利之正法三陰熱邪下利太陰有暴煩下利腹滿大痛咽乾而渴之症少陰有自利清水色純青心下痛口乾燥之症俱是轉屬陽明宜承氣輩主之少陰又有四逆泄利下重小便不利腹中痛之症亦屬熱邪宜四逆散厥陰熱利下重渴欲飲水脈弦而數此風木熱邪乘脾白頭翁湯主之邵評陽經熱邪傳入太陰熱灼津傷轉屬陽明而成胃實見症皆熱實之象故可用下法若少陰熱並陽明之症少陰經中熱極則迫其水下流而腎水燥燥則腸中之物更堅故利清水色純青者腎弱而肝反侮之也心下痛為實口乾燥為熱用大承氣急下燥屎以存津也至於四逆四肢逆冷也陽氣不達於四肢故逆冷泄利下重是陽邪下陷入陰陽內而陰反外陰陽脈氣不順接也小便不利腹痛水氣為患也用四逆散和解表裡之邪惟熱邪傳入厥陰為協熱下利熱利下重乃濕熱穢氣鬱遏於下焦廣腸故魄門重滯雖利而難出也渴欲飲水者以里有熱傳經之邪厥陰受之也弦為肝脈數則裡熱也用白頭翁辛淡以除邪氣連柏苦寒以清熱秦皮苦涼性澀入厥陰而止利也又評少陰四逆者四肢厥冷也此非熱厥乃太陽初受寒邪便入少陰之症少陰為陰樞邪氣居之可進可退故其病每多或然之症因取四味以散四逆之邪此少陰氣分之下劑也凡厥陰病先發厥後發熱不退者必便膿血也脈數有力從陽治脈沉無力從陰治邵評熱不退者陽邪盛也陽盛則傷陰絡故知必便膿血也便血而脈數有力者宜滋陰清熱從陽治之脈沉無力者當溫中和營從陰治之下利新法凡傷寒熱邪正盛之時必在陽明胃經陽明以胃實為病故大便不通然火症往往下黃黑稠黏之物此熱邪下逼大腸非痢也雖通仍作不通論只用清火解毒以治陽明其利自止邵評熱結腸胃下迫大腸而下注治宜清化火熱如傷寒熱症下痢純清水或黃沫潮熱腹硬脈沉滑有力者此名旁流因腸中有燥矢阻塞水漿從旁滲出病在陽明非關脾也導去燥矢其痢自止邵評所下皆是水沫吃下之湯水隨熱下注腸中有燥屎內結水從旁流也下其燥矢熱退則愈蓋燥矢在腸水從旁流非下不可有陽明火症邪火不殺穀吃湯下湯吃水下水此有陽明實症可據非若脾腎俱敗者比亦只清其火邪其痢自止邵評胃中火盛水穀消化不及則穀不化火性急速不能停留故一吃即利此火迫下注必有實熱見症實火脈象形於外與脾腎陽虛火衰不能消化下利清穀者大相天淵清化胃中邪火利可自止有一種外感風寒內傷飲食其症頭疼惡寒發熱噁心飽悶腸胃窘迫而泄痢者此表裡俱病法當外散表邪內消積滯不在傷寒變病之例邵評表裡交病外邪內迫而下利宜疏表和里兩解治之如枳桔梔豉加葛根焦雞金最妙有一種表熱裡寒之症初起頭痛惡寒發熱繼即下痢清穀脈浮而遲口不渴飲俗名漏底傷寒是也良由其人脾胃本虛一感外邪即得直入腸胃不在太少留連速當溫中散寒加紫蘇桂枝羌活厚朴廣皮木香茯苓甘草之類甚者加冬朮乾薑邵評此與上條有輕重虛實之不同上條表有風邪而內傷飲食是表裡俱實此條表有熱邪而里則虛寒是表實裡虛中陽虧乏表邪乘虛內入直走腸胃而下利也治宜溫運中陽外散表寒與上條治法不同此方治脾胃中虛有寒表邪入里而下利的是正法若陽邪傳裡熱邪攻於腸胃而變下利膿血者重症也然亦有寒熱之分蓋邪至三陰為日已久實者則從陽化熱虛者則從陰化寒矣如少陰下利用豬苓湯者從陽化熱也用桃花湯者從陰化寒也辨症之法以脈數有力為熱脈緩無力為寒舌燥口渴屬熱舌潤不渴屬寒小便赤澀屬熱清白屬寒下利腸垢屬熱鴨溏屬寒熱利臍下必熱寒利臍下必寒熱利當清其腸寒利當溫其下邵評陽經熱邪傳於裡有化寒化熱之不同辨別精明須熟記之凡傷寒疫癘熱邪傳裡下利腸垢或下鮮血小溺赤澀舌苔黃燥如刺或紅刺如楊梅狀身熱口渴六脈洪數臍腹大痛者此熱毒內攻腸胃也不治則爛矣急用大黃芩連銀花丹皮芍藥甘草之類下之清之繼用鮮生地數兩代大黃與之以養陰解毒若下利腸垢其勢稍緩者宜黃芩湯加川連銀花丹皮之屬清之血利加丹參槐米川斷邵評火熱疫毒盛於腸胃急用苦寒清下治之如遇傷寒疫症下利如豆汁魚腦之色脈象沉濡舌白如粉小便不利而口不渴者濕毒聚於腸胃也宜茅朮厚朴廣皮二苓滑石澤瀉晚蠶砂藁本之類滲之和之邵評此濕溫症而兼疫毒也宜清滲濕邪治之此方頗合如下利雜色六脈沉遲舌潤無苔或紫色而光口不渴飲腸胃並連直出無關閉者此脾腎虛寒關閘不闔元氣下泄之證也急投胃關煎合桃花湯兼從手陽明以堵截之或桃花湯重加人參以截之邵評腎陽虧乏虛寒下利滑脫無度溫澀下焦為治如見外熱內煩舌燥口渴脘中痞悶或痛或嘔而利不止者中焦濕熱也當用瀉心法芩連半夏乾薑枳實木香赤苓澤瀉之類邵評濕熱痞結中焦脘悶嘔痛不食下利似是噤口痢症防其閉結用開痞泄邪之法卻是正治凡下利舌苔遍地白厚如雪花者臟結也不治邵評陽虛體濕濁陰凝結於中苔厚如雪花者邪結已深也純陰無陽故不治凡三陰下利小便不利者津液竭也不可妄利小便邵評陰經下利而小便不利陰津虧乏也如妄利之陰氣竭絶而津涸矣小便附凡傷寒小便清白者病不在裡而在表也下焦病小便利者病不在氣分而在血分也參治法匯邵評熱未入里小便清白以此可驗邪之在表在裡若邪入下焦小便當不利今反利者病在血分而不在於氣故下焦蓄血症小便自利也太陽病脈浮數渴欲飲水小便不利者五苓散陽明病脈浮渴欲飲水小便不利者豬苓湯述古邵評太陽經邪傳入膀胱之腑為傳本病也用五苓導水泄熱極是若熱結膀胱宜參用八正散加減又評陽明渴飲小便不利是津虧熱伏邪在胃中也用豬苓湯利水泄熱兼滋陰氣此古法也若時方可用導赤散凡傷寒表症未解病在陽分尚宜發汗者不可先利小便恐走其津液取汗難也參奧旨邵評邪在表當發汗若先利其小便則津液從下走泄非但不能得汗必致津傷邪入而病增變也故邪在表禁利小便陽明病潮熱汗出多者必小便少不可利小便恐胃汁愈干也若利之必喘渴而死述古邵評陽明潮熱汗出多者其津液已經外泄恐其津亡胃燥故禁利小便汗與小便同是津液氣化所由出汗多傷陽利小便則傷陰陰液陽氣並竭故喘渴而死是以汗多津虧禁利小便蓋陽明一經以存津液為第一義也小便不利有可利者二熱結膀胱宜利濕熱發黃宜利若大病後汗下後律液內竭故不利若強利之則水愈涸必純用養陰生津之品則津液復而水道行矣痢亦然參奧旨邵評病後汗下後小便不利因津液內傷所致即有餘邪濕熱亦不可妄利再竭其陰液也當用滋陰養液之劑久久服之俟其津液充復小便自利矣若有濕熱瘀邪內蓄者可利小便若無邪而津液虧乏者切不可妄利也癍疹痧瘄附合參金鑑治法匯葉案第一書癍者有觸目之形而無礙手之質即稠如錦紋稀如蚊跡之象也或布於胸腹或見於四肢總以鮮紅起發者為吉紫色成片者為重色黑色青者不治邵評癍之形狀平而貼於肌肉之間並無點粒高起以手摸之平而不礙手或紅色成片稠如錦紋者此屬陽邪胃熱有稀如蚊跡而色淡不解者此是正虛邪伏此症有陰陽寒熱虛實之不同當看其外症參其脈象而施溫涼補瀉之治法疹者有顆粒之象腫而易癢即痧癮之屬須知出要周勻沒宜徐緩春夏多此癍疹二者不外手太陰與足陽明之治又癍為胃家毒火疹屬脾家濕熱須互參之邵評發疹於皮膚之上起有顆粒如粟如粒以手摸之有尖刺而觸手者也與癍之平而在肌肉者不同癍由陽明胃熱而發疹因肺受風溫而出癍有虛寒陰症可用溫補疹無不由邪火而作陰寒之症罕有故治疹之法不外辛涼清透宣肺化邪溫補之藥每禁用也蓋因疹子即痧瘄一類即天行時毒入於肺中而發邪盛者點子稠密肌膚微腫而稍癢有紅白二種邪入營者紅疹邪入衛者白點大忌冒風涼遏犯則肺閉內陷發喘而死矣癍疹之發傷寒由於失表失清其邪不得外達蘊於胃腑走入營中而發也溫熱之症外邪與內熱相搏濕熱凝滯自然發癍發疹有發熱一二日便見者有發熱三四日始見者非因失治而然邵評癍與疹必當分別癍發於胃疹出於肺傷寒失表失清邪遏於胃而熱蒸成癍故傷寒症發癍者多而發疹則僅見也其虛癍陰癍由於中虛寒伏逼其浮陽外越無根之火內動見癍隱隱而微色白不鮮者是也治須溫補至於疹悉是外邪致病天行痧疹時毒襲入肺衛而發者或溫暑時邪從肺吸受由衛入營之症其邪從肺外達而發疹者此邪在上焦非由失表失清之故當辨其在氣在營而用宣肺清透之法若遇寒涼防其抑閉與癍之治法判然不同二症豈可不分辨哉故約言之癍屬胃疹屬肺二症須分別論治大抵發汗不出或雖汗不解胸膈煩悶嘔惡不納足冷耳聾脈沉而伏或寸關脈躁動便是癍疹欲出之候須細診之邵評邪熱鬱伏於中蒸熱為癍故汗不出而煩悶嘔惡足冷耳聾此是癍疹將發之見象猶天將雨而悶熱鬱蒸也脈沉伏由於邪伏於內脈道不利所致寸關躁動者伏邪勃發之兆也凡癍疹欲出之際若得上吐下瀉者吉毒氣上下俱出故也邵評癍疹將出之際上吐下瀉其熱毒從吐瀉而外出分消其勢大忌止澀若出齊後及將回之時忌見吐瀉恐其邪陷也故癍疹吐瀉須辨其先後緩急之勢庶免誤治之弊凡癍紅赤者為胃熱紫色為熱甚紫黑為胃爛赤癍五死五生黑癍九死一生鮮紅起發稀朗者雖大不妨如針頭稠密紫黑成片者難治雜藍癍黑爛者死也邵評此辨癍色以驗病之吉凶生死學者最宜著眼凡癍既出須得脈洪滑有力手足溫者易治脈微足冷元氣虛弱難治癍疹透後神識宜清反加昏沉者難治邵評癍出之後辨其脈象及症之順逆語皆精實凡溫熱癍疹已見陽明少陽新法中傷寒失表發癍已見太陰新法中此更詳天時寒暄燥濕邪在足經手經氣分營分外感內傷為治當以溫熱疫癘兼參之邵評傷寒自表入里從足經施治邪入陽明熱甚發癍由先時失表失清所致所謂癍發於胃非比疹之從肺而出故傷寒症陽明極熱每多發癍而發疹者稀有也若溫邪暑熱自肺吸入宗三焦立法從手經論治其邪之入里或自肺衛而入營則發疹而外達即天行痧疹時毒之邪亦從肺經吸入而發疹也所謂疹出於肺或由肺衛而入陽明胃者胃火盛亦有發癍也其治與傷寒發癍同至治疹當宣肺清營提透疹邪為主至於癍與疹之所發其源各異而治法亦須分別詳列於後胃熱發癍舌苔黃燥者胃中熱極也從陽明治犀角連翹黃芩黃連銀花牛蒡葛根薄荷之類不可過用風藥邵評此陽明胃熱發癍之正法營熱赤癍舌苔鮮紅者營分血熱也神昏譫語邪干膻中病在手經不可妄用風藥以劫胃津亦不可純用苦寒直入中焦法當清疏營分輕透癍毒如犀角尖連翹心元參丹皮牛蒡銀花薄荷人中黃之類神昏加菖蒲數分西黃二三分以開心竅邵評膻中心包絡也邪在手經自肺衛而入心營逆傳包絡危險之症急當清心達邪芳香開祕忌用風藥升散劫耗陰津且邪在上焦並宜輕清若用苦寒重濁之劑直走腸胃與包絡結邪無干涉矣此方是營熱發癍邪入心包之正法如癍已透當清火解毒以化之如連翹赤芍元參丹皮花粉知母黃芩淨銀花人中黃之類脈洪大加石膏舌絳色加鮮生地邵評癍透之後餘熱未淨治宜清化餘邪此方是癍透後餘邪未淨之良法表寒春應溫而反寒夏應熱而反涼有病惡寒發熱咽痛身上有淡紅白癍舌苔白而薄嫩者此寒邪在表也當以荊防敗毒散溫散之邵評此表寒抑遏而發癍之良法溫毒秋應涼而反熱冬應寒而反溫或天時亢旱久燥溫疫流行發為赤癍丹疹其毒彌滿三焦目赤舌絳汗出津津切忌風藥升散宜涼膈散去芒硝大黃加石膏牛蒡赤芍人中黃大便祕者去硝留黃邵評應寒涼而反溫熱又或天時燥旱陽熱亢極非其時而有其氣是不正之邪氣而成瘟疫也疫邪火毒釀成癍疹熱毒蘊伏陽明三焦俱病是名溫毒發癍症多肺胃火盛此方極合陽毒溫疫陽毒發癍面如塗朱眼如噴火六脈洪大燥渴欲死此陽明血熱已極毒邪傳遍三焦經絡閉塞榮衛不通非三黃石膏湯不能解救邵評三焦表裡俱被陽邪熱毒蒸灼氣血經絡凝塞不通邪郁不宣之候必須兩解其表裡之熱邪則癍疹方能外達此方治邪遍表裡三焦陽毒發癍的是良劑伏癍凡傷寒邪入太陰脈靜神呆舌心灰黑防有伏癍或時感之症過經不解舌苔灰黑或中心黑暈肌表不甚發熱脈象亦似沉緩但神識不清或鄭聲作笑此陽邪陷入太陰防有伏癍內發其脈靜身涼非邪退正復也乃陽邪陷於陰分也法宜宣通氣血透提癍毒以實症治之如連翹赤芍銀花紫草生楂肉檳榔天蟲刺蒺藜犀角尖角刺之類透之提之癍疹外達自然毒透神清參第一書邵評陽經之邪入於太陰太陰為濕土之臟脾與胃相聯陽邪故易傳入於陰入於陰則脈反靜邪氣內伏故神呆舌灰黑太陰舌苔也如此形症防有伏癍不但傷寒邪入太陰即時感遷延亦有陷入太陰之症舌灰黑者太陰濕與熱相蒸也邪熱陷入抑遏不宣故肌表不甚熱而脈見沉緩也癍毒內伏則神不清而糊言妄笑矣此陽邪實熱陷入太陰癍毒內伏之候不可誤認為邪退正虛而進滋補仍宜宣通伏邪提透癍毒必使癍從外達陷入之邪自化耳此方治陽邪陷入太陰癍毒內伏之良法內傷凡勞倦內傷虛火遊行於外亦有淡紅癍點其身痛心煩惡寒發熱與外感同第脈虛大或氣口獨大倦怠懶於言動自汗為異投補中益氣熟睡汗止身涼而愈邵評此勞倦中虛稍挾微邪虛火外浮而發癍用補正略佐化邪一法為治勞倦傷脾中虛發癍名曰虛癍之良劑伏陰陰癍者因內有伏寒或誤進寒涼逼其虛陽浮散於外其癍點隱隱而微脈雖洪大按之無力或六脈沉微手足逆冷舌苔白滑或黑苔胖滑此陰癍無疑也先用炮姜理中湯以復其陽次隨症治若內傷生冷外感寒邪而發陰癍調中湯最捷邵評稟體陽虛其人內有伏寒又有誤用涼藥寒物陰寒極盛陽火衰微逼其無根之火外浮而發癍陰伏不達名曰陰癍大虛大寒之症虛陽浮越其脈浮取洪大重按無力陽微欲脫之脈也若脈沉微陽微之正脈均宜用溫中扶陽之法此方治陰寒內盛陽火衰微而發陰癍之正法少陰凡腎虛挾感癍疹無力透達肌膚中微現淡紅隱隱之點脈象沉細無力舌苔淡紅或紫色舌形胖嫩圓大似寐非寐神識乍清乍昧此少陰精不化氣癍不得透也當以左歸飲加人參進之精氣充溢癍自外達矣若兼右尺遲微手足逆冷渴不欲飲此少陰水火俱虧也當以人參八味投之腎氣一充其癍自透邵評腎水虧以六味地黃壯水腎火衰用附桂以補火人參以扶元氣乃陰陽兩虛之正法內癍凡溫疫時感每有內癍其癍發於腸胃嗌膈之間肌膚間不得而見其脈短滑似躁非躁外證口乾目赤手足指冷煩躁氣急不欲見火惡聞人聲耳熱面紅或作寒噤或作噴嚏昏不知人鄭聲作笑種種形證皆內癍之驗治法亦宜宣通氣血解毒化癍如連翹地丁赤芍紫草楂肉檳榔淨銀花人中黃白殭蠶鉤藤鉤之類主之俾得脈和神清方為毒化癍解此條參傷寒第一書邵評時毒瘟疫口鼻吸受直行中道邪伏膜原毒凝氣滯發為內癍內癍者發於軀殼裡面腸胃膈膜之處外之肌肉皮膚不見癍點毫無形跡猶內癰之類也此症罕見時症瘟疫症中或有此症其所見外症俱是陽明熱毒火邪壅遏於中氣不宣通之候癍發於內提透非宜治法當宣通邪滯解毒消癍清營化熱之劑症雖少見醫者不可不知蓋內癍外無形跡可見全在察脈辨症庶無貽誤以上俱論癍症疹子悉屬風熱浮小有顆粒隨出隨沒而又出一翻者是與小兒痧子同宜疏風解熱為先不可驟用寒涼必兼辛散吳地曰痧子浙江曰瘄子同一病也恆發於小兒若疹子不拘大小皆有三疾主治略同總不出乎肺家風熱身熱一二日即發者輕三五日發者重亦當辨其天時寒暄燥濕邪在氣分營分分治外寒內熱痧疹發於暴寒之時肌表頭面不透是外襲寒邪內蘊伏熱宜兩解肺衛之邪麻杏石甘湯加桔梗薄荷射干牛蒡主之邵評痧疹將發值天寒暴冷之時寒邪抑遏於表痧疹熱毒蘊伏於肺不能外達疹不透而氣急煩悶故用麻黃開肺散寒石膏杏仁清熱下氣余藥提透疹邪也若秋候涼風外襲伏熱內蒸以致咳嗽或喘者亦宜麻杏石甘湯加桑皮象貝枯芩蘇子之類麻黃鬚蜜炙或水炒邵評發疹在秋令被涼風抑遏肌表疹不透而肺火內灼咳嗽喘急者亦用麻杏石甘湯開肺散風之法此與上條是肺有熱邪欲發疹子外受寒風鬱於肌表疹不透達肺火燔灼最易閉悶發喘而成危症故用麻杏石甘開肺清熱加味散表邪而發疹風溫若值天時晴燥已久而患咳嗽咽啞喉痛之症兼痧疹者此風溫客於太陰手經也治宜辛涼清潤之品大忌升葛防風蟬蛻等藥當以羚羊角連翹薄荷牛蒡元參射干杏仁桔梗象貝淨銀花蘆根之類選用繼以粉參川斛麥冬花粉知母梨漿之品以養肺胃之陰邵評風溫之邪襲肺火燥傷金故見咽啞喉痛而發痧疹肺之火毒極盛若內濕火上蒸咽喉作腐者是爛喉疫痧治法亦宜辛涼清透大忌辛溫升散之品寒涼苦降亦在禁忌防其鬱遏內邪也治宜辛涼宣泄清肺達邪為風溫發疹邪在肺衛者正治之法即爛喉疫痧亦不外此方此條風溫熱邪在於肺衛欲發疹子用宣肺達邪清透為治是正法也血熱痧疹初起舌絳如朱疹色如丹環口燥裂大渴引飲脈象洪數乃陽明血熱也宜犀角連翹鮮生地丹皮赤芍元參花粉淨銀花人中黃之類選用繼以大小甘露出入以救胃陰邵評此條營分邪盛血熱而發疹用清營宣透涼血解毒之治亦正法也此與上條俱即養陰藥繼之可見溫熱病以陰為重也肺郁痧透後痰多氣急咳嗽者餘熱鬱於肺也宜宣之開之如梔豉桑杏桔梗枯芩薄荷象貝蔞皮通草蘆根之類邵評此為痧邪餘熱挾內之痰火鬱於肺中氣不下降所致宜宣肺化痰清火治之為痧疹之後痰熱鬱肺之正法如痧疹雖透而咳嗽聲啞喉痛者此痧毒不能盡發鬱於氣分也亦宜宣通肺氣如羚羊角前胡桑杏連翹牛蒡射干薄荷銀花甘桔通草黃芩蘆根之類選用邵評痧疹透而聲啞咽喉痛而咳嗽者乃火邪痧毒鬱伏肺中氣火上升為患也治以宣氣泄肺清火解毒之法乃痧毒火邪鬱於氣分上灼肺金之正治發喘凡痧瘄透發不盡毒邪干肺喘急昏悶者危症也宜急透之焦麻黃八分石膏四錢杏仁二錢牛蒡子一錢五分連翹一錢五分枯芩一錢五分象貝母一錢五分薄荷八分桔梗八分犀角尖八分生甘草四分通草一錢蘆根一握邵評此痧毒內伏鬱閉之症或著寒冒風皆能致此尋常疹子則無此症蓋痧出而不盡透毒伏於內鬱悶肺閉而昏喘氣急者大危之症非麻黃大開肺氣則不能救再用石膏以清火杏仁以下氣甘草以緩急而瀉火毒加犀角桔梗等味提透清化為治咳嗽痧後咳嗽餘熱在肺也宜瀉白散加貝母橘紅杏仁枯芩知母花粉甘桔梨漿之類清之邵評此痧疹餘邪蘊肺而咳嗽之良法傷陰凡痧瘄伏邪未清致傷陰分而發熱不止者宜甘涼養陰如沙參骨皮麥冬玉竹雲苓金斛生地白芍丹皮甘草之類邵評此痧後伏邪傷肺胃之陰液因而發熱之正法伏邪凡痧瘄等症外雖透達易隱易回而身熱不除漸加喘咳腹脹咽痛喉啞齦爛神昏欲寐或兼赤利等症者此係失潮伏邪在內危症也急宜散邪解毒如犀角連翹牛蒡射干元參杏仁楂肉人中黃淨銀花西黃通草之類邵評痧毒內伏上中下三焦均受其戕也蓋痧子出沒有潮數見點三日方齊每日三潮三日九潮潮後漸漸退沒則痧毒盡透若未潮足而早回則邪伏於內咳喘齦爛喉啞咽痛毒火上擾也腹脹赤利邪火下注也身熱神昏欲寐痧毒閉伏於中也上中下三焦俱受邪侵必正不勝邪而敗矣急急提透疹邪清熱解毒為治必使痧毒外散方有生機如痧瘄隱沒太早以致發熱咳喘者此伏邪在肺也速宜開宣肺氣遲則不治如梔豉桑杏羚羊牛蒡連翹前胡薄荷桔梗蘆根之類主之邵評按此等藥雖是開宣肺氣為主然初起即用或有靈效若喘熱勢盛似乎嫌輕當以麻杏湯治之為是然此條痧隱太早邪遏於肺病在上焦較前條稍輕故以輕宣法治之陰虛凡少陰水虧之人感挾時邪而發癍疹不可過用柴葛升散緣此症雖表不得汗解或雖得汗而癍疹未透熱仍不解惟清解中兼養陰液庶能得汗而癍疹亦易透達如遇時感診得脈象細數或沉細外症欲寐不寐舌形微白兼紅或紫色而干即是少陰虛症或已經表散不應者急宜用生地骨皮沙參茯苓麥冬金斛花粉牛蒡連翹甘草之品以養陰液自然疹隨汗達身涼而解如兼舌燥口渴而便祕者加犀角數分合陽明治之或加豆豉邵評此腎水素虛之人外受濕熱暑濕時邪而發癍疹非天行時痧之症當從三焦立法用手經藥清透各隨其所受之邪而施治非足經藥之柴葛升散發表者所宜即使發表得汗此非風寒表症其邪不能從汗而解癍疹何能外達況本屬水虧之人病是溫熱而非風寒尤忌發汗傷陰故必清解溫暑熱邪甘涼滋液之法俾得營衛之邪從肺達而出疹陽明之邪由胃而發癍溫熱暑邪隨癍疹而化解矣至脈細數而沉細溫熱入少陰之脈象也欲寐少陰本症也復不得寐煩熱也微白而紅溫熱初起之舌也少陰舌本紫乾者熱而津虧也此少陰溫熱而陰液素虛之症急急滋液達邪陰液充復則邪氣達自然得汗非用藥強發而汗出也又評此陰虛而受溫暑時邪之症當救液達邪辨明營衛而治邪從癍疹而解如見陽明症象可合陽明法治之凡痧瘄癮疹最宜通泄雖下利五色亦不妨惟二便不利最為凶候如遇此症勿實脾止瀉邵評痧疹因受外邪而病或見吐瀉則內邪由吐下而外泄此是順症若二便不利則邪毒壅遏最多閉結故為凶候凡痧疹吐瀉大忌止澀發黃述古濕熱俱甚則發黃陽明熱勝如橘黃而明太陰濕勝如熏黃而晦邵評發黃有因熱因濕之不同熱屬陽明而色明亮者陽黃也濕屬太陰而色晦暗者陰黃也故治發黃當辨其濕熱陰陽之不同太陽蓄血亦發黃但以小便不利為濕熱發黃小便自利為蓄血發黃也邵評蓄血有身黃一症非蓄血必發黃也此以發黃之小便不利借證蓄血之小便自利非以蓄血發黃二症對勘也其實以濕熱之小便不利借證蓄血之小便自利耳又評蓄血有身黃者非發黃因於蓄血也不可以濕熱發黃與蓄血發黃對列蓋發黃因外則汗不得泄內則小便不利以致濕邪瘀熱鬱而成黃故濕熱發黃小便不利蓄血不在氣分且小便自利則內之濕邪瘀熱已得外泄何能發黃要知蓄血與發黃無並見之理熱於膀胱則為發黃血結膀胱則為蓄血病之在氣在血有形無形截然相反若果太陽發黃用治蓄血之峻劑抵當湯服之則前陰下血如泉而立斃蓄血而亦言發黃其誤非小故特辨之蓄血發黃脈沉細而結濕熱發黃脈浮滑而數邵評此辨蓄血濕熱發黃脈象之不同蓄血發黃則便利而清濕熱發黃則便黃而濁邵評此以便之黃濁清利辨發黃蓄血太陽失表瘀熱在裡表實無汗小便不利身體發黃者麻黃連翹赤小豆湯主之使黃從汗解也邵評太陽失於發表外無汗出而內則小便不利熱入於裡而不外越謂之瘀熱熱蒸發黃此熱瘀而未實之症也因其有表裡症故用麻黃杏仁生薑之發汗散表赤豆梓白皮連翹根之苦寒清熱而利水也蓋發黃熱瘀而未實故以發汗清利雙解表裡為治陽明病遍身無汗但頭汗出小便不利渴欲飲水者是熱不得越瘀於裡而發黃也茵陳蒿湯主之使黃從下解邵評此陽明濕熱發黃之症但頭汗而身無汗鬱熱上熏而邪不外達也小便不利其熱又不得下泄而又渴欲飲水則熱之蓄於內者方熾而濕之引於外者無已濕與熱合瘀郁不解未能表達里通勢必蒸發為黃矣用茵陳蒿湯苦寒通泄使內瘀之濕熱下趨則黃從便出而下解也此條傷寒論原文有腹滿一症因邪不得外泄下通鬱熱為黃邪深入里而腹滿為陽明熱實之症故方中用大黃清濕而下里實也太陰病小便不利濕土為熱所蒸而發黃者茵陳五苓散主之使黃從小便而解邵評太陰濕伏不從小便而下泄遏於內而蒸熱為黃此太陰濕熱症也用五苓散宣化膀胱之氣而利小便加茵陳以清滲濕熱也蓋太陰濕鬱蒸熱為黃熱而未實當宣其氣化使邪從小便而解瘟疫論云疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為疸身目如金宜茵陳蒿湯若用茵陳五苓散不但不能退黃即小便亦難利此乃胃家移熱是以大黃有專功也邵評瘟疫濕濁之邪傳入陽明熱在中下二焦結而成實氣不宣通鬱而為黃此陽黃實熱用茵陳蒿湯下其熱實也蓋疫邪熱入於裡陽明胃家熱而成實故用茵陳蒿湯下其熱實與上條濕熱發黃熱而未實者不同也傷寒身熱發黃無表裡症者梔子柏皮湯主之邵評此陽明之經症表無邪郁里未成實故曰無表裡症乃身熱發黃熱瘀陽明經也故但治以清熱凡發黃熱多脈必數一身不痛解毒為主濕多脈必緩一身盡痛滲濕為主邵評熱盛陽明蒸郁為黃脈數而身不痛者陽黃也清熱解毒治之太陰濕勝滯氣為黃脈緩身痛濕入經絡而為陰黃滲濕行氣主之惟熱黃脈數屬陽明濕黃脈緩屬太陰陽明發黃熱多二便俱祕茵陳蒿湯邵評此陽明熱實發黃之正法太陰發黃濕多小便不利茵陳五苓散邵評此太陰濕鬱發黃之正法身熱發黃無表裡症梔子柏皮湯邵評此陽明經瘀熱發黃之治法方中宜再加澤蘭紅曲以消瘀以上論陽黃症發黃汗出身冷脈沉遲小便不利口不渴者陰黃症也五苓散加乾薑茵陳二便俱利者理中湯加茵陳傷寒遇辰戌丑未年太陽太陰司天醫用寒涼太過往往有陰黃之症脈沉遲肢體冷而發黃者宜理中湯加茵陳主之小水不利理中加二苓官桂嘔者理中合二陳生薑若天久霪雨濕令大行又當理中合平胃為當甚者加附子邵評寒水濕土當令之年如其人陽氣本虛偶受濕邪醫者過用寒涼傷其中陽而成陰黃之症所見脈症俱是陰寒之象與陽黃之熱實者大相徑庭用理中湯加茵陳溫運中陽而化濕也陰寒甚者當加附子以扶陽泄濁為治若中陽虛弱寒濕內伏陽氣不得宣化而小水不利加苓桂以通陽利水嘔者胃虛有寒痰也合二陳生薑以和其胃氣而化痰飲惟久雨濕盛陰濁之氣太甚脾胃中土受戕故用理中溫運中宮合平胃除濕化邪此脾陽虛弱寒濕內伏而成陰黃治以溫中化濕為主脾絶似黃症一身盡黃寸口無脈鼻中冷氣搖頭直視環口黧黑形如煙煤此脾家真氣絶非發黃也第一書云膽氣絶則面黃脾氣絶則身黃此皆黃如土色乾枯無神氣者也邵評脾為陰土黃者土之本色也脾陽衰乏陽氣不運故寸口無脈陽微欲絶則氣冷不溫所見各症純是一派陰濁用事微陽將欲埋沒脾之真氣告絶土之本色發露無餘而外現故一身盡見黃色此臟絶之症與發黃之有外邪者各殊也金鑑云環口黧黑冷汗者陰黃死證也身體枯燥如煙燻者陽黃死證也邵評陰黃陽絶則死陽黃陰竭亦死痙合參病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也邵評痙病風邪在表則身熱惡寒痙為風強筋脈受之則口噤項強反張強直也頭熱足寒面目赤頭動搖者風為陽邪挾濕上行風濕化熱而上淫也此痙病之形症也蓋因風濕熱邪乘虛而入於筋之故也又評諸暴強直皆屬於風但陽主動陰主靜是當以強直而安靜者主濕強直而搐搦者主風千金方謂濕熱入於腎中亦為痙小兒癇熱盛亦為痙王海藏謂反張太陽痙也低頭視手足牽引肘膝相構陽明痙也一目或左或右斜視一手一足搐搦少陽痙也太陽固屬風寒陽明少陽亦風火熱之內作皆當以存陰驅熱為治夫痙脈按之緊如弦直上下行邵評痙脈按之緊如弦邪氣堅實也直上下行陽邪盛也上條揭痙之主症此條揭痙之主脈痙脈沉而細者為難治邵評脈細則易亡陰痙病見之則難治太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙邵評無汗為表實反惡寒者風邪挾寒也以其表實有寒故曰剛痙若汗出為表虛不惡寒者風變而外傷筋脈也以其表虛自汗故曰柔痙太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之此剛痙無汗反惡寒主方邵評邪在太陽陽明之界熱並胸中津不布而無汗肺不行水而小便少熱氣上衝於胸則口噤不得語馴至面赤頭搖項背強直之症此欲作剛痙用葛根湯治表實無汗之痙也因葛根湯即桂枝湯加麻葛風邪挾寒而表實此湯為治剛痙無汗者之正法太陽病其證備身體強𠘧𠘧然脈反沉遲此為柔痙栝蔞桂枝湯主之此柔痙汗出不惡寒主方𠘧𠘧即頸項強之貌邵評太陽病者太陽一經之症悉具也脈沉遲乃津液少而營衛之行不利也風淫於外汗出而消傷於內用桂枝去風加栝蔞根兼滋其內也痙為病胸滿口噤臥不著席腳攣急必介齒可與大承氣湯初病在太陽僅背項強直若不早治則轉入陽明而病更劇腳攣齒介者以陽明之脈起於腳而絡於齒也承氣是下其熱非下其食也邵評此痙病之屬陽明瘀熱者陽明之筋起於足結於跗陽明之脈入齒中挾口環唇循喉下膈陽明熱極故見是諸症用大承氣滌其熱以救其陰亦急下存陰之治也乃治陽明熱盛之痙用大承氣湯然可與二字甚活臨症酌而用之初非定法也太陽病發汗太多因致痙夫風病下之則痙復發汗必拘急邵評發汗太多津液傷而不涵養筋脈故致痙此為液虧致痙病由內虛所致邵評風病應肝而主筋妄下傷胃液液不養筋而痙復汗以耗其陰陰液燥則拘急也此條因妄下而傷陰致痙亦內虛也瘡家雖身疼痛不可發汗汗出則痙以上述金匱法邵評瘡家身痛是營虛筋脈失養故戒發汗汗之則津液越出筋虛燥亦攣急而為痙矣此瘡家發痙亦由液耗而內虛使然經云諸暴強直皆屬於風其勢勇猛故曰剛痙又云諸痙項強皆屬於濕其勢弱軟故名柔痙柯韻伯以痙之屬風者不因風而因熱屬濕者不因濕而因燥雖似太鑿然戒人不可以劫液之品治痙實屬良工苦心邵評一由火熱內盛熱極化風而成痙一由濕熱挾風內灼傷陰化燥而成痙痙雖因於風濕外邪其傷陰劫液之藥總當慎用愚按痓症即痙症也其因有二一屬風濕之邪合而為痙即內經所云屬風屬濕是也一屬過表汗多耗其津液而成痙即仲景所云發汗太多因致痓是也分屬之則治法庶無悖謬邵評痙症有外邪內傷虛實二因若外著風濕之邪入於筋脈而成痙者此實症也可用金匱諸方治之若汗下誤施産後亡血津液傷耗筋脈失養而痙者此內傷虛症也宜滋液熄風和絡治之如太陽未曾表汗而發痙明系風濕之邪混擾於太陽風濕相持而不解則濕熱交併留滯經絡營衛不和津液不行筋脈失所養而作也此是傷寒類症非傷寒變症也其證背反張頭搖口噤項強拘急轉側艱難身熱足冷當審其風濕甚者則有汗而為柔痙風寒甚者則無汗而為剛痙金匱法以栝蔞桂枝湯治太陽柔痙以葛根湯治太陽剛痙以大承氣湯治陽明剛痙金鑑法均以小續命湯為主治剛痙去附子柔痙去麻黃表實去參附加二活裡實去參附加硝黃邵評風寒濕邪留滯經絡未經表汗而發痙此是外邪實症可用金匱諸方治若傷寒過表汗多而成痙乃是傷寒變症治分兩途蓋汗多則血液乾枯筋無所養而痙作也非濕非風不得妄施前藥故凡傷寒汗下後癰疽潰膿後婦人新産後而見身體角弓反張手足攣搐者都是氣血大虧液不榮筋所致治法匯均以八珍湯加枸杞川斷鉤藤桂枝主之以養筋脈不可純作風治柯韻伯以復脈湯治痙救陰液也邵評過表汗多陰液傷耗筋脈失養而成痙此是誤治後變症並無風濕外邪與上條之內因邪致痙者有虛實之不同故宜分途施治上條邪實發痙故用驅風散邪之方此因誤治傷津血枯而筋脈拘急非風非濕是為虛痙治當滋液養營熄風和絡為主切忌驅風散邪之劑也若汗下後潰瘍及新産後三者皆傷耗血血虛生風筋失滋養以致反張攣搐等症是虛痙也治用氣血兩調和絡化風之法乃陰虛致痙之正治也至於復脈救陰陰回則虛風自熄痙亦止矣此陰液虧乏血不營筋而痙是內傷虛痙與上條外感實痙不同滋液養正治法最合按過汗表虛成痙汗出不止者桂枝湯加歸耆人參産後血虛成痙歸耆建中湯潰瘍去膿血過多為風所襲成痙者八珍湯加黃耆桂枝川羌防風邵評此承上條汗後潰瘍新産三症而言過汗不止則表虛液脫陽不附陰而痙養營固衛治之産後血虛血不營筋而痙調營補氣治之潰瘍之後氣血兩傷外風乘虛而入於經脈則成痙宜氣血兩補略佐化風治之此與上條均誤治後變症而成虛痙又評金匱論痙病十二條曰風曰寒曰熱曰濕皆是正傷寒之痙及小兒癇熱盛之痙相去霄壤其所用之藥皆麻桂葛根若溫熱暑疫之痙亦誤以此等方治之其害甚於操刃矣發狂合參準繩金鑑經曰邪入於陽則狂又曰重陽則狂狂為陽盛也傷寒熱毒在胃並於心至於發狂邪熱極矣邵評陽邪入於陽經故曰重陽陽盛則狂也若邪熱內伏胃中火毒上熏蒙擾心包靈氣則神不自知而發狂狂之發少臥不飢妄言笑妄起止棄衣而走登高而歌甚則逾垣上屋皆獨陽亢極使然非吐下不能已邵評此是陽明實火上升神蒙不清吐之下之其熱外泄則狂自止凡胃中熱極乘心則神昏發狂經云重陽則狂者謂熱入於陽則狂亂也表實無汗三黃石膏湯裡實不便大承氣湯無表裡症白虎合解毒湯邵評太陽表熱不得外泄鬱而發狂當清解表裡熱邪陽明胃熱不得下泄燥屎內蒸而狂者治宜下之陽明經熱胃火內燔而狂者治以清解胃熱病人煩躁狂走妄言叫罵面赤咽痛鼻如煙煤或身斑如錦或下利赤黃此陽毒也三黃湯大黃散主之陽毒發狂逾垣上屋者霹靂湯調下鵲石散二錢或用人中黃三錢開水下或水調瓜蒂末吐痰以上皆實症治法邵評火毒內燔挾痰上灼矇蔽清靈如醉如癡宜大清其毒火或吐其痰熱以上皆實症治法霹靂湯取糞坑中青磚用火中燒紅取出投入水中水沸畢取水飲之治狂亂有勞心過度曲運神思以致神昏狂亂語言謬妄外無表裡實症見者當治其心與包絡之火如川連辰砂菖蒲鉤藤茯神小草天竺黃琥珀金箔半夏竹茹之類酌用邵評勞傷心營則心血耗散神思不能收斂心火亢甚或挾痰濁上升蔽其清靈之氣以致昏妄似狂此非外邪致病無表裡實症見象由於內傷神明當清心與心包之火佐以滌痰安神為治與上之實熱發狂不同也有陰虛挾感微見躁煩醫誤認為陽明用犀角葛根等升提藥以致虛火上冒目赤顴紅唇燥口渴反發躁狂有似陽症但兩足厥冷舌形紫色六脈洪大而空或細而數當以左歸飲或六味參麥之類主之邵評少陰水虧感受溫熱外邪入於陰經乃水虧火盛之症醫者誤用升散提之透之陰愈傷而火愈盛虛火上冒而無制現此假熱之象而反躁狂此是水虧不能制火虛火上浮故脈沉細數或見洪大重按則空而似無虛陽上擾用壯水制火之法治之陰旺則浮火自平有少陰症陰極似陽發躁發狂赤身裸體揚手擲足欲坐臥水中此為陰狂外症與陽狂相似當以脈為辨其脈必洪大而空或細數而躁或手足厥冷六脈沉微其舌必淡紅而胖嫩或微白而圓厚當以人參八味飲冷服之凡陰狂外貌似熱捫之肌肉則冷逼手邵評此與上條對勘上條水虧火旺此條陰盛陽微少陰寒邪陰多陽少陽不戀陰而外浮上越陰寒格拒於中見此躁擾虛狂之象外假熱而內真寒故必以脈辨之脈見洪大按之則空或細數且躁此是假熱之徵據手足厥冷脈微欲絶此是陽脫之候舌色淡紅微白舌本胖嫩圓厚症屬陰寒格拒虛陽浮越頃刻欲散之兆燈將絶而復明之義也用六味以滋陰桂附以回陽其妙在冷服上焦之假熱以假冷之藥制之內伏之真寒以真熱之性除之陽回寒化其病自愈此與上條之水虧火旺用純陰壯水之品兩相合參其陰陽虛實之不同有如此者又有病發於少陰不當正汗醫見惡寒發熱誤以太陽法強汗之汗遂漏不止其人亡陽故狂與陰極發狂相同當興建中湯去飴糖生薑加人參黃耆熟附龍骨收之以上虛症治法邵評病在少陰邪已入里法不當汗醫者誤用太陽發汗之藥汗漏不止陽隨汗脫而躁擾似狂此虛陽外散陽不戀陰而欲脫故用建中湯加參附以回陽龍骨黃耆以斂攝之又評誤發少陰之汗陽隨汗脫而發躁狂蓋此數條虛症發躁似狂非狂之症也太陽蓄血發狂則小腹硬痛小便自利為辨陽明蓄血發狂則喜忘大便黑為辨此如狂症邵評蓄血如狂之症有太陽陽明兩經之分以見症辨之此如狂症蓄血如狂分別太陽陽明狂言目反直視腎絶也不治煩躁合參準繩金鑑來蘇集金鑑云身為熱動而不安謂之躁心為熱擾而不寧謂之煩煩擾於內躁動於外也邵評躁則身體擾動有形可見旁人知之煩則心中懊憹外無見象惟病人自知故煩擾於內而病輕躁動於外而病重獨煩不躁者屬熱獨躁不煩者屬寒煩躁同見在太陽屬熱在少陰屬寒邵評煩為陽而出於心躁屬陰而出於腎煩主心躁主腎煩屬陽躁屬陰煩者心中煩亂不寧欲起不安欲睡不穩之狀即反復顛倒心中懊憹之證也邵評邪火內擾則煩脘中憒憒無奈懊惱難過欲吐不得吐欲眠不得眠心煩意亂不能自主病人自知其苦外無形象可見也如火踞心包上焦不清而煩者左寸脈必躁動舌燥尖紅當以梔子豉湯加川連翹心淡竹葉鉤藤鉤之類主之邵評火熱從肺衛而傳心包邪在上焦清虛之部故煩亂不安左寸主心包脈位邪盛則躁動舌燥尖紅邪火伏於膈間逼近心包而津液受灼也用梔子豉湯以除膈間之邪加味以清心包之火此治邪伏膈中火逼心包而煩之正法大汗後虛煩者竹葉石膏湯主之兼痰者溫膽湯加減邵評汗後正虛邪火留伏故心虛煩用此湯養正生津而化邪熱若兼有痰者滌痰化邪此治汗後正虛邪伏而煩之正法虛煩不得眠脈虛細宜養心十味溫膽湯及酸棗仁湯之類邵評病後心虛氣弱痰熱留伏膽經故虛煩不得眠治以養正清心宣泄肝膽痰熱伏邪此方治心虛氣弱痰火留伏肝膽而煩之正法有表證不得汗而煩者取汗即愈若不得汗心中煩悶不安恐有痧疹須細察之以上五條論煩邵評表有邪而不得汗氣鬱而煩悶汗出則氣通邪達而煩愈如發汗而不得汗心中煩悶轉增者此邪伏不宣欲發痧疹之兆當留心細察之躁者身體手足躁擾或裸體不欲近衣或欲坐臥水中此陰極發躁為外熱內寒病屬少陰其舌不拘何色必胖大嬌嫩其脈必細數躁動或洪大而空或手足厥冷六脈沉微古人用四逆理中等湯冷服不若八味飲或參附熟地濃煎冷服邵評陰火上浮則躁其症倏起倏臥一刻不安揚手擲足揭去衣被躁擾不寧煩亂如狂此等形症旁人皆得見之非比心煩之不外顯也此陰寒極盛陽不附陰而上越陰火外浮真元欲脫之兆病在少陰故躁屬於腎也此陰盛格陽陽浮欲散故古人用四逆理中等方以回陽冷服以開其拒格令人陰亦不充故宜六味滋陰桂附回陽此治陰盛格陽虛陽浮越而發躁之正法若少陰煩躁同見口渴唇燥舌紫而干脈細而數手足微厥躁擾不寧者又當滋少陰之陰左歸固本之類主之邵評此水虧火旺水不得制火而煩躁較上條陰盛格陽陰極發躁之症似輕上條滋陰回陽此是壯水制火凡心煩懊憹不得眠不與躁同見者均非虛寒當作熱治大便不祕者只以梔子豉湯竹葉石膏湯溫膽湯主治無論三法前三法後皆可用也邵評但煩而不躁懊憹不眠此是陽經熱邪而非虛寒症也若大便不祕其邪熱在於膈間未入胃腑宜清上中二焦無形之熱邪清則煩自止矣此治陽經熱邪但煩不躁之正法若煩躁同見太陽有不得汗出而煩躁大青龍症是也少陰有吐利手足厥冷之煩躁四逆輩症是也又有誤下復汗之煩躁晝不得眠夜則安靜乾薑附子湯主之是也邵評太陽風寒表間無汗陽熱內擾而煩躁此陽盛也大青龍麻桂以發汗石膏以清熱除煩也若少陰病上吐下利手足厥冷而煩躁此陰虛陽浮不相交戀欲外亡也四逆以回陽參苓以滋陰下後復汗汗出而里陽將脫故煩躁也晝不得眠陽虛而邪據也夜則安靜陰不虛也獨任乾薑附子二味以急回其陽可知煩躁同見有陽經陰經之各殊虛實表裡之不同若獨躁不煩而同三陰症見便是陰寒之躁宜四逆理中等湯主治然煩躁見於三陽者多生見於三陰者多死邵評躁本屬陰獨躁不煩且同三陰症見是純陰無陽之候非大劑溫中扶陽不可若煩躁見於三陽陽經熱實邪退自安故多生見於三陰陰竭陽浮散脫之象故多死停飲述古飲即水也傷寒停飲症最多每見於太陽少陰臨症者都忽此因備述之以便查閲如太陽中風渴欲飲水水入即吐者名曰水逆五苓散主之此水停於胸中故水入不能容也邵評太陽中風表未解也渴則風熱而傳裡渴欲飲水水氣不行而反上逆則吐是為水逆必其人素有水氣邪水內結用五苓散導水泄熱的是正法又評水逆者其人必素有水氣中宮之陽氣不宣邪水凝結於內水飲拒絶於外既不外輸元府而為汗又不上輸於口舌而渴飲亦不下輸膀胱而小便不利此水逆所由名也如誤下之心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之此治痞而痞不解反渴亦水停心下之故非痞也水停心下則津液不得上升故渴邵評下後成痞與瀉心湯而痞不解心下有水氣飲邪內蓄熱結膀胱氣不輸化因反上逆故見渴而躁煩小便不利等症與五苓散利水泄熱使小便利則痞與消渴俱止矣如脈浮小便不利微熱消渴者與五苓散主之此小便不利渴而能消水者水蓄膀胱也脈浮身熱病在太陽也故用五苓微汗以利水則愈邵評脈浮微熱表未盡除也渴而消水小便反不利是水氣與熱邪內結膀胱而未散也與五苓散導水泄熱內有桂枝兼治其表而微汗之蓋此小便不利渴而能消水者水蓄膀胱也脈浮身熱病在太陽也故用五苓微汗以利水則愈凡服五苓多飲暖水取汗者欲其散達營衛表裡俱解也邵評暖水可多服則水逆者是冷水水能制火而潤土水土合和則氣化流通同五苓散解表泄熱而病自愈也然水亦不可恣飲少少與之胃和則愈如多飲必致水氣為患而有悸喘等病矣太陽中風其人漐漐汗出頭痛心下痞硬滿引脅下痛乾嘔短氣汗出惡寒者此表解內有蓄水也十棗湯攻之以上諸條皆太陽熱邪停水邵評此外中風邪內有懸飲之症其人汗出頭痛似乎表症然不惡寒發熱心下痞硬而滿牽引脅下而痛乾嘔短氣等症是表邪已解心下之水氣濕熱泛溢上攻於腦而頭痛汗出也既知其表之風邪已解而里之水氣淫溢用十棗湯攻其飲而下其氣此治懸飲內踞水蕩三焦之正法然必審其表邪已解然後可攻其飲太陽傷寒表不解發熱無汗乾嘔而咳或渴或利或喘或小便不利者此心下有水氣也宜小青龍湯外散寒邪內散寒飲邵評發熱無汗是表不解乾嘔而咳是水氣為患飲寒相摶逆於肺胃之間也飲之為病隨氣升降水氣下而不上則或渴或利上而不下則或喘或噎留而不行則小便不利表寒與水飲內外合邪用小青龍湯以兩解表裡之邪立加減法以治或然之症也如咳而微喘發熱不渴服小青龍湯已反渴者此寒飲去也邵評內飲外寒相得不解水氣射肺為咳而微喘水氣上升是以不渴服小青龍已而反渴者水氣內散寒邪亦外散也解肌或下之後仍頭項強痛發熱無汗心下滿微痛小便不利者此有水氣在心下也宜桂枝去桂加茯苓白朮湯主之小便利則愈邵評頭項強痛發熱無汗表未解也心下滿微痛飲在裡也此表邪與水飲凝結不解病根在心下而病機在膀胱當察其小便若小便利病為在表仍當發汗若小便不利病為在裡是太陽之本病非桂枝未罷也故去桂枝而加苓朮不欲散邪於表故但飲逐於裡飲去則表邪亦解矣因此水結中焦只可利而不可散病不在表而去桂枝加苓朮者所以利小便而燥停水也此症頭痛發熱表症仍在若小便利鬚髮汗今小便不利病在太陽之裡法當利水去桂枝者因無汗也不用峻藥利水者因汗下之後也以上皆太陽寒邪停水邵評此著眼小便不利雖有表症但利水而不兼散與小青龍五苓散不同法但得膀胱水去而太陽之表裡症悉除所謂治病必求其本也如少陰病當欲寐至七八日反心煩不得眠是少陰熱邪上擾也下利而渴咳嘔小便不利者是水飲停蓄也宜豬苓湯以利水去熱此少陰陽邪停水邵評少陰病本欲寐至七八日心煩不得眠是邪熱耗陰挾心火而上擾也且下利而熱渴是下焦虛不能制水之故咳嘔煩渴者是腎水不升而心火不降也小便不利者水飲邪熱蓄於下焦也故用豬苓湯利水滋陰而升津液斯上焦如霧而咳渴除中焦如嘔而煩嘔靜下焦如瀆而利自止矣此治少陰陽邪停水之正法如少陰病至四五日四肢沉重疼痛腹痛小便不利自下利者此為有水氣也真武湯主之溫中以消陰水必少陰陰邪停水邵評此少陰寒邪陽微而氣不化水積下焦小便不利是病根腹痛下利四肢重痛皆水氣為患因小便不利所致用真武湯壯腎陽而消陰水也王晉三先生曰小青龍治動而逆上之水五苓散治靜而不行之水十棗湯大陷胸丸治中焦之水瀉之於內也桂枝去桂加苓朮湯治下焦之水引而竭之也十棗湯治瀰漫之水大陷胸治痞滿之水真武湯治沉著之水小青龍入太陽治陽水功兼外散真武湯入少陰治陰水功專下滲小青龍治寒邪未解之水故溫以汗之十棗湯治陽邪未解之水故引而竭之邵評治水之方有寒熱表裡利散之不同醫者必須辨明心下悸述古心下悸者心下築築惕惕怔忡不寧之狀也邵評悸者心中跳動也有虛實之分心虛血少則悸水飲凌心亦悸肝膽痰火上逆亦悸務須辨清用藥傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬在胃必作利也邵評傷寒寒勝則厥心下有水則悸厥而心悸者寒中於陰而水聚於心下也宜以茯苓甘草湯先治其水水去然後治厥否恐水漬入胃而作利利作則厥不回矣蓋心下悸是有水氣乘其未漬胃時先治之不致厥利相連此治法之次第也如飲水多而小便少心下悸乃水停心下水氣犯心也茯苓甘草湯以治其水邵評飲水多而小便少水無出路而停於心下水氣上逆作悸亦用茯苓甘草湯甘淡利水而益中氣水去則心悸自止若心下悸而厥冷身瞤動者因虛而腎水上犯也宜真武湯以鎮腎水邵評心下悸是水氣之徵此腎陽外亡腎水凌心故厥冷而身瞤動心屬火而水乘之則悸腎虛火炎水邪因得上侵用真武湯降火利水而鎮逆此治少陰陽虛腎水凌心而悸之正法以上數條水氣凌心作悸若汗後心中悸而煩者虛也宜小建中湯以補心氣邵評陽氣內虛則心悸陰氣內虛則心煩悸而煩者正不足而欲入內也不可攻其邪當用小建中湯溫養中氣之虛中氣立則邪自解即不解而攻取之法亦可因之而施矣又評小建中湯治虛悸虛煩若水氣衝心而悸熱邪壅膈而煩者此湯不宜輕用若傷寒邪入厥陰已成敗症脈結代心動悸者陰液涸也炙甘草湯主之邵評脈結代者邪氣阻滯營衛之氣澀少也心動悸者神氣不振都城震驚也此邪氣深入厥陰陰液幾涸故用復脈湯陰陽並調之然此邪入深沉陰陽並耗脈失常度而見結代是陰脈也傷寒有此是陽症見陰脈故多死不得已用此方以背城借一耳若病後心氣虛而怔忡不寧聞聲即驚者宜鎮心神以補心氣如茯神遠志棗仁丹參當歸龍齒辰砂金箔之類邵評病後陰傷營弱血少不能養心心氣大虛虛火上擾而怔忡驚悸也治以養營補心安神一法此病後心虛營弱而怔忡心悸之正法如因驚而得怔忡者亦由心虛有痰也宜茯神棗仁川貝天竺黃鉤藤丹參竹茹半夏辰砂金箔之類鎮心神以去驚痰邵評驚則氣亂擾動肝火上逆其人心氣素虛內有伏痰肝膽木火乘虛凌心而怔忡心悸也宜以清心滌痰降火之劑此治心虛有痰因驚而怔忡者的是良法以上四條由虛而心悸嘔吐新法兼參葉案按靈樞經脈篇云足厥陰肝所生病者胸滿嘔逆夫木動必犯土嘔吐出於胃而致病之由在肝胃病治肝不拘傷寒雜症皆然不可專以胃火胃寒為治邵評嘔吐為胃氣上逆其胃氣之所以上逆因肝木犯胃所致夫嘔吐之因不一有胃陰虧者有胃陽虛者有胃火盛而熱邪內結者有胃中寒而濁陰乾犯者有胃中有痰飲而氣不下降者雖有多因總因肝火上升乘虛犯胃以木土相仇肝木剋土而順乘陽明也治嘔吐者當兩和肝胃為法肝火犯胃凡痞脹食入即吐並嘔酸水口渴舌黃此肝火犯胃恆因惱怒而得宜吳萸川連半夏茯苓厚朴枳實薑汁竹茹之類主之邵評此方平肝火而和胃最效胃火沖逆凡陽明熱病舌苔燥黃煩渴嘔惡脈來洪滑米飲入口即嘔惟涼水可納者宜白虎湯重加活水蘆根主之邵評此方清胃經火熱極效肝火沖逆凡傷寒熱盛之時自覺氣自左升嘔吐勺水不納脈弦數舌燥刺或嘔吐酸苦黃水此肝火上乘於胃宜左金半夏陳皮黑梔薑汁炒茯苓椒梅等降之泄之或用薑汁炒川連或用吳萸湯炒川連治嘔最驗胃脘陽虛凡食入嘔吐或納少不變脈細小而弦或右脈弦大脘中滿痛大便欲解未通此胃脘陽虛肝木未亢治宜專益胃陽人參半夏茯苓陳皮乾薑吳萸主之胃氣不降夫脾主升胃主降若因怫怒動肝肝木犯胃胃陽受傷不能傳及小腸變化失司大便不解納穀不飢吞噫酸水甚至胃底釀積之物上湧為吐此胃氣不主下行故也法當溫胃陽制肝逆為治宜熟附乾薑白芍吳萸枳實炒白粳米主之邵評脾以上升為宜胃以下行為順因怒動肝肝逆乘胃胃氣不得下行食不變化挾肝火上升而嘔吐也此與上條不同上條只胃脘陽虛無肝木乘侮專理胃陽為治此則胃陽受傷因怒而肝火上升犯胃故吞噫酸水酸為肝味也胃升不降甚至胃底上泛湧逆吐出其胃陽之衰弱已極肝木之亢逆莫制幾有胃陽虛脫之變急當溫胃通陽制肝降逆為治肝逆犯肺凡病氣自左升腹中膨脹嘔吐涎沫酸苦黃水則咳嗆不已此肝氣逆乘過胃犯肺法宜制肝和胃須陳皮半夏茯苓川椒烏梅萸湯炒川連薑汁炙枇杷葉主之邵評氣自左升者肝氣也肝氣升則為腹脹犯胃上逆則吐涎沫酸苦黃水肝挾相火木火刑金乘肺而作咳嗆已過胃而上升莫制矣宜平肝和胃治之陰濁犯胃有氣從小腹上衝為嘔為脹所吐皆黑緑苦水此屬下焦陰濁沖逆犯胃厥陰穢氣上逆也宜川椒烏梅連制茱萸茯苓川楝子醋炒小茴香鹽水炒黑梔子薑汁炒等以制肝逆胃氣虛者加人參邵評少腹為肝之部分肝居下焦其氣上衝則濁陰隨之上逆故嘔而且脹吐出黑緑苦水是胃底之濁水被下焦之陰濁沖逆而上泛也急當鎮胃平肝通陽泄濁治之肝絡伏飲凡氣衝偏左厥逆欲嘔嘔盡方適此伏飲在於肝絡也宜辛以通之淡吳萸鹽水炒半夏茯苓薑汁旋覆花代赭石主之邵評肝主一身脈絡從左上衝者肝氣也肝挾飲邪上逆入於絡中則厥而嘔吐宜和肝宣絡滌飲治之熱邪內結痞悶嘔濁不寐不飢舌黃口渴治宜苦辛瀉心法黃芩川連半夏枳實薑汁邵評熱邪痞結陽明治以苦辛開泄暑穢內結吸入暑穢先走募原募原是胃絡分布故上逆而為嘔吐脘悶而痛寒熱不解舌黃而渴宜瀉心法薑製川連黃芩半夏枳實藿梗滑石通草鬱金邵評暑穢自口鼻吸受從上直行中道而走膜原膜原者脾與胃以膜相聯為半表半裡之界暑熱穢邪結於膜原而嘔吐寒熱宜苦辛開泄治之然惟舌黃可用瀉心法又評舌白苔者不宜陷胸瀉心宜杏蔻桔橘苦辛開肺如邪入膜原舌苔粉白當用吳又可達原飲舌黃膩厚者非瀉心不可濕熱相蒸胃中有火脾家有濕濕熱相蒸以致嘔吐不納時飽時飢渴不多飲舌苔微黃黏膩此胃熱蒸脾濕之驗也治宜寒熱兼施川連乾薑茯苓半夏廣皮黃芩澤瀉枳實薑汁邵評脾濕胃熱蘊結中宮格拒不開而作嘔吐治以和中開痞清滲濕熱為主痰飲兼寒嘔吐不渴舌苔白滑或兼咳嗽者此痰飲兼寒邪也二陳湯加桂枝乾薑薑汁邵評寒飲內伏於胃上升射肺故嘔吐咳嗽寒邪有飲則口不渴白滑苔者寒痰也故用滌痰溫散之法痰飲兼火嘔吐微渴兼見咳嗽舌苔淡紅而鮮或帶微白者此痰飲兼胃火也溫膽湯加枇杷葉薑汁炙黑梔子薑汁炒邵評和胃化痰宣肺清熱此方極效胃中虛寒納穀不受時嘔涎沫舌潤不渴右關濡軟六君子加砂仁乾薑嘔涎沫者加益智仁攝之吐痰飲者加桂枝姜皮和之邵評寒邪格拒不納有寒飲則嘔涎沫無熱則舌潤不渴脈濡軟胃虛也故用補中化痰而溫散熱傷胃津暑熱之邪不解灼干胃中津液舌紅鮮澤口渴食入即嘔當戒腥油膩物二陳湯去甘草加叉斛薑汁炒竹茹或溫膽湯去枳實甘草加梔豉金斛邵評濕熱暑疫之邪入於陽明胃中津液受傷而嘔吐津虧胃熱則舌鮮紅而口渴故以和胃生津化痰為治胃陰虛餒如大汗後胃中津液大虛嘔吐不納口渴舌苔白嫩者宜金水六君煎加麥冬沙參以和胃陰嘔吐不已此有升無降宜鎮逆法旋覆花代赭石半夏茯苓會皮虛者加人參邵評胃不下行而上逆氣升嘔吐用鎮逆降胃之法極是吐蛔胃氣虛寒素有內寒之人復感寒邪當溫中散寒若大發其汗胃中谷氣化汗外達則胃氣轉餒蛔失穀氣以養則不安而上逆仲景云病人有寒復發汗胃中冷必吐蛔是也故凡傷寒吐蛔雖有大熱忌用寒涼乃大凶之兆急用理中湯去甘草加椒梅主之蓋蛔聞甘而起遇酸而伏見苦則安也蛔吐不止者死吐蛔不能食者亦死以上述古邵評中陽虛而受寒宜溫中散寒為治反大汗之則胃陽益傷不能化穀氣以養蛔則蛔上逆而從口出也蓋陽虛而有寒邪復發汗以傷其陽則胃陽虛而胃中冷故用椒梅理中湯法溫之肝邪犯胃按吐蛔仲景列於厥陰篇內則為肝邪犯胃可知凡傷寒如見寒熱乾嘔心胸格拒或吐痰涎濁沫或吐酸苦黃緑之水或吐蛔下蛔皆屬厥陰乘犯陽明治宜泄肝和胃如川連桂枝烏梅川椒炒黑生白芍淡吳萸鹽水炒黃芩茯苓之類如泄肝和胃不效乃胃中虛空若谷客氣逆犯上衝須鎮逆安胃宜人參茯苓半夏代赭石炒川椒烏梅肉川楝子之類邵評厥陰屬肝木為至陰之經陰極則陽生木中有相火凡病邪傳入厥陰深沉之至邪每挾木火內燔勢必順陽明而犯胃傷耗陰津胃液而見症如此治宜泄厥陰以安陽明為法邪陷厥陰傷寒暑濕溫熱之邪上阻氣分則身熱耳聾入於營分則舌絳神昏治法當清解心營肺衛如連翹淡竹葉滑石粉川貝母天竺黃鮮菖蒲炒竹茹緑豆皮之類以清上焦若身熱不解口渴胸痞耳聾乾嘔吐蛔拒納此暑濕內蒸其邪漸結厥陰之界乃險症也宜川連半夏枳實菖蒲茯苓黃芩乾薑苦辛以開內結邵評溫熱暑濕之邪從口鼻吸受始在上焦氣分或漸入營與傷寒見症不同治法亦異當宗河間三焦立法分心營肺衛論治上焦之邪不解蔓延中下而入里可以治同傷寒故治溫暑與傷寒始異而終同也惟藥味宜輕清宣泄上焦滌痰化熱邪結氣分如吐蛔與飲脘悶口渴舌苔白中帶黃此濕熱結於氣分胃中不和而蛔逆也宜二陳加乾薑川連以上參葉案邵評此痰飲挾濕熱結於陽明氣分胃熱氣逆而蛔上出胃有痰熱則舌苔白中帶黃邪內結則脘悶用二陳以化痰姜連以開痞達邪噫噯述古經云寒氣客於胃厥逆從下上散復出於胃故為噫大抵此症傷寒汗吐下後或大病後多有蓋汗下後邪氣雖解胃氣弱而不和三焦失職清不能升濁不能降是以餘邪留連於胃噯酸作飽胸脘不爽仲景所謂心下痞硬噫氣不除是也治以旋覆代赭湯所以宣陽氣而鎮陰逆陽氣宣達則陰邪不得阻格升降順痞硬散而噫氣自除矣邵評中陽虛弱寒氣入胃寒挾胃氣上逆升而不降氣從喉出有聲為噫氣也噯氣者因氣抑遏不宣上逆作聲而噯氣每有飽食之後而作者可知其因於胃氣鬱滯也二症不同噫氣為虛噯氣為實當分別施治惟噫氣每於汗下或大病後見者是中虛胃弱氣機不和餘邪留伏清濁升降不得自如氣逆為噫也若胃有停滯而挾肝火則噯酸飽悶濁凝氣滯則心氣痞硬而噫氣此方補中通陽軟堅開痞而鎮濁逆的是良法若濕飲內傷陰濁聚胃以致胃陽受傷濁陰上犯噫氣噯酸中焦格拒治宜安益胃陽以鎮陰逆人參半夏茯苓乾薑旋覆花代赭石主之此條參葉案邵評濕飲陰濁內聚胃陽虛弱失運氣逆不降中脘格拒而噫氣乃陽虛濁逆之症也當以開痞鎮逆通補陽明為治厄逆新法兼參葉案厄逆者聲自下逆上俗名厄忒是也不拘傷寒雜症皆有所因不一治法各宜隨症施治邵評厄逆一症有虛實寒熱之因中焦下焦之別是氣升上逆之病外感內傷均有此症當辨因分症施治陽虛陰逆有因寒涼太過胃中虛冷濁陰上逆以致厄逆嘔吐或腹痛下利兩脈微弱治宜理陽驅陰人參附子丁香柿蒂茯苓乾薑吳萸主之若兼吐黃緑苦水胃虛陰濁上干也去附子加代赭椒梅邵評寒涼傷中胃陽虛弱濁陰上逆氣不下降而厄逆嘔吐也當用溫胃通陽以泄濁陰肝木犯胃氣逆厄忒脈小舌白厥逆寒戰此肝氣犯胃用鎮肝安胃法人參半夏茯苓乾薑丁香柿蒂代赭石炒川椒炒粳米邵評中虛胃弱肝木乘虛上逆胃氣不降而厄忒胃陽虛而有寒故舌白寒戰肝氣上升則厥也宜以溫胃泄肝鎮逆為治肺鬱氣逆面冷頻厄咽中不爽此肺氣膹郁病在上焦宜開氣分之痹俾清陽得舒胸次方能開達薑汁炙枇杷葉川貝母川鬱金香豉桔梗通草竹茹之類主之邵評氣鬱於肺不得下降清陽痹阻而頻厄治以宣肺開氣肺氣宣行則諸氣流通而下降厄自止矣宜以輕清開提肺氣宣泄上焦為治陰飲上逆攻伐太過胃中陽虛飲濁上逆為厄舌苔白潤治宜溫通半夏茯苓丁香柿蒂吳萸薑汁之類如生薑半夏湯丁香柿蒂湯茱萸理中湯皆可選用邵評攻伐多是寒涼以傷中陽陽虛則伏飲上逆而作厄忒也舌白潤寒飲苔也宜溫胃陽以散寒飲為治胃虛有熱如厄逆而渴舌苔微黃此胃虛有火虛火上逆而厄也宜橘皮竹茹湯或溫膽湯去枳實加薑汁炙枇杷葉如胃中有痰飲脈沉而弦宜橘皮半夏生薑湯邵評胃虛內有伏火故口渴而舌苔微黃虛火上逆胃氣不得下降而作厄也治以清降胃火一法此與上條同是胃病有寒熱之不同用藥有溫清之別上條陽虛欲逆故用溫通此條胃虛有火故宜清降當合參之如痰飲脈沉而弦弦為飲而沉為在裡也用滌飲和胃之法肝火上逆如厄逆舌黃而渴左脈弦數此肝火上逆為厄也宜川連吳萸黑梔代赭枇杷葉半夏茯苓之類降之邵評肝火上升胃逆不降而厄舌黃而渴肝火灼胃也左脈弦肝之本象數則肝火乘胃而逆也治以平肝清火和胃降逆之法中焦虛冷如脾胃虛寒寒氣格逆而厄者脈來濡緩右關軟大舌嫩不渴宜理中湯加丁香溫之邵評中虛寒氣上逆格拒於中胃氣不降而厄逆也故用溫中扶陽之法下焦陽虛凡厄逆起自下焦渾身振動者乃屬下焦虛寒陽氣竭而厄也宜理陰煎加丁香五味胡桃肉以納之或都氣飲加熟附胡桃丁香以納之不已則死邵評厄逆自下焦而來肝腎大虛氣不攝納由丹田而沖逆故渾身振動此元海無根虛脫之候宜攝納下焦肝腎治之陰火沖逆如六脈細數面赤顴紅而厄者陰火上逆也都氣飲加胡桃肉柿蒂以納之邵評陰火升逆當用滋腎丸或大補陰丸壯腎水而滋陰火格陽厄逆若高年命門火衰虛陽上逆而厄者必面赤戴陽足冷下利六脈微弱宜熟附都氣飲加人參丁香胡桃肉紫石英之類納以鎮之以上三症五味須重用邵評命火衰微陰寒內伏阻格虛陽上逆而作厄陰盛格陽也宜用回陽鎮納之法胃陰虛餒有發汗太過胃中津液枯涸以致厄逆嘔吐宜金水六君煎加北參麥冬丁香柿蒂和中以生津液汗出不已加五味邵評汗多而胃陰受傷津液虧耗胃氣上逆而厄者宜養陰生津以和胃若汗多則津液益虛用五味以斂之中脘食滯凡厄逆脘痛胸中脹滿者食滯為厄也宜二陳加楂肉厚朴枳實麥芽木香汁萊蔔子之類疏之和之邵評食滯脘中氣機阻遏升不得降而為厄者此胃實也故用運中消滯開氣之劑幽門濁逆傷寒表解之後大小便不通厄逆作嘔此糟粕未化與邪結於幽門幽門之氣不化則州都閉傳道失二便不行惡氣上衝於胃故作厄逆也宜利幽門利幽湯主之若大便祕結少腹硬痛而作厄逆者承氣湯主之此條出傷寒第一書邵評表解後津液受劫邪濁內結腸腑二便不通氣上衝至胃則厄逆作嘔所謂下既不通必反於上也幽門在下焦邪結於此則便閉故必通其幽門大便通行則濁熱下出而厄逆自止矣此亦實厄也若便閉硬痛此腸胃有燥屎而厄逆也用承氣湯攻下之喘新法合參景嶽金鑑葉案喘症之因大抵三法前多實喘三法後多虛喘在肺為實在腎為虛實喘宜開太陰虛喘宜固少陰外感之喘治肺內傷之喘治腎邵評喘有風寒火邪水氣痰飲寒包火鬱等因由於外邪在肺是為實喘下焦元海無根腎虛氣逆而發喘者為虛喘實喘宜開肺虛喘宜固腎至三法者汗吐下也雖云三法前多實三法後多虛然亦不可執總之外邪為實宜治肺內傷為虛宜治腎虛實之辨實喘氣急張口抬肩缺肚虛喘氣短似喘非喘而不張口抬肩缺肚也實喘肺氣不得宣暢滿悶只在膈間虛喘腎氣不能接續阻塞在於氣道邵評實喘由肺有外邪氣不宣暢而氣急發喘病在上焦故滿悶只在膈間也虛喘由腎氣不納虛氣上逆短氣發喘病屬下元虧乏也太陽病不解用小青龍湯治喘者治水氣干肺也用桂枝湯加厚朴杏子治喘者治寒邪在肺也用麻杏石甘湯治喘者治寒包肺火也述古邵評表有風寒內挾水飲犯肺而喘用小青龍散邪滌飲若寒邪在表氣鬱於肺而作喘用桂枝加朴杏散寒下氣但寒無汗而喘者用麻黃湯此則肺有火邪外寒包住內火故以麻黃湯去桂枝而加石膏陽明病發熱汗出不惡寒胸滿而喘用梔子豉湯者此陽明內熱出表非治外感也又陽明病直視微喘用承氣者此陽明壞病也述古邵評胸中為陽明之表滿而喘者熱上擾而氣不下降也邪在膈間用梔豉湯以泄膈間熱邪此陽明經病之表症若陽明腑病直視微喘者由於誤治而陰傷邪實用承氣者去邪以救正也傷寒有暴感寒邪惡寒無汗頭疼身痛寸脈沉伏而喘急者此寒邪鬱於太陽痰氣交阻於肺也法當開太陽之邪用麻黃川桂枝半夏杏仁旋覆花紫蘇葉橘紅生薑白芥子之類辛溫汗之邵評肺與太陽均為主表太陽表邪不解每每上侵於肺故開太陽表邪即是開肺治法本相通也此開肺疏表滌痰降氣之法如外感寒邪內束伏火咳喘煩渴氣口脈沉而數者宜外散寒邪內清肺火麻杏石甘湯加桑皮枯芩桔梗主之邵評此肺熱火盛輕寒抑遏於表只用麻黃一味散表余俱開肺清火之劑此條寒包肺火與上條表寒侵肺不同上條辛溫散表為治此條辛涼開肺為主病情不同治法亦異最當詳辨若咳嗽口乾氣逆而喘而不頭痛惡寒者火邪在肺也當以瀉白散加二母枯芩羚羊角之類以瀉肺火邵評此肺火發喘外無表寒與上二條不同只清肺火為治若氣逆咳喘胸膈凝悶氣口脈閉喘咳有痰聲者痰喘也治痰為主如前胡蘇子杏仁葶藶子橘紅象貝蔞霜半夏桑皮枳殼薄荷桔梗竹瀝薑汁之類選用邵評痰隨氣而上升肺氣逆而不降則咽中痰聲而氣喘也治以清痰降氣為主傷寒有表解之後而胸悶喘急者亦痰也急當治其痰蓋外感表邪雖去而內痰復發故喘必寸脈沉閉胸膈悶塞可證不可因表解後作虛治也以上皆實喘治肺邵評表寒已解而內伏之痰上升其氣阻於胸膈故悶而喘急也治以滌痰開化一法蓋此是痰喘無外邪夾雜與前數條因外邪發喘者不同且痰阻脈道故脈沉閉痰滯上焦肺氣不宣故胸膈悶塞是實喘而非虛喘也若因汗下之後發喘者乃真氣不能接續氣短似喘也病源在下其症呼吸喘促自丹田以上氣道阻塞不通提不能升咽不能降呼吸不能接續主治在腎以腎主納氣也當以景嶽貞元飲主之氣虛脈微汗大出者合參麥五味收之納之或生脈合左歸亦可足冷脈微者熟附都氣飲加胡桃肉以納之以上是虛喘治腎邵評汗下之後邪退正虛而發喘者乃元海無根真氣不納短氣不能接續似喘非喘由於下焦腎氣大虧此是虛喘與前列之實喘大異蓋丹田在下焦升逆直衝而上肺氣不得下行阻塞升降之機呼吸短促不能接續而似喘由於腎真失納根蒂不固所致治以攝腎固真納氣為主若飲邪犯肺作喘當以溫藥和之二陳湯加桂枝薑汁邵評寒飲射肺肺逆作喘當理肺滌飲治之古人云治痰飲者宜溫藥和之也奔豚述古注釋參古方選注奔豚者病從腹中有氣攻上一如江豕以臀憤起而攻也閲傷寒論凡傷寒發奔豚者二一曰燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯一曰發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之邵評針處被寒寒從針孔而入也核起而赤者針處紅腫如核寒氣所郁也心氣因寒而內虛腎虛因寒而上逆發為奔豚氣從少腹衝心寒邪挾水氣凌心也灸其核上以杜再入之邪與加桂湯以泄上逆之氣若臍下悸者心氣不足腎水乘火而上克也腎氣上衝名曰奔豚蓋腎為水臟豚為水畜也茯苓以泄水桂枝伐腎邪以保心氣甘棗培土以制水也因奔豚者豚為水畜奔則昂首疾馳酷肖水勢上干之象然悸在臍下其水尚在下焦欲作奔豚尚未發也當先其時而治之按此二症一屬少陰寒氣凌心故用桂枝加桂溫腎散寒病由外召寒邪仍從太陽表治惟加桂枝兩數便可以溫少陰而泄陰邪矣一屬水邪上逆故重用茯苓以制水邪桂枝保心氣以御水凌甘草大棗補脾土以制水泛取甘爛水者不欲其助水性也傷寒奔豚惟此二方為主治而汗後臍下悸作奔豚之症尤多定當以苓桂甘棗湯為治若夫金匱要略中所載奔豚湯方用半夏生薑散結芍藥甘草安中氣芎歸和心氣黃芩瀉火生葛欲降先升甘李根皮大寒折衝逆之氣此治因驚恐而得奔豚者其為病也聚散靡常作止無定腹痛沖逆發則為熱退則為寒乃心中熱邪凝結而成與傷寒水氣寒邪作奔豚者迥異不可混治邵評此言雜病亦有奔豚者與上傷寒之奔豚不同由於肝邪內發上犯於心肝膽相火內郁是奔豚之屬於熱者較寒水上凌逆心而作奔豚者大相徑庭矣蓋傷寒之奔豚因於寒以桂枝為主藥雜病之奔豚由火熱當宗金匱方為主王晉三先生曰奔豚氣有三犯肺之奔豚屬心火犯心之奔豚屬腎寒臍下悸欲作奔豚屬水邪證自分途治亦各異邵評心火克肺金由於火熱宜金匱方治之腎寒克心火由於寒用桂枝加桂法腎水上逆凌心由於水氣用苓桂甘棗方動氣新法參景嶽全書動氣者築築然動於臍旁上下左右甚者連及虛里心脅而渾身振動也此病由於妄汗妄下氣血大虧以致腎氣不納鼓動於下而作也或由其人少陰素虧因病而發恆見於瘦薄虛弱之人方書都以理中湯去白朮加肉桂倍茯苓治之以伐腎邪恐未切當蓋奔豚屬水邪而動氣屬腎虛不若八味飲加五味胡桃直培根本以收納腎氣多服自效邵評動氣由於土虛不能制水水氣凝結而成腎中虛氣逆乘土位也若虛里穴在乳下其動應衣宗氣泄也大虛之症治當大補蓋由妄汗妄下傷其正氣其人腎氣本虛素有動氣在於上焦因之而發腎真不納治以補腎納氣為主理中湯補脾土去白朮嫌滯氣也加桂苓泄水以伐腎邪然動氣一症是腎氣虧乏氣少收納非腎中水邪上逆與奔豚不同宜補腎氣不宜伐腎邪故用八味飲以補腎真加五味子胡桃斂納腎氣為治又評奔豚與動氣其因各異辨治極當凡傷寒至發動氣必腎氣大虧水火併衰其見證六脈遲軟舌潤不渴臍腹冷如冰暖爐晝夜不捨飽則動緩飢則動甚於此可知其虛非大劑八味多服不除寒甚加炮姜若止少陰水虧動氣亦不甚必有舌乾口渴脈數可憑宜都氣飲加胡桃肉以納之左歸飲加減亦可邵評陰虧虛熱見症脈象與陽虛者自是不同都氣飲六味丸加五味子以補陰納氣壯水之劑此言傷寒之發動氣者雜症虛亦發動氣宜照本病施治如怯弱痢疾之類邵評雜症之有動氣總由脾腎兩虛參合其所患之本病而辨別治之戰振栗合參準繩金鑑戰身抖聳動也振亦聳動比戰稍輕也栗心內發抖也振輕而戰重戰外而栗內也邵評戰者身體抖搖不定如交戰之象有形外見也振則一身振搖比戰似輕亦有形可見也栗則無形外見但心內凜凜似痙抖比戰振輕為邪重耳戰為正氣勝故正與邪爭爭則股栗而戰矣振為正氣衰衰則不能爭故止於振聳耳栗亦正衰邪勝不能外戰而內栗也總之戰為正氣勝而栗為邪氣勝振為正氣衰而戰為邪氣衰也三者皆邪正相交故爭也邵評正氣未虛而能勝邪邪正交爭則為戰戰則邪從汗而解矣振為正氣虛弱不能與邪相爭故不作戰而但振搖耳栗為正氣虛弱邪氣正盛正虛不能勝邪故不能外戰而內栗也總之正勝邪衰則戰而邪達振則正氣虛而邪氣亦不盛故不作戰而但振搖邪不能外解耳栗為正衰邪旺正不勝邪邪氣內擾正不與邪爭但心內凜凜而發抖也此症若生於三法之前乃邪衰正復之兆欲作戰栗汗出而解也當靜候其戰汗不可遽投湯藥若生於三法之後則為氣血兩虛不能榮養筋骨故為之振搖不能主持也當大補氣血人參養榮湯主之身搖不得眠十味溫膽湯倍人參邵評三法者汗吐下也三法之前正氣未傷與邪爭勝邪不勝正則周身發戰戰則汗出邪氣從汗而外解也發戰之時宜安舒靜臥不可擾亂投藥以阻其邪出之機若汗吐下之後正氣已虛不能送邪外出營血衰耗不能滋養筋脈故但振振動搖無以自主而不能作戰也宜補氣養營治之筋惕肉瞤參準繩此症皆因發汗太過邪熱未解血氣已傷筋肉失養所致宜大補氣血人參養榮湯之類邵評惕抽掣也瞤跳動也筋惕肉瞤因血液虧少熱邪內伏筋肉無液滋養熱入陰中而燔灼致筋抽而肉跳乃虛候也故治以大補氣血之法若未經過表由其人素稟血少邪熱傳於血脈之中火性動惕而然當作血虛火燥生風治宜加味逍遙散去白朮加生地鉤藤此條參西塘感症邵評未經表汗而筋抽肉跳由其人素稟血虛不待汗而陰液已傷邪熱入於陰分陰虧火旺血熱生風故見此症治以清營化邪滋液熄風之法與上條之汗後純虛不同若傷寒未經過汗六七日經脈動惕其肉不瞤潮熱譫語大便閉結小便赤澀以手按臍旁硬痛此有燥矢也加味大柴胡湯邵評此是實熱與上之虛症大異當合參之如傷寒十餘日曾三四次發汗過多遂變肉瞤身振筋脈動惕此因汗多傷其氣血加味人參養榮湯主之邵評傷寒日久不解正氣已虛又復發汗過多陰血亦耗氣血兩虛筋肉失於滋養而見瞤振動惕之症宜大補氣血為治如汗後虛煩不得眠筋惕肉瞤此血虛兼火也十味溫膽湯去五味加柴芍川連邵評汗後虛煩肝膽有火陰虧挾痰故見不眠惕瞤等症宜用補氣化痰兩和膽胃之法循衣摸床撮空三者皆大虛之候乃精神耗散不能主持也當以獨參湯左歸飲大劑與之每有獲生者參西塘感症邵評循衣摸床撮空三症多相因而見由於陰虧熱盛元神耗散不能自主虛則喜實之象用獨參以補元神左歸以壯腎水救之陽明熱極失治致循衣摸床微喘直視脈弦者生脈澀者死此屬陽明壞病脈弦則超超而長胃氣尚存故可下以承氣然亦危極矣要知生者未必盡生而脈澀斷無不死下亦死不下亦死也述古邵評陽明熱極邪實於中陰氣幾將涸竭而見循衣摸床微喘直視之症元神亦耗散無主矣故必診其脈如見弦象尚有胃氣用承氣下其實熱以存一線之陰氣希冀生機若脈澀者陰竭血耗必死無疑太陽火劫取汗陽盛傷陰而致循衣摸床陰若未竭則小便利可生陰若已竭則小便不利多死參金鑑邵評火劫陰傷陽熱盛極神被火迫而不守致循衣摸床以小便之利不利驗其陰氣之存亡陰存則生陰竭則死不便不食不便能食傷寒有不便而不食者必須滋養胃陰胃陰充溢自然邪去便通而思食矣如養未足邪不即去不食不妨也邵評不便不食胃液虧而有邪滯也陰虧故不便胃有邪滯也陰虧故不食胃有邪故不食治須滋養胃陰陰液恢復則邪自退矣傷寒有不便而能食者致新推陳倉廩滋益自能通利不便無憂也二條出西塘感症邵評不便能食陰虧而胃無邪滯也液虧則不便胃無邪故能食一味滋陰養液陰液充足大便自通百合狐惑陽毒陰毒按百合狐惑陰陽毒四症其病脈證治並詳於金匱要略三卷內百合症仲景論之最詳治法亦備貞嘗留心於此而遇斯症甚罕故不敢述狐惑蟲病也狀似傷寒或傷寒後變症蝕於喉為惑蝕於陰為狐面目乍白乍赤乍黑默默欲眠惡聞食氣蝕其喉則聲嗄甘草瀉心湯蝕其肛則咽乾苦參湯洗之或雄黃熏之又狐惑即近時之疳症也牙疳即惑下疳即狐說詳金鑑邵評金匱注曰看其上唇內有瘡如粟唾血心內懊憹痛此蟲在上食其五臟下唇內生瘡者其人不寤此蟲食下部是也陰陽毒考諸金匱陽毒面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之陰毒面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之邵評毒者邪蘊不解也陰陽非指臟腑氣血以面赤喉痛吐膿血其邪著而在表者謂之陽言此邪適中人之陽而非極熱之謂也面目青身疼咽痛不吐膿血其邪隱而在表之裡者謂之陰言此邪適中人之陰而非極寒之謂也故俱用辛溫升散以發其邪甘潤咸以安其陰陰毒去雄黃蜀椒二物者恐陰不可劫而陰氣反受損也五日邪氣尚淺發之猶易故可治七日邪氣已深發之則難故不可治按仲景所稱陰陽毒乃感其異氣入陽經為陽毒入陰經為陰毒故於陽毒用蜀椒雄黃之溫且猛者以驅陽經之邪而於陰毒反去蜀椒雄黃止用鱉甲當歸升麻甘草等入陰以散邪不取其溫烈也若後人所述陰毒陽毒乃是極熱極寒之證自應以極熱極寒方藥為治不得執定仲景之方邵評二症俱咽喉痛以此症邪從口鼻而下入咽喉故痛甚至有心腹絞痛大滿大脹通身脈絡青紫暴出手足指甲色如靛葉口噤牙閉心中煩悶而亂死在旦夕不必問其陰陽但刺尺澤委中二穴及手中十指脈絡暴出之處出血如症輕者用刮痧法隨服紫金錠或吐或下或汗出而愈
