body:
  text: 卷四傷寒類症內經云熱病者皆傷寒之類也蓋六氣為病皆能發熱故善治傷寒者必能窮究六淫之氣凡溫熱暑濕疫癘之類傷寒者無不一一辨晰明白而施治各當要知能治類症即是能治傷寒以類症實居傷寒之八九也今將類症治法列於後庶幾溫熱暑濕之症不致混入傷寒正病之治其於傷寒思過半矣邵評傷寒症邪從肌表而入先表后里從六經辨症用足經藥辛溫表散溫熱暑疫邪由口鼻吸受宗三焦認症從手經用藥忌用足經辛溫藥如此溫暑與傷寒方不相混風溫參葉案凡天時晴燥溫風過暖感其氣者即是風溫之邪陽氣熏灼先傷上焦其為病也身熱汗出頭脹咳嗽喉痛聲濁治宜辛涼輕劑解之大忌辛溫汗散古人治風溫有葳蕤湯知母葛根湯內有麻黃羌活等藥皆不可用風溫吸入先傷太陰肺分右寸脈獨大肺氣不舒身痛胸悶頭脹咳嗽發熱口渴或發痧疹主治在太陰氣分梔豉桑杏蔞皮牛蒡連翹薄荷枯芩桔梗桑葉之類清之解之痰嗽加貝母聲濁不揚加兜鈴火盛脈洪加石膏咽痛加射干飽悶加川鬱金枳殼乾咳喉燥加花粉蔗漿梨汁咽喉鎖痛加萊菔汁邵評溫邪由肺而入於胃熱傷肺胃之津病在上中二焦故用大清肺胃熱邪生津潤燥為主治上中二焦之良法如發熱口糜氣穢者此溫邪劫傷肺胃之津也宜生地石膏知母麥冬花粉釵斛梨皮之類主之如肺脹喘急胸痛氣穢者此溫邪傷肺欲釀內癰也急用活水蘆根桃仁苡仁栝蔞皮冬瓜子空沙參黑元參連翹之類清之邵評熱邪蘊於肺鬱結不宣氣痰滯血瘀欲釀肺癰故見胸疼喘急痰氣穢臭之症用千金葦莖湯宣肺痹而行血降氣加味以清化肺熱為治此手太陰輕症也若手少陰厥陰二經當於溫熱症內合參之邵評以上邪初在肺其勢尚輕若肺邪不解傳入心營及心包絡經則入里而病重矣後溫熱症內所列各條治法相通當合參之溫熱春溫冬溫熱病同治參葉案煩勞多欲之人陰精久耗適遇冬月非時之暖感而即病者冬溫也春時木火司令天道溫暖新邪引動溫從內發者春溫也夏令炎熱感之即病壯熱煩渴而不惡寒者熱病也大抵溫熱之症陰精內耗強陽無制新邪一觸則燎原之勢直從里發故初起即見壯熱煩渴口乾舌燥等症而主治以存津液為要旨凡遇傷寒過經不解或發汗不徹反致昏劇者皆溫熱誤治之證也前陽明少陽條內已見大意而茲專以手三陰立言治宜互參邵評冬不藏精春必病溫陰虧是溫病之原故治溫熱病以保陰存津為首務若春溫夏熱二症亦俱有之冬月受邪伏藏不發至春時天暖外感時邪引動伏邪而發病者名為伏氣春溫若其人內無伏邪春天感受溫邪而即病者此即發之春溫也夏令受熱而即病者此即發之熱病也內有伏邪春令不發至夏至後壯熱而病者此伏氣所發之熱病也如此辨症方可明晰內經曰冬傷於寒春必病溫先夏至日為病溫後夏至日為病熱溫病發出之途自少陽熱病發出之病由陽明溫病主以黃芩湯熱病主以白虎湯至於傷寒延久邪已化熱與溫熱治法相通所謂傷寒與溫熱始異而終同也又評伏氣所發之溫熱病與感而即發之溫熱病見症稍異伏氣之病其邪從里而達於外表上無邪故初起即熱無一毫惡寒之象即發之溫病邪由肺受肺主皮毛故初起微寒繼即純熱不已如此辨認庶無錯誤手太陰氣分凡溫邪入肺症見頭疼惡寒發熱口燥舌乾脈數胸滿氣喘治宜辛涼輕劑梔豉橘紅桑杏連翹薄荷枳桔黃芩之類嗽加前胡蘇子象貝羚羊角之類邵評此受而即發之溫熱病首先入肺肺主皮毛而在表故見表症宜辛涼輕清以宣泄上焦肺衛之邪手少陰營分溫邪吸入由衛及營者其舌先白後絳也或竟入營分則舌必絳赤或紅中兼微白夜煩不寐神呆譫語宜犀角尖鮮生地淡竹葉麥冬連翹石菖蒲川斛丹皮之類兼痰者加川貝母天竺黃之類邵評此承上條由衛而入營亦受而即病之溫症也白苔邪在肺衛絳苔邪入心營自衛入營故舌先白後絳絳深紅色也紅中兼微白氣分之邪未盡也若熱擾心營則神蒙不能自主上條邪在肺衛其病尚淺此條由衛及營邪氣自外入內其病較深下條溫邪傳入心包絡中痰潮內閉其病尤深此皆受而即病之溫熱症宗心營肺衛主治故以宣營清熱達邪一法手厥陰內閉如溫邪傳於膻中即干心包絡痰潮內閉則神昏譫語舌苔純紅起刺此重症也急宜清心開閉用犀角連翹川貝天竺黃川鬱金石菖蒲淨銀花鉤藤鉤西黃之類主之邵評膻中為心之宮城邪入於此干犯心包熱逼心中挾痰濁互結致神昏譫語而邪陷內閉內閉則外脫正不勝邪之候也宜清心化痰開閉達邪之法再加芳香宣竅之品如紫雪至寶丹之類尤妙以上三條感而即發之溫熱病邪由口鼻吸受先入肺衛由肺傳入心營甚至逆傳入心包自外入內一層遞深一層三條當合參之溫邪劫液如發熱不退爍干胃中津液以致口糜氣穢當用甘露飲玉女煎之類邵評熱久陰傷灼干胃液不拘伏氣溫熱與受而即發之溫熱俱有此候口糜氣穢陰虛火旺也二方滋陰液以清胃火為治熱久煩渴少氣竹葉石膏湯效兼脘中痞悶不飢加半夏邵評中虛胃熱而作虛煩用養正清胃除煩降火為治足厥陰液涸若溫邪誤治邪必深入厥陰神昏音澀舌絳裂紋欲寐不寐午間煩躁形象畏冷心中如焚此正氣久虛陰液已涸宜復脈湯加減如生地麥冬炙草白芍阿膠丹皮梨汁之類邵評溫熱誤治邪入極深陷於肝經肝屬木而有火木火內燔陰液枯涸液涸風動故見症如此故用滋陰以清肝火為治邪氣血分風溫之邪入於營分不解以致舌赤音低神呆潮熱脈數左甚或發丹疹此邪過營已及血分也夫心主血邪乾血分漸成內閉風藥燥血固宜大禁即苦寒直走腸胃亦非溫邪逆入膻中心主所宜須犀角元參鮮生地川鬱金菖蒲丹皮銀花西黃之類主之邵評邪初入肺則在衛不解則入氣分氣分不解則傳心營營不解則入下焦血分矣邪在血分入里極深中焦俱病陰液受戕每多液涸內閉之候宜救陰達邪清營涼血治之至於膻中是包絡所居在於上焦用藥宜清輕而忌重濁此種藥味治邪入心包之劑若入血分當用地黃阿膠復脈湯方是血分治法氣血兩傷若感溫邪治不中窾熱毒內燔必至氣血兩傷如脈左數右大煩渴口糜舌赤唇焦是也宜玉女煎邵評溫邪誤治熱入陽明灼傷少陰陰液此少陰不足陽明有餘病在中下二焦也宜滋腎陰以清胃火邪結上焦溫邪從口鼻吸入則上焦先受氣血與熱邪混處膠固必致清竅不利凡寒熱後頤頷腫脹咽喉疼痛牙關緊閉脈左小右搏指者皆邪結上焦所致也當照疫症施治宜連翹牛蒡射干馬勃滑石銀花赤芍薄荷夏枯草人中黃之類選用邵評溫熱疫毒口鼻吸受蘊結上焦不得宣散發為大頭風毒頤腫咽痛等症此溫邪兼風毒而成治宜清熱解毒之法胃中不和若熱退後不飢不納者此胃氣不和也宜香豉山梔半夏枳實陳皮等和之邵評熱退而餘邪不淨胃氣不和故不飢不納當清化餘邪以和胃氣為治瘟疫合參按儺為古禮疫之由來尚矣奈何仲景傷寒書非全璧止言溫病熱病並無片言及疫是以後人無善治之法惟近世喻嘉言吳又可張景岳輩可謂論切治詳發前人所未發但景岳宜於汗又可宜於下嘉言又宜於芳香逐穢夫三子皆名家何治法之懸絕若此要知三子之治法皆當顧其所治之疫各有不同耳景岳所論之疫即六淫之邪非時之氣其感同於傷寒故每以傷寒並提而以汗為主欲盡汗法之妙景岳書精切無遺又可所論之疫是熱淫之氣從口鼻吸入伏於膜原膜原為半表半裡之界其邪非汗所能達故有不可強汗峻汗之戒附胃最近入里尤速故有急下屢下之法欲究疫邪傳變之情惟又可論最為詳盡然又可所論之疫是四時之常疫即俗名時氣症也若嘉言所論之疫乃由於兵荒之後因病致死病氣屍氣混合天地不正之氣更兼春夏溫熱暑濕之邪交結互蒸人在氣交中無隙可避由是沿門闔境傳染無休而為兩間之大疫其穢惡之氣都從口鼻吸入直行中道流布三焦非表非里汗之不解下之仍留故以芳香逐穢為主而以解毒兼之是三子之治各合其宜不得執此而議彼也茲於是症亦參三法為治而分為兩途蓋汗與下即同傷寒表裡之治而逐穢解毒一法乃疫邪匿伏三焦非表非里之治也分列於左治疫之大法得矣邵評景岳所論疫症是三時感冒非其時而有其氣名為三時寒疫邪由肌毒而入故同傷寒治而先用汗法若又可所論疫症是濕溫痧暑熱邪從口鼻吸受伏於膜原膜原者脾與胃以膜相聯為脾胃半表半裡之界邪伏於此入胃最速邪既在胃故以下法為治此是溫熱濕濁之邪襲入六經而傳陽明胃腑是四時之常疫即濕溫嵐瘴時氣之症與毒癘天行瘟疫之病自是兩種截然不同景岳所言是即受溫熱邪已入胃故景岳主汗而又可主下也此二者可從足經同傷寒論治分為一途至嘉言所論是真瘟疫大病乃天地不正之氣惡毒瘴癘合病氣口氣交結互蒸人受其氣由口鼻吸入直行中道流布三焦最多閉結故用芳香逐穢解毒開化之法此毒厲疫邪與前二症各殊不同傷寒治法分逐穢解毒合行一途為兩大法門也瘟疫大病別有一種厲毒之氣極易傳染故每病一家長幼相似甚則沿門闔境傳染不休也三子論治不同各有其症當隨症審察合宜而用不可拘執一說也長幼傳染眾人一般此疫氣流行俗名時氣是也乃天地穢惡之氣都從口鼻吸入然有兼六淫者有不兼六淫者有入足經而為表裡者有入手經而忌汗下者當分途而治其辨在舌邵評六淫者風寒暑濕燥火六氣之邪此四時之常氣也大疫發時或挾寒或挾暑所謂兼六淫也總之純是癘疫為病當分邪從肌表而受則入足經可用下汗法邪由口鼻而受則入手經宜宗三焦立法從心營肺衛施治忌用汗下凡舌苔由白而黃由黃而黑者疫邪由表達里也宜汗下法邵評邪在表則舌白入里則舌黃入腑熱深則舌黑邪在足經分表裡而用汗下之法舌苔由白而變鮮紅者疫邪由衛及營不入足經而入手經也忌汗下宜逐穢解毒清泄營分新法邵評邪在肺衛則舌白入心營則舌紅傳入心包則鮮紅起刺邪在手經宗心衛辨明上中下三焦而施治忌用足經汗下之法疫邪兼六氣入足經從表裡汗下初起頭疼發熱惡寒舌苔白而薄者邪在表也敗毒散散之微汗而解如未解鼻乾口渴耳聾脅痛舌苔白中帶黃此陽明少陽見症須解肌法柴葛連翹防風薄荷牛蒡黃芩木通之類如再不解須看有無癍疹或見心煩膈悶足冷耳聾身痛如束或咳或嘔寸關沉伏或躁動便是發癍之候須提透之以癍盡為度脈伏心煩謂之欲癍煩止人靜肌膚中無隱隱之點始為癍盡癍已出而口乾脈洪滑者宜化癍解毒為主當以癍疹門參看邵評邪入於裡則發癍疹疹出於肺癍發於胃將發癍疹尚未外透欲出不出之際故見症如此若癍毒滯氣則脈沉伏伏邪外出則脈躁動亦一定之脈理已汗而熱不解氣口脈弦滑飽悶噁心必是胃中宿食為患消導為主如生楂肉麥芽枳實連翹青皮萊菔子等涼疏之若脈弦滑潮熱譫語臍腹脹痛舌苔漸漸黃厚燥刺者乃燥矢在腸胃中也大柴承氣看微甚下之更衣舌潤為愈邵評食停胃中未化糟粕尚在胃之上脘宜消化其食滯切忌早用攻下食滯已化而成燥屎故用攻下與前半條停食未化者治法不同大宜著眼如表已解尚身熱脈浮小便不利者是熱結膀胱也五苓去朮合六一利之邵評身熱脈浮其脈仍在太陽經表解而小便不利邪入太陽之府而熱結膀胱也宜宣化膀胱熱結而利水如表已解餘熱未淨其人如狂不甚小腹堅痛而小便自利者乃血蓄膀胱也桃仁承氣加減邵評上條熱與水結此條血蓄膀胱如狂而小腹硬痛血蓄下焦之徵辨熱結與蓄血在小便之利與不利熱結膀胱小便不利血蓄膀胱小便自利用桃仁承氣破其蓄血正治也若無表裡症但熱而瀉或寒熱而瀉者此濕邪在於氣分也小柴合五苓主之渴者去桂留芩不渴去芩留桂疫邪必兼濕者以當濕熱司令之時也以上諸條同傷寒施治邵評但熱而瀉濕熱在裡寒熱而瀉里濕而表有微邪也用小柴胡以和解其表裡之寒熱以五苓滲其里濕渴為有熱故去桂留芩不渴為無熱故去芩留桂至疫病每發於四五六七月正在夏天濕熱當權之令故多挾濕疫癘熱毒鬱極則發黃二便俱秘若投茵陳五苓小水必不能利須茵陳蒿湯加黃柏則小便利而黃退矣邵評熱鬱發黃二便俱秘陽分實熱發黃也用茵陳五苓以利膀胱無益也當用茵陳蒿湯以瀉陽明之實熱二便通利黃自退矣亦有發黃兼發癍者無非熱毒鬱結所致宜犀角連翹赤芍梔子茵陳黃柏牛蒡薄荷銀花之類主之瘟疫發於春夏之間必熱症為多如初起即大熱大渴目赤唇焦煩躁不寧六脈洪滑舌苔燥黃焦刺急用三黃石膏湯去黃柏加連翹汗之取汗在於速一服無汗即再進之得汗熱退為愈若延至四五日毒遍三焦表裡俱病用三黃石膏湯加連翹銀花表裡兼解之其妙在麻黃石膏二味不可去一此方通解三焦表裡治疫最妙邵評疫必兼濕故致發黃熱毒鬱結則黃而發癍矣用清熱滲濕宣透癍毒為治若外受瘟疫表裡俱病火熱大盛之時身雖大熱而無汗泄此表氣外郁內熱不得發泄故目赤唇焦而煩渴表裡熱盛則六脈洪滑火盛灼津則舌苔燥黃焦刺此皆熱鬱不宣之象此方清內火而宣散表熱表有汗出則內之火熱亦隨汗而外泄矣此表裡熱甚兩清之法也倘遷延不治上中下三焦俱受毒邪表裡三焦均病必用此大劑以兩解之如見目赤唇焦舌黃燥刺大熱煩渴汗出津津此陽明血熱火盛切忌風藥升散宜涼膈散加石膏邵評見症裡熱極盛之候與上條似同上條無汗是表郁內火汗出津津是邪入陽明而熱盛故用涼膈散加石膏以解陽明大都疫癘初起宜辛涼解散次則和解解毒必里症全具脈實口燥心下堅滿方可攻下若胃中飲食未化雖芩連栝蔞尚宜緩進況硝黃乎如用寒涼食為寒凝結而不散必變結胸以上諸條照溫熱施治邵評初起邪在肺衛故宜辛涼解散若肺邪入陽明之府則里症發現脈實堅滿口燥均是裡實之症故可攻下倘飲食停滯未化糟粕早用寒涼寒藥與食互結防成結胸況攻下乎必待其食化糟粕結於腸中方可用下耳寒涼切忌早用恐其凝結不化疫病當分天時寒暄燥濕病者虛實勞逸因事制宜不可執泥如久旱天時多燥熱疫流行宜清火解毒忌用燥劑天久霪雨濕令大行脾土受傷民多寒疫或兼瀉痢宜滲濕和脾忌用潤劑邵評天時寒濕病多寒疫寒濕天時暄燥病多溫疫濕熱須分別治之蓋天時旱燥陽亢熱盛故多熱疫熱則宜清火而忌溫燥天久陰雨寒濕流行脾土受傷故多寒疫寒濕宜溫燥而忌清潤二者治法大異最當分辨春當暖而反寒夏應熱而反涼感此非時之寒為寒疫宜太無神朮散加羌活紫蘇溫散之或藿香正氣散加減亦可從正傷寒治此條寒疫邵評應暖熱而反寒涼是非時不正之氣人受其氣而病者為時行寒疫治以溫散為主忌用寒涼潤藥秋應涼而反熱冬宜寒而反溫感此非時之暖為溫疫宜犀角連翹黃芩薄荷銀花牛蒡之類清解之宜從溫熱症治邵評應寒涼而反溫熱是非時之溫氣人受之而為冬溫秋燥之症即為瘟疫治宜辛涼清解大忌溫燥疫症先從頤頷腫起者陽明熱邪也腫於耳之前後者少陽風熱也並宜辛涼散之二活荊防連翹黃芩薄荷元參牛蒡桔梗犀角水汗之陽明加升麻少陽加柴胡鉤藤解散後加清火解毒之品淨銀花人中黃之類邵評風火熱毒之邪故宜辛涼清散風邪解而火毒未清故宜清化火毒此從表裡法施治時毒從頤腫者名鸕鷀瘟耳下項與咽中腫脹聲不出者名蝦蟆瘟皆風熱不正之氣干於上焦所致治宜散邪清熱不可一味寒涼邵評頤與耳下項咽中俱是上焦部位邪從口鼻吸受先入肺胃宗三焦立法從手經施治必先清解宣散以泄其邪如一味寒涼則鬱遏邪熱恐其傳裡內陷不可不慎疫症有兼咽喉腫痛者必辛散為主不可驟用寒涼反閉其邪宜荊防敗毒散加桔梗射干馬勃牛蒡之類邵評咽喉亦屬上焦邪入肺中先宜辛散早用寒涼防其逼邪內陷最當謹慎冬應寒而反溫感之多咽喉腫痛寸關脈浮洪而數舌燥唇乾宜甘桔湯加牛蒡薄荷防風射干連翹黃芩銀花犀角水之類涼解之以升陰消陽邵評冬時不正之氣人受之而即發者為冬溫溫邪入肺則咽喉腫痛溫邪在上焦則寸關脈洪數陽邪傷陰則唇舌乾燥法宜提透辛散清解上焦邪熱夏應熱而反涼感之邪伏於少陰之經每多咽痛或兼泄瀉舌潤不渴寸口脈沉而小宜甘桔湯加半夏天蟲陳皮桂枝射干防風姜皮之類溫散之以助陽消陰邵評不正之氣乃夏令陰邪人感其邪伏於少陰腎中陰火上升則咽痛寒濕之邪內入則泄瀉陰邪傷陽則舌潤不渴邪郁其陽則脈沉小宜清腎中陰火而透邪以辛溫藥散之大頭天行初起憎寒壯熱體重次傳頭面大腫目不能開或咽喉不利俗名大頭傷寒是也東垣謂陽明邪熱太甚挾少陽木火而生陽明濕熱甚為腫少陽木火盛則痛陽明之邪首大腫少陽之邪腫於耳之前後也治法不宜藥峻峻則藥過其病所謂上熱未除中寒復起其死尤速當少與時時呷之方用酒製芩連人中黃以解毒荊防薄荷以去風連翹天蟲桔梗牛蒡以散結頭痛惡寒無汗加二活以散寒陽明引經加升麻犀角水少陽引經加柴胡花粉普濟消毒飲妙十餘日表症仍在者亦用荊防薄荷微散之邵評風溫時毒中於頭部清空之所故名大頭瘟病因風火濕痰邪熱由表而入於少陽陽明二經以陽明行身前而循首面少陽行身側出於耳之前後邪在最上藥宜輕清宣解上焦若用重濁之味則入中下而過病所矣但天行時毒必以解毒為先風溫之邪故必去風邪結則腫痛故當散結寒鬱於表則無汗頭痛而惡寒當疏表散寒此方治大頭天行極妙若日數雖多尚有表症仍宜表散胃氣虛者於春夏初晴感山谷蒸氣面腫發寒熱者先用平胃散加羌活荊防桔梗藿香之類以散之次加芩連清熱蓋山嵐瘴氣濁霧皆濕熱也嶺南人中之即死者緣內多毒蛇所吐之氣故耳邵評胃虛而邪入中焦感瘴氣濕熱之邪入於陽明法宜運中祛瘴以宣散中上二焦歲荒普患者不宜峻劑宜扶正祛邪調理脾胃為主有已汗而熱不解身漬漬汗出右關脈大無力舌苔白嫩四肢倦怠者此中氣素弱汗後虛熱也補中益氣湯主之汗止身涼而愈升柴須蜜炙以上參治法匯邵評忍飢而脾胃中虛邪乘虛入宜調中散邪亦中焦病也若汗出而餘熱不退是虛熱也脈舌見症俱是虛象法宜扶正散邪此正虛挾邪之治法疫邪傳裡毒攻腸胃臍腹大痛下利鮮血或黑臭水小便不利身熱大渴六脈洪數舌苔黃燥如刺或紅刺如楊梅狀當急治之宜鮮生地二兩生大黃五錢淨銀花五錢黃連一錢黃芩丹皮赤芍各錢半生甘草五分清之下之邵評此火毒熱邪直入腸胃而傷血絡之正法疫邪傳裡目赤面紅六脈洪大舌黃燥刺此熱毒傳遍三焦經絡閉塞榮衛不通以致汗不得出癍不得透大熱煩渴不解宜三黃石膏湯去黃柏加連翹銀花牛蒡子表裡兼解之俾汗癍並透而解妙在麻黃石膏邵評疫邪自表入里先在陽明氣分若上中下三焦表裡俱有熱邪氣血經絡不通表間抑遏癍與汗均不外達熱伏於裡而燔灼必用此方解表清裡宣通上中下三焦熱邪汗出癍透而愈若遇天時亢旱熱疫流行毒蘊三焦目赤舌絳癍疹丹赤汗出津津陽明血熱便閉宜涼膈散去芒硝加鮮生地牛蒡子人中黃清之邵評天旱熱毒而成疫三焦均受邪熱入營而陽明熱實也宜清膈間邪熱此條邪在中上二焦熱侵營分而陽明熱實上條表裡同治此宗心營肺衛分三焦治法疫邪發於歲荒之後凡流離饑民無不一病即死者由於勞役飢寒脾胃早傷雖感微邪亦不禁也故治此者須調補脾胃為主補中益氣六君子之類微加表藥治之邵評中虛受邪正氣不能勝邪每多邪陷正脫故必補正以托邪正氣充復邪自外達耳凡遇疫症診得右關脈虛大或軟弱者即中氣虛也當補以汗之補中益氣加羌活紫蘇如診得寸軟尺遲者此營衛兩虛之症也當以歸耆建中湯加防風汗之邵評此條營衛虛而受邪凡治虛症宜外邪輕可治若外見重症而脈虛細無神者死邵評正氣大虛不能勝邪則死凡治虛症詳於景岳瘟疫門汗補溫清吐下六法中須閱之以上諸條系新法前三條實症後三條虛症邵評景岳論治虛症最為詳細宜參考之疫邪吸穢濁入手經宜逐穢解毒六氣之外另有一種癘氣乃天地穢惡之氣都從口鼻吸入直行中道流布三焦非比傷寒六經可汗可下也嘉言先生以逐穢為第一義上焦如霧升而逐之中焦如漚疏而逐之下焦如瀆決而逐之並以解毒兼之營衛既通乘勢追拔勿使潛滋此喻氏心法也葉天士先生謂疫邪從口鼻吸入上焦心肺先受如喉啞喉痛口糜舌燥者先入於肺也漸至神昏舌絳者邪由肺系干於心包絡也故初病喉痛舌燥最怕竅閉神昏先生立法清解中必佐芳香宣竅逐穢如犀角銀花菖蒲鬱金之類兼服至寶丹以有靈之物內通心竅搜剔幽微又謂吸入疫邪三焦均受由衛及營久則血分漸瘀邪與三焦相溷愈熱愈結理宜鹹苦大制之法然恐性速直走下焦仍用輕揚理上加金汁銀花露之類此又先生法中之妙法也邵評邪由口鼻吸受其氣先入肺衛次者遞傳心營甚至逆傳心包從上焦而及中下二焦當從心營肺衛宗三焦立法從手經施治若自肺而入陽明胃中經腑者可同傷寒用足經藥施治凡溫熱暑疫等症皆當如是所謂與傷寒治法始異而終同也惟治疫之法當分清上中下三焦用芳香逐穢解毒開泄之劑是第一要旨又評凡病衛之後方言氣營之後方言血邪入心營肺衛尚在上焦至入於血分則邪干下焦矣故曰三焦相溷若直走下焦與包絡中結邪不相干涉故仍主輕揚清上而佐以鹹苦之味兩相兼顧此疫邪入手經與前列之症不同也疫邪入上焦如口糜丹疹喉啞咽痛舌苔紅中間白或白中兼紅此邪在肺與包絡也宜犀角鮮生地元參連翹石菖蒲川鬱金牛蒡子射干銀花人中黃之類邵評此邪由肺衛而入心營尚未傳入包絡包絡有邪必神昏譫語如下條之見象也此是營衛交病用泄衛透營兩解之劑疫邪入膻中如見舌苔鮮紅神昏譫語或發丹疹或兼喉痛疫邪逆傳膻中也非比傷寒客邪無庸發散亦非停滯里症無庸消導治當清血絡以防內閉大宜解毒逐穢宣竅開閉如犀角連翹元參生地銀花人中黃川鬱金石菖蒲西黃琥珀之類兼用至寶丹邵評此與傷寒表裡之邪大相懸絕治法大異此清血絡而開閉宣竅逐穢之法治溫熱暑疫邪入包絡之要旨不獨疫症然也疫邪遍三焦疫癘穢邪從口鼻吸入分布三焦久則血分漸瘀其邪愈深其熱愈結當以苦鹹之制仍是輕揚理上為治加犀角水銀花露白金汁西瓜翠衣栝蔞皮黑元參之類以上參葉案邵評邪從上受先肺衛次心營此邪在上焦至入於血則邪干下焦矣故曰邪遍三焦邪愈深入則熱結而不能外泄用鹹苦以清下焦血熱仍佐輕揚清上之劑則三焦同治矣此鹹苦清血之味余俱輕清上熱為治疫遍三焦之良法吳又可法摘要凡瘟疫如見舌苔白如粉者其邪已入膜原汗之必不解當用達原飲以透膜原之邪看兼何經加入引經表藥如兼太陽加羌活陽明加葛根少陽加柴胡如舌苔薄而不厚脈不甚數者感之輕也可從汗解如感之重者舌苔必厚脈必數縱服藥邪必內陷但看舌苔漸漸黃燥此邪漸入於胃也前方加大黃下之若脈洪長而數汗大出此邪適離膜原初入陽明白虎證也舌上純黃燥刺又兼里症此邪已入胃腑承氣湯選用邵評邪從口鼻而入直行中道而入膜原故舌苔白如敷粉膜原者脾與胃以膜相聯乃脾胃之半表半裡附近於胃疫邪先入膜原最易陷入於胃如從表達亦從三陽經外出故加三陽引經藥疫症有兩三日即離膜原者有一旬半月不傳者有初得之四五日厭厭聶聶至五六日陡然勢張者疫邪為病有從戰汗解者有從自汗盜汗不解者有無汗竟歸於胃者有胃氣壅抑必從下後而得戰汗解者有汗解未盡越三四日復熱者有發黃因下而復熱發癍者有竟從發癍而愈者有里症急雖得癍不愈者疫毒甚者日有三變初起一二日舌苔白如粉早服達原飲一服午後舌變黃色胸膈滿痛大渴煩躁此毒邪傳裡也前方加大黃下之煩躁稍減傍晚復加煩躁大熱通舌變黑刺鼻生煙煤此毒邪最重復合聚於胃急用承氣湯下之至夜半熱退次早苔刺如失此數日之法一日行之因其毒盛變速故用藥不得不緊設用緩藥必無救矣每見瘟疫二三日即死者皆此類也邵評下後稍緩至夜復熱其勢更甚熱而成實灼傷肺胃津液故舌黑刺而鼻菸煤邪毒甚也熱實胃腑故用承氣急下之使邪毒從下而解若一日數變用藥亦一日行數日之法蓋病變極速治法亦急所謂急病急攻也失治則液涸邪秘而死疫病失下自利純臭水晝夜十數行口燥唇乾舌裂腹滿硬痛此熱結旁流也急以承氣下之以去宿垢其利自止若胃熱失下鬱而為黃熱更不減搏血為瘀故經氣不為熱瘀郁不致發黃熱邪不幹血分不致蓄血若同受其邪則發黃而兼蓄血非蓄血而致發黃也但蓄血一行熱隨血走黃隨熱泄故治黃茵陳蒿湯治蓄血桃仁承氣湯去桂枝甘草加丹皮歸尾赤芍邵評胃中熱鬱不得泄越則發黃熱甚血瘀則蓄血此邪熱入於中下兩焦所致至辨發黃與蓄血當察其小便若小便不利則熱鬱膀胱而發黃若小便自利則熱瘀血分而蓄血如此辨治萬無一失治黃滲濕清熱而通下治蓄血消瘀清熱而破血瘟疫九傳但表不里疫之傳有九然亦不出表裡之間而已但表不里者其證頭疼身痛發熱而復凜凜內無胸滿等證穀食如常此邪傳外由肌表而出或斑消或汗解為順輕劑可愈有汗出不徹而熱不退者宜白虎湯或斑出不透而熱不退者宜舉斑湯有斑汗並行而並不透合用煎湯但里不表但里不表者惟胸膈痞悶欲吐不吐吐而不快宜瓜蒂散吐之若邪傳裡之中下二焦則心腹脹滿不吐不嘔或燥結便閉或熱結旁流或熱結下利或大腸膠閉並宜承氣輩有里而再里或至於三皆依前法邵評吐下未淨復聚於中故曰里而再里至三里之症少有也表而再表表而再表者所發未盡膜原尚有隱伏之邪故三四日後依前發熱脈洪而數及其解也斑者仍斑汗者仍汗而愈至於三表者亦稀有也邵評瘟疫之邪由膜原達表或癍或汗之表表邪化而膜原尚有未盡之邪復出於表故曰表而再表此與傷寒先表后里之治迥別須使出表之邪仍從癍汗而解至三表之症實罕見焉表裡分傳表裡分傳始則邪氣伏於膜原尚在半表半裡二證俱見必先通其里令里邪去自能達表或斑或汗隨其性而升泄之病退而熱未除者膜原尚有未盡之邪也宜三消飲調之若分傳至再至三未之頻見照前同治邵評疫邪自口鼻吸受直行中道流布三焦伏於膜原為半表半裡之界邪在於此或表裡分傳表裡二症同見者治宜先通其里里通則表達與傷寒先表后里之法大異從表解者或癍或汗兩門隨症治之膜原之邪未能盡傳表裡症並見者用三消飲內外並解之若分傳再三之症亦屬稀少治法同前再表再里有再表再里或再表裡分傳者醫家不解反責病人不善調養以致反復病家不解反咎醫師疏於救治彼此歸怨胥失之矣不知病勢之當然其氣性如此邵評疫症是穢濁之邪不正之氣伏膜原而布三焦其邪之或結或開或表或里本無一定故多表而再表里而再里表裡分傳再見之症此病情之傳變不常邪氣之聚散無定乃病勢之當然非關調治之失宜然必病者元氣不虛方可隨症施治若虛弱之體恐未能當此纏擾耳疫症之外若風寒溫暑濕熱諸病則鮮如此見症也先表后里先表后里者始則但有表證而無里症宜達原飲有三陽經症者加三陽經藥繼而脈大而數自汗而渴邪離膜原未能出表宜白虎湯辛涼解散邪從汗解脈靜身涼而愈二三日後或四五日後依然發熱尚宜達原飲至後反加胸滿腹脹不思穀食煩渴等證加大黃下之邵評邪從口鼻吸受先由肺入肺主皮毛則先見表症有頭疼身痛發熱凜寒之象用達原飲以宣其邪三陽者太陽陽明少陽也故太陽加羌活陽明加葛根少陽加柴胡也先里後表先里後表者始則發熱漸加里證下之便愈後復發熱反加煩疼身重脈浮者宜白虎湯主之不得汗者津液枯竭也加人參覆杯即愈邵評瘟疫自口鼻而入直行中道伏於膜原膜原為半表半裡其邪自內出外故有先見里症可先下之下后里通邪漸出外在陽明之經故見煩熱脈浮身疼重之症再用白虎湯以清之不得汗者正虛液竭白虎加人參以扶正達邪若大汗大下後表裡之證悉去繼而一身盡痛身如被杖脈沉細者此汗出太過陽氣不周骨寒而痛非表證也此不必治二三日後陽回自愈邵評汗下之後表裡之症雖去而津虧氣弱不能營養筋骨脈絡故痛如被杖用藥宜養營和陽之劑又評瘟疫與傷寒大異傷寒不可早下瘟疫有先里後表之症故可先下下之裡通而表達蓋瘟疫之邪自內達外與傷寒先表后里之治不同法此瘟疫傷寒分涇渭處也表證偏勝表證偏勝者膜原之伏邪發時傳表之邪多傳裡之邪少當治其表里證兼之邵評膜原附近於胃為表裡之分界邪伏膜原出表者多入里者少則表證偏勝乃七表三里之候當先治表而略兼治里里證偏勝若里證多而表證少但當治其里而表證自愈邵評膜原之邪入里者多出表者少則里症偏勝乃七里三表之候但治其里里通則邪外出而愈大頭瘟即大頭天行宜普濟消毒飲邵評風熱濕濁擾亂清陽之境故傷高巔之上從上越者生下行者死初起寒熱體重頭面腫痛或紅或紫或青或黃目不能開咽喉不利不速治十死八九甚者砭針刺之如大便硬加酒蒸大黃三錢緩下之若額上面部腫赤者屬陽明本方加石膏耳之上下前後並額旁紅腫者屬少陽本方加柴胡花粉項下耳後赤腫者屬太陽本方加荊防羌活蓋大頭瘟腫赤之處分三陽經部位故藥亦分三陽經加法但邪在上焦藥宜輕清頻進而緩服急則過其病所矣捻頸瘟頭與咽中腫脹喉痛聲不出即蝦蟆瘟宜荊防敗毒散邵評邪傷上焦蘊於肺胃喉痹失音等象較大頭瘟之腫在肌表者更深一層矣此症邪干肺胃當用射干以發肺邪石膏以瀉肺熱犀角以解胃毒大黃以疏胃壅方為正治此方先用羌活獨活荊芥防風柴胡前胡燥烈而專達表與穢邪之在上焦肺胃者似不相值須斟酌用為妥瓜瓤瘟胸高而起嘔血如汁是也生犀飲邵評此邪在中焦而血熱受傷疫毒深重故以清營解毒為治楊梅瘟遍身紫塊忽然發出黴瘡是也刺塊出血宜清熱解毒人中黃丸邵評此症毒瘀血分人中黃丸用蒼朮之燥烈專走氣分防風之辛散專走肝經者似為未合當加銀花等解毒之品並當宣通血分為妥若清熱解毒湯用羌葛升麻皆是軀殼之藥不能疏通三焦瘟疫諸症俱當從上中下三焦治不當以表裡為界也人中黃丸之蒼朮雖芳香逐穢未免燥烈太甚宜酌用之疙瘩瘟發塊如瘤遍身流走旦發夕死者是用三稜針刺入委中三分出血服人中黃散邵評疙瘩一症崇禎十六年京城大盛患者有頃刻即死其治法與此同載見說鈴同時有羊毛瘟起病必有紅點在背挑破中有羊毛一縷無得活者死有數百萬當博求千金方外臺秘要聖濟總錄等書或有治法絞腸瘟腸鳴腹痛乾嘔水泄不通者是也探吐之宜雙解散邵評此症上下格拒閉結不通急急探吐吐則氣通或有生機然此濕毒多鬱於下焦與乾霍亂相近金匱備急丸亦可用軟腳瘟便清泄白足腫難移者是也即濕溫症宜蒼朮白虎湯邵評濕熱伏於下焦脾不運行用蒼朮白虎以清濕熱此與上條同是邪在下焦上條是寒濕帶中焦症此條溫熱純是下焦症矣瘟疫脈候附錄凡瘟疫脈洪大滑數而數中兼緩者可治緊數甚者難治邵評瘟疫是陽症洪大滑數是陽脈更兼緩是有胃氣故可治緊則無胃氣故難治身大熱而脈沉澀細小足冷者危邵評大熱是陽邪沉澀細小為陰脈陽病見陰脈故危足冷者邪盛而陽衰也瘟病四五日身熱腹滿而吐脈細而弦強者十二日死邵評瘟病四五日邪已入里腹滿而吐病在脾胃身熱脈細陽症見陰脈弦強是邪盛而無胃氣故死瘟病二三日頭痛腹滿脈直而疾者八日死邵評病起二三日表裡症俱見脈見直而疾是邪盛而正衰故死瘟病八九日頭身不痛色不變而利不止心下堅而脈大者十七日死邵評病至八九日邪去表而入里矣利不止而心下堅是虛邪結其脈反大久病脈大則為病進正虛邪盛遷延必死又評此種瘟疫是天行之癘氣從口鼻而入風熱與濕濁熏蒸其氣流布三焦在上焦者為大頭瘟捻頸瘟在中焦者為瓜瓤瘟楊梅瘟疙瘩瘟在下焦者為絞腸瘟軟腳瘟等症治法當宗河間三焦立論分心營肺衛用手經辛涼之藥清熱解毒是為正治不可用傷寒表裡分界而用足經辛溫發散之劑也所列諸方學者以意參之可也暑證中暍同合參按暑與暍皆日氣也不必分屬動而得之為中暍靜而得之為中暑其說出自潔古後人因之未可據為確論也蓋動靜不過勞逸之分既均受暑治法不甚相遠至於陰暑尤宜速辨夫當盛暑之時炎火若炙靜處深堂大廈正以避暑不近烈日炎暑何來即膏粱深處亦有中暑之症者蓋不能無冒暑應接正在動中得之耳此靜中之動即潔古所稱靜得之暑也若乃納涼於水閣山房或感冒微風或靜夜著涼此外受陰寒遏其周身陽氣以致頭痛惡寒膚熱無汗等症者當以辛溫之劑微微表散至若浮瓜沉李冷水寒冰以傷胃中之陽又當溫中散寒此乃暑月感寒之症不得以陰暑名之然以辛溫治陰暑其弊在命名若薛氏以溫熱之品治中暍則貽害不淺矣竊假為辨正以免後學之惑邵評暑與暍二者皆炎天熱日之氣也夏月火土當令天之熱氣下地之濕氣上濕與熱蒸或成暑氣暑者熱之兼濕者也故曰暑必挾濕至於暍單是炎天火熱之氣不夾濕氣在內乃夏天令火之邪為暍故奔走於赤日之中而中暍也治暍只用白虎黃連清其火熱與治暑之兼用厚朴滑石辛香滲泄之法不同如此分別未知是否若陰暑二字尤屬不通夏天炎火之令爍石流金何陰之有即使陽氣素虛之人每處夏月陽氣盡浮於肌表其人中陽虛弱或外受涼風內傷生冷而病者此暑天受寒因暑而自致之病非陰暑為病也暑為陽邪從無陰暑之名故特辨之至暑暍同是熱氣豈可以動得靜得而分屬耶推其意豈以暍為陽而暑為陰故以動靜之陰陽而分屬之耶陰暑之名一立貽誤後人實非淺鮮惟納涼而外受風邪夜間著涼此是夏月之風寒人感受之著於肌表遏其表之陽氣以致惡寒頭痛身熱無汗之表症發現此是夏月感冒風寒非暑症也乃因暑而自致之病故用辛溫散邪之藥以疏通其表間之陽氣與治暑無涉也多食生冷寒物內傷脾胃中陽以致吐瀉霍亂肢冷汗泄等見症因夏月陽氣外浮中陽虛弱寒冷傷中亦非暑病是因暑而自致之病故用溫中散寒以扶脾胃之陽與治暑亦無涉也古人大順散等方是治夏月著寒之症非治陰暑之方至於以溫熱治中暍真是抱薪救火也暑傷氣分凡吸入致病上焦氣分先受舌白邊紅嘔惡煩渴咳嗽喘急二便不爽脈右大者此暑邪阻於上焦氣分也宜杏仁石膏半夏厚朴梔皮豆豉鬱金竹茹之類如熱邪內迫肺氣鬱閉而致胸中脹悶者宜梔子豉湯加枳實川鬱金杏仁半夏白蔻滑石連翹蔞皮黃芩之類邵評暑熱由口鼻吸受先傷上焦氣分邪留肺胃邪在肺則舌白邊紅者熱也胃熱則嘔噁心煩肺火盛則咳氣不降則喘急大小便不利也暑襲肺衛如身熱頭脹脘悶咳嗆不已者此暑邪外襲干肺衛也宜清上焦甜杏仁滑石粉各三錢香薷七分白蔻五分通草一錢五分絲瓜葉三錢如暑風外襲肺衛氣阻發熱畏風頭脹咳嗆防作肺瘧宜香薷杏仁桔梗連翹六一散絲瓜葉邵評邪郁上焦肺不宣降則頭脹咳嗆身熱脘悶此邪在衛分也衛分不解則入氣分氣分不解則邪傳中焦而入營分營分不解則邪傳下焦而入血分矣三焦俱受營衛均病甚至逆傳包絡邪入膻中而邪閉正脫之症見矣故邪初在衛先用辛香以開泄上焦為主如暑邪挾風襲入於肺肺主皮毛故亦為之表邪在於衛表氣不宣暑風鬱蒸發熱衛氣被邪抑遏則微惡寒寒熱似瘧而畏風咳嗆此是暑瘧與少陽足經之瘧大異當從手經施治宣泄肺衛之暑邪肺傷痰喘暑風熱氣傷肺身熱痰嗽而喘宜桑杏連翹石膏淡竹葉橘紅栝蔞皮苡仁蘆根之類喉痛加射干牛蒡小水不利加六一散頭脹加鮮荷葉邵評此條暑風入肺肺有痰濁痰熱傷肺肺升不降而喘嗽治宜宣泄上焦清化痰熱如暑濕傷氣午後痰喘更加者肺先受病也亦宜清理上焦為無形氣分之治如蘆根杏仁蔞霜苡仁橘紅川貝西瓜翠衣通草茯苓皮之類邵評暑必挾濕暑先入上焦與痰熱先傷肺氣故痰喘加於午而化痰滲濕用輕藥以開泄上焦無形之肺氣也暑濕傷胃凡身熱中焦痞滿不飢不納二便不爽此暑熱傷於中焦氣分熱痰聚胃所致宜苦辛泄降半夏瀉心去甘草乾薑加杏仁枳實邵評邪自上焦而至中焦由衛分而入氣分上焦主肺中焦主胃病則痞滿不飢不納是暑熱濕痰伏於中焦氣分胃氣不得宣行也宜苦辛開痞宣泄中焦氣分治之暑入營分凡身熱心煩面赤舌絳神呆夜寐不安此暑邪入心也辰砂六一散加川鬱金川連之類或犀角尖鮮生地石菖蒲川鬱金連翹銀花之類邵評邪由肺衛而入心營邪入漸深矣心主血而藏神營熱則傷神神呆而寐不安也當清熱以開泄其邪使邪從肺達為妥否則熱灼陰傷邪入下焦血分有陰涸邪陷之危亦有逆傳心包邪熱內閉為內閉外脫之症耳暑入膻中如暑邪初傷氣分發熱口渴失治則邪傳膻中舌形絳縮小便赤澀鼻煤裂血耳聾神昏此邪由氣分蔓延及血分最怕內閉外脫急用犀角尖石菖蒲川鬱金鮮生地銀花連翹元參西黃之類邵評暑邪由口鼻吸入先傷上焦肺衛肺內膜與心包絡膜相連心在肺下其道最近故極易傳入心包且心為君火心包為相火暑為相火行令之邪同氣相求其入心包尤易即陳無擇所謂暑喜歸心是也邪入營分而至逆傳心包則元神傷耗陰血涸竭邪熱深入宮城每多內閉外脫急用清心達邪芳香開閉一法如用牛黃清心丸至寶丹紫雪丹等然亦十不救一矣暑入陽明凡大熱大渴乾嘔唇燥舌苔黃厚六脈洪數此暑邪入於陽明也黃連香薷飲及益元散大熱大渴大汗者白虎湯邵評暑邪在上焦肺衛不傳心營而傳入陽明之經見症熱渴乾嘔脈洪數而舌苔黃厚此邪在中焦陽明胃經症也汗少者用黃連香薷飲熱渴而大汗者白虎湯蓋邪入陽明無所復傳以陽明為中土萬物所歸也然邪入陽明有在經在腑之分在經宜清在腑當下皆以救液逐邪為務蓋陽明主津液所生病病在陽明津液涸竭則邪陷氣脫而死或可遷延二候四候非若邪入心包直犯宮城元神無所歸束外散而亡每在一候二候邪內閉而正外脫也暑入膜原暑穢從口鼻吸入結於膜原則必脘悶寒熱治宜清疏募原如廣藿梗川鬱金檳榔厚朴草蔻青皮滑石連翹紫蘇黃芩之類邵評暑濕穢邪從口鼻吸受直行中道流布三焦結於膜原膜原附近於胃為半表半裡之界故見症寒熱如瘧實非瘧也與少陽之半表半裡大為不同故仿達原飲意用辛香溫化之藥以達膜原暑穢之邪暑入厥陰凡四肢不熱中心如焚舌灰黑消渴心下板實嘔惡吐蛔寒熱似瘧者此暑邪陷於厥陰也病勢最危治宜酸苦泄熱扶正祛邪須人參枳實川連乾薑黃芩白芍椒梅邵評此暑熱乘虛而陷入於足厥陰肝經也厥者盡也陰盡則陽生木中有相火故外不熱而內如焚火灼津傷故渴而且消蟲為風木所化熱盛生風木邪犯胃則嘔而吐蛔也邪結不開則心下板實肝與膽為表裡故寒熱如瘧邪陷至陰症勢危險厥陰見症多寒熱錯雜之邪故藥亦須寒熱並用耳暑毒入腸如冒暑飲酒引暑毒入於腸內酒與暑並大熱大渴小便不利其色如血五苓去桂加川連銀花滑石邵評暑為陽熱之邪酒性大熱而有濕冒暑飲酒兩熱相併入於小腸火府不宣故大熱大渴而小便赤如血也此熱結下焦而小水不利用利水清熱之劑以治之伏暑內發凡潮熱汗出不解煩渴嘔惡胸痞舌苔白帶灰黑小溺赤澀或自利此伏暑內發三焦並受治宜清理上中為要如滑石杏仁通草橘紅半夏厚朴川連鬱金黃芩之類邵評人受暑熱棲伏三焦腸胃之間久久而發者為伏暑夏不即發有至秋而發者亦有至霜降後發者其發愈遲則邪伏愈深而病愈重也惟伏暑見症三焦俱有或吐瀉霍亂似瘧非瘧或竟成瘧利等症蓋暑必挾濕為黏膩之邪留伏於裡最為淹牽治宜宣泄肺胃清暑滲濕理分三焦為主暑邪成瘧頭痛脘悶舌白而干四肢麻痹脈左勁右濡寒熱不止此暑邪入里蒙閉清竅而瘧作也治宜清理上焦如連翹滑石杏仁川鬱金淡竹葉半夏蔞皮貝母之類邵評暑從口鼻吸受先入於肺挾內有之痰濕而成瘧疾雖有頭痛寒熱見症左脈見勁此非表邪發瘧乃是邪蘊於肺胃痰熱上蒸蒙閉清氣而作瘧也與少陽之風寒發瘧者不同治宜清理肺胃暑熱化痰滲濕之劑傷暑兼感寒小暑後先觸暑邪復感寒邪而病身熱頭痛惡寒煩渴無汗或自汗脈虛數舌苔白者此屬傷暑後復感寒邪在肺胃間也宜紫蘇薄荷香薷青蒿滑石厚朴通草之類腹脹加枳實腹皮挾食加楂肉青皮舌黃乾嘔加薑製川連邵評先受暑邪後感秋寒抑遏肌表其症身熱煩渴自汗暑邪也頭痛惡寒無汗表寒也是肺胃先受暑熱表復外感寒邪表裡俱病當內清暑邪外散表寒為治勞役辛苦之人日間冒暑夜間乘涼而病頭痛寒熱如瘧者六和湯加減和之邵評中氣虛弱內暑熱而外寒涼表裡均病故有寒熱頭痛等見症體虛挾邪以扶正清暑散寒為治冒暑兼停飲有因暑熱而飲涼水太多以致水停心下遏伏暑邪證見大熱煩渴胸膈痞悶或兼喘急小水不利或身重疼痛右脈微弱仲景用一物瓜蒂散吐之如用五苓去朮加紫蘇厚朴通草散而利之亦解舌黃燥者加入制川連邵評此水邪郁令火而為中暍之症由夏令火熱以水灌洗而傷冷水水行皮中所致仲景用一物瓜蒂散以去上焦之水飲水太多停於心下遏伏暑邪則熱渴煩痞火氣上逆於肺則喘急而小水不利也冷水閉汗濕而滯陽氣故身重疼痛暑傷元氣則右脈微弱以飲冷水灌冷水俱郁遏陽氣所謂形寒飲冷則傷肺也用瓜蒂以去上焦水飲則肺氣通行而水自散矣後人用五苓散加減亦通陽利水之治耳舌黃燥其邪已入中焦陽明胃熱故加川連冒暑兼傷冷有因傷暑口渴恣食生冷瓜果以致寒包暑邪宜六和湯去人參扁豆加楂肉凡胸腹悶痛舌苔中白邊紅氣口脈微弱而身大熱者此即寒包暑之暴症也若緩發非瘧即痢矣邵評暑為陽邪熱灼津虧則多口渴渴則飲冷恣食瓜果生冷傷脾胃中陽郁遏陽氣以致暑不能外出此因暑而自致之病非暑傷也蓋冷物滯於中宮陽氣不得伸越故胸腹悶痛舌苔中白邊紅者寒抑熱邪也中虛邪滯則脈微弱身大熱者暑也寒鬱暑邪用六和湯和中消邪加楂肉以化冷物之積暑挾濕凡暑必挾濕濕為重濁之邪暑乃熏蒸之氣熱處濕中濕熱相蒸阻於氣分當治在手太陰若治不中窾其邪無處發泄則漸走營分侵入血中其症神昏譫語舌色絳赤或咯痰帶血若上蒙清竅則耳聾無聞上焦不解蔓延中下則胸腹板悶二便不利即為濕溫重症治當急清三焦如滑石石膏寒水石杏仁銀花竹茹枳實通草金汁之類嗣用犀角連翹銀花鮮地元參川貝知母淡竹葉綠豆皮之類清營分以養胃陰邵評天之熱氣下降地之濕氣上騰則蒸而成暑故暑必挾濕鬱蒸化熱先入上焦肺衛故治在手太陰肺經為先治不合法衛分之邪不解則入於氣分氣分暑邪不解則漸入營分營分不解則入下焦血分所謂衛之後方言氣營之後方言血也若邪入營不解亦有逆傳包絡神昏耳聾機竅被蒙而內閉外脫者治宜清營達邪芳香開閉為主總之暑濕溫熱先由上焦而遞傳中下焦首在肺衛上焦病屬氣分及營分若傳中下焦則入血分而灼耗陰精則為重症故溫暑宗三焦立法主治暑挾痧暑兼穢氣從口鼻吸入亦頭疼惡寒發熱或手足指冷脈沉伏飽悶嘔惡或腹痛泄瀉治宜清暑兼逐穢如廣藿梗川鬱金紫蘇青蒿厚朴茯苓皮滑石粉連翹草蔻通草之類清之有食加青皮楂肉枳實邵評夏令暑天熱氣濕濁蒸成穢惡瘴毒謂之痧穢人中其邪先從口鼻吸入適更受暑留伏膜原故有頭疼寒熱見症邪阻氣機陽不宣運則有肢冷脈伏嘔瀉痛悶見象矣治宜辛香逐穢輕淡清暑使其暑穢兩分則邪解散而愈如食滯中宮加消食化滯之品有觸暑穢腹痛誤飲薑糖湯而成霍亂吐瀉不得六脈俱伏絞腸痛欲死者此內閉也外用放痧提痧刮痧等法內急以川鬱金石菖蒲西黃另沖川連草蔻藿香木香滑石通草等投之以開閉逐穢邵評姜與暑犯糖與痧犯誤飲薑糖湯則邪壅滯中宮上下格拒揮霍撩亂欲吐不吐欲瀉不瀉腹中絞痛脈伏不起邪內閉而為絞腸痧症急用針刺提刮之法以開泄其血絡機竅之氣為外治內服芳香辛散之劑以開閉逐穢而散邪通氣也如邪重不應可服三物備急丸溫開之法暑挾食凡頭痛背寒發熱自汗脈左虛右滑畏食胸悶者傷暑兼傷食也宜藿香厚朴青皮香薷神麯楂肉枳實麥芽紫蘇滑石之類疏之清之邵評此清暑熱而消食滯之正法邪結下焦暑濕合邪鬱結下焦氣分以致小腹硬滿大便不下舌苔白兼微黃此下焦氣分結邪勿以傷寒液涸便秘治之宜豬苓赤苓滑石通草淡竹葉晚蠶砂皂莢子之類以解下焦氣分之結二便自通矣邵評暑濕合邪暑輕濕重注於下焦而結在氣分則少腹硬滿氣不宣運故大便不下然小水亦未必流利舌苔白而微兼黃色濕多暑少之徵也濕阻氣機二便不利與傷寒液涸便結者大異治以滲濕開氣之法下焦鬱結之邪開化則二便通行而邪自化矣動暑行人農夫於日中勞役得之為中暍暍即暑也其證頭痛發躁惡熱捫之肌膚大熱大渴引飲汗大泄無氣亦動乃天熱外傷元氣宜益氣清暑為治按仲景云太陽中熱暍是也汗出惡寒身熱而渴白虎湯加人參主之夫元氣為熱邪所傷以致大熱大渴汗出不已故以人參益氣石膏清暑乃至精至當之法何後人以東垣清暑益氣湯代之吾恐暑邪正盛升葛之升耆朮之閉寧不助邪增病耶惟生脈散加石膏可以代之然形氣壯實者只服六一散亦解東垣此湯乃治暑月濕熱傷氣脾胃受病之緩症也若以之治中暑則謬矣靜暑靜處高堂大廈之中雖無暑氣然偶或冒暑應接亦能中暑如迎賓送客觀荷曝書之類偶觸暑邪是也更有斗室低樓熱氣外逼即靜處室中亦能吸受暑邪俱當以正暑治之陰暑按方書以大順散治陰暑非暑也乃暑月所受之陰寒也然大順散藥經炒熟重用甘草雖有杏仁下氣皆主甘溫守中並無散寒破結之能即內傷生冷外受陰寒亦非所宜至若無病之人避暑山房水閣過於貪涼感冒微風以致寒熱無汗或頭疼惡寒發熱是周身陽氣為寒所遏也當從傷寒治輕輕溫散可也蘇薄藿樸之類如恣食瓜果內傷生冷以致腹痛吐瀉脈沉遲手足厥冷者此即太陰中寒也理中加藿香厚朴主之陽暑此即動暑見前以上合參治法匯葉案暑症全書暑風暑月病人忽然手足搐攣者暑風也香薷飲加羌防嘔惡加藿香陳皮小便不利加二苓澤瀉滑石有痰加半夏渴易栝蔞瀉不止加蒼朮轉筋加木瓜勢重者手足攣搐角弓反張如中惡狀亦有先病熱服表藥後漸成風者譫語狂呼浪走氣力百倍亦暑氣也以寒涼攻劫之兼解散化痰暑瘵盛暑之月火能爍金不禁辛酒脾火暴甚勞熱躁擾火動心脾令人咳嗽氣喘驟然吐血衄血頭目不清膈中煩擾不寧即童稚老夫間有此病昧者以為勞瘵不知火載血上非真陰虧損而為虛勞者比也宜清暑涼血如荷葉汁鮮生地元參知母石膏鬱金連翹杏仁象貝之類暑瘍凡癰疽毒瘡發熱有時晡熱旦止若夏月間有患頭面外項赤腫或腿足焮腫長至數寸不能步履人皆疑為瘡毒但頭痛內躁晝夜發熱不止自與瘡毒異宜清暑解毒如川連石膏之類暑毒一解其腫自消亦無膿血也暑瘡盛暑之時有遍身發泡如碗如杯如李如桃晶瑩脆薄中含臭水此濕熱之水泛於肌表也黃連香薷解毒湯之類若口疳臭穢涼膈散效外用鮮蓮花辨貼瘡上一周時平復以上四條出暑症全書濕症合參張司農謂暑邪之害甚於寒因作暑症全書濟世竊以為濕邪之害更有甚於暑者蓋盛暑之時必兼濕而濕盛之時不兼暑暑邪止從外入而濕邪兼乎內外暑邪為病驟而易見濕邪為病緩而難知凡處澤國水鄉者於濕症尤宜加察焉如外感之濕著於肌表者或從雨霧中而得或從地氣潮濕中而得或上受或下受或遍體均受皆當以解肌法微汗之兼風者微微表散兼寒者佐以溫藥兼熱者佐以清藥此外受濕邪之治也如內生之濕留於臟腑者乃從飲食中得之凡膏粱酒醴甜膩厚味及嗜茶湯瓜果之類皆致內濕治法不外上開肺氣下通膀胱中理脾陽為治然陽體多成濕火而陰體多患寒濕又當察其體質陰陽為治用藥之法當以苦辛寒治濕熱苦辛溫治寒濕概以淡滲佐之甘酸膩濁之品在所禁用前太陰新法內已陳濕邪之概茲特參濕邪之兼症而以表裡三焦分治焉若夫濕邪變幻之態為病非一當以雜症各門求之可也脾虛多中濕一身盡痛為濕有表有里有濕熱有寒濕有風濕濕痹痹者痹著不去也論曰太陽病關節疼痛而煩脈沉而細者此名中濕亦曰濕痹其候小便不利大便反快但當利其小便此宜五苓散主之發黃加茵陳風濕病者一身盡疼發熱日晡劇者此名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯又曰風濕脈浮身重汗出惡風者防己黃耆湯主之風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也頭中寒濕濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈用香瓜蒂一味為末吹鼻中黃水立下則愈濕家下之額上汗出微喘小便利者死若下利不止者亦死以上述金匱表濕關節疼痛脈浮而濡四肢痿弱此濕邪在表也小便利者桂枝湯加川羌白朮等微汗之小便不利者五苓散加減中濕若關節重痛浮腫喘滿腹脹煩悶昏不知人脈沉而緩或沉而細此名中濕宜升陽除濕湯或白朮酒破傷濕有破傷處因澡浴濕氣從瘡口入其人昏迷沉重狀類中濕名破傷濕宜白朮酒濕熱脈濡細而數發熱身痛小水短澀或身目俱黃屬濕熱宜五苓散加生梔黃柏茵陳秦艽寒濕脈沉遲而濡身無熱但吐瀉口不渴小水清利身痛重著或手足腫痛者為寒濕宜分滲兼溫中胃苓湯加炮薑木瓜重者加附子按論云濕家其人但頭汗出背強欲得被覆向火者此寒濕也又云傷寒八九日風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之亦風濕兼寒也風濕脈浮身重不能轉側自汗或額上多汗此乃先傷於濕又冒風所致宜微汗之漬漬然似欲汗者風濕俱去矣大羌活湯濕痰脈沉緩而滑四肢流注或項背強恆見於肥白人屬濕痰宜二陳二朮桂枝羌活等加減脾胃受濕則沉困無力怠惰好睡須二術為君上部濕蒼朮最烈下部濕升麻提之外濕宜表散內濕宜滲泄濕盛身痛羌活勝濕湯平胃散之類風濕相搏一身盡痛自汗者防己黃耆湯濕盛身痛小便不利體重發渴者五苓散加川羌一倍煎服妙以上諸條參治法匯濕著肌表如發熱身痛脘悶不渴舌苔白膩或汗出不解此濕邪著於肌軀之表也宜解肌滲濕如桂枝秦艽紫蘇二陳厚朴姜皮茯苓皮之類濕留氣分凡發熱身痛汗出則解繼而復熱脈來濡緩舌苔白膩此濕邪阻於氣分熱自濕中來徒用清熱藥不應宜茯苓皮大腹皮滑石粉黃芩通草半夏豬苓之類以逐氣分之濕熱自除矣太陰濕伏凡身體沉重不能轉側四肢乍冷目黃脘痞自利語言欲蹇者此濕邪伏於太陰以致脾陽不運而然也宜健脾兼分利茅朮厚朴茯苓皮草蔻菖蒲廣皮木瓜澤瀉之類如口內生白疳而仍不渴者此濕滯於中氣蒸於上也治在氣分茅朮米仁豬苓澤瀉廣皮桔梗寒水石之類如痞結胸滿飲食不進舌黃微渴此濕熱傷脾也宜瀉心法半夏茯苓川連厚朴茅朮通草濕熱內結如寒熱腹滿小便不利此濕熱內結也宜走濕清熱茅朮赤小豆茵陳茯苓皮厚朴黃柏澤瀉之類酒濕傷胃脘中食阻痛而嘔吐或目色金黃此酒濕傷胃所致宜以苦辛寒為治半夏枳實薑汁黃連豆豉茵陳之類濕兼痧穢穢濕從口鼻吸入則膜原先受分布營衛先嘔逆次寒熱頭脹身痛小便不通舌苔白膩渴不多飲當以芳香淡滲兼施俾穢濕濁邪可以分消宜廣皮藿梗鬱金茅朮米仁茯苓皮豬苓大腹皮石菖蒲通草濕熱兼穢暑濕兼穢氣都從口鼻觸入必由膜原以走中道踞募原則寒熱交作走中道則不食不飢口渴舌黃胸痞腹脹治宜清熱開鬱兼芳香逐穢梔豉湯加藿香川鬱金白蔻枳實制連蔞皮桔梗之類若小水不利加赤小豆赤茯苓之類腹脹甚加厚朴大腹皮濕熱為痹外受濕熱之邪內進甜膩之物則濕聚熱蒸蘊於經絡寒戰熱熾骨骱煩疼舌苔灰膩面目痿黃此濕熱入於經絡為痹也濕家忌汗宜苦味辛通為治防己杏仁滑石半夏米仁連翹山梔野赤豆皮路路通之類更有暑濕風邪混雜阻於氣分氣不主宣右肢若廢頭脹胸痞法當通陽驅邪杏仁三錢生米仁三錢桂枝五分厚朴一錢半夏一錢五分漢防己一錢五分白蒺藜二錢片薑黃一錢三焦濕鬱發熱後神識漸昏小腹硬滿大便不下此暑濕氣蒸瀰漫三焦乃諸竅阻塞之兆氣分結邪忌用滋膩須桂苓甘露飲法茯苓豬苓滑石寒水石晚蠶砂皂莢子去皮以上參葉案濕溫夏月頭疼妄言自汗身不甚熱兩脛逆冷四肢沉重胸腹多汗而滿其人先傷於濕因而中暑其脈陽澀或弱陰小而急不可發汗汗之名重暍必死汗多者白虎湯加桂枝汗少者白虎湯加蒼朮或概用蒼朮白虎湯述古按濕溫症因長夏每多陰雨得日氣煦照則潮濕上蒸襲人肌表著於經絡則發熱頭脹身痛足脛痛舌苔膩白等症重者兼感時邪不正之氣即為濕溫疫症邪入氣分暑濕之邪阻於肺必咽痛發熱身痛舌苔黃厚黏膩煩渴不解當清上焦如連翹桔梗滑石射干米仁馬勃通草淡竹葉銀花蘆根之類如見身發癍疹舌黃燥厚當涼膈疏癍如連翹薄荷生梔石膏牛蒡杏仁枳實黃芩之類邪乘包絡濕溫之邪乘於包絡則神識昏呆發熱身痛四肢不暖舌苔鮮紅燥刺者宜解手厥陰之邪如犀角尖連翹石菖蒲川鬱金元參赤小豆西黃之屬主之邪入營分如濕溫之邪入於血絡舌苔中黃邊赤發為赤癍丹疹神昏譫語宜清疏血分以透癍佐芳香逐穢以開閉犀角連翹赤芍銀花牛蒡菖蒲鬱金元參薄荷人中黃之類邪阻上焦病起發熱頭脹漸至耳聾喉痛欲閉鼻中衄血此邪混氣之象邪在上焦空虛之所非苦寒直達胃中之藥可以治病不能即解即有昏痙之變宜輕清理上為治如連翹馬勃牛蒡銀花射干白金汁如見呃忒加枇杷葉竹茹以上參葉案附暑濕穢合邪論凡暑月霪雨之後日氣煦照濕濁上騰人在濕熱蒸淫中感之則暑濕交受兼溷穢濁之氣人中之即痧毒也夫人之正氣一虛暑濕穢濁之邪俱從口鼻吸入流布三焦上乘於心為中痧中入於胃為霍亂踞於膜原為寒熱歸於腸胃為泄瀉蓋暑濕之邪驟發而重者為濕溫為傷寒遲發而輕者為寒熱為晚發觸邪隨時即發者為寒熱為泄瀉伏邪遇秋始發者則為瘧為痢矣一邪之染為病非一臨症者可不探本窮源為治哉霍亂新法論云霍亂頭痛發熱身疼痛又云嘔吐而利名霍亂又云頭痛身疼惡寒吐利名曰霍亂合觀之則霍亂之症始備蓋亦傷寒之類耳其治法則云熱多欲飲水者五苓散主之寒多不用水者理中湯主之按此皆由陰陽不和上下拒格不通所致五苓所以分其清濁理中所以壯其陽氣皆中焦治法也參類方注凡霍亂腹痛吐瀉脈見結促代或隱伏或洪大皆不可斷為死果脈來微細欲絕少氣不語舌卷囊縮者不治內經云陰陽易位曰霍升降失常曰亂按此症四時俱有夏秋尤多大抵中宮必有飲食停滯外犯暑濕痧穢之邪阻塞中焦以致清不得升濁不得降陰陽錯亂得而成斯症或吐瀉並作或吐而不瀉或利而不吐或先吐後瀉總屬中焦之病邪上越則吐下泄則瀉不必分屬三焦感寒六脈沉遲口不渴小便清利吐瀉並作或兼腹痛此名濕霍亂寒邪重也宜藿香正氣散出入若大吐大瀉六脈俱伏手足厥冷舌苔黑滑者太陰中寒也作陰霍亂治理中湯加附子吸暑面赤口渴或乾嘔或吐瀉舌苔微黃而燥或白中兼紅胸悶腹痛此口鼻吸入穢暑而成也宜辰砂六一散加枳實厚朴川連鬱金之類暑濕兼穢如觸暑濕痧穢而成霍亂腹中絞痛嘔惡吐瀉宜清暑濕兼芳香逐穢如廣藿梗川鬱金厚朴枳實菖蒲檳榔赤苓滑石腹皮通草之類濕熱嗜酒之人濕熱內著中宮阻塞而成霍亂吐瀉不得二便俱秘嘔惡不止宜瀉心法如半夏橘紅川連枳實梔子豆豉滑石粉茯苓皮茵陳澤瀉之類須戒其斷米飲甜膩物以待中宮清肅否雖藥弗效也食挾暑穢如胃中已停飲食更兼吸入暑穢其勢必劇腹痛飽悶吐瀉不得絞腸大痛舌黃燥厚煩渴便閉急宜清疏中宮如藿梗厚朴川連枳實楂肉麥芽鬱金青皮草蔻滑石之類主之如未效腹中板實大痛難忍二便不通舌苔厚黃燥刺脈弦滑有力此邪結於腸胃中也大承氣湯下之如年高氣弱須用枳實檳榔生大黃生梨鮮生地等以養腸胃之陰緩下之可也便通之後仍戒其勿進米飲甜膩之物只用蘆稷湯養之和之恐餘邪未清故也胃傷生冷如過食生冷以致心腹脹滿痛瀉不已宜理中加青陳厚朴木香必舌潤口不渴右脈沉遲是也凡霍亂症無非暑濕痧穢飲食凝結而成忌一切甘膩之物更忌熱油氣犯之必復患者須遠庖廚坑廁等處使不犯油氣穢氣方可調治凡霍亂症大忌飲食即米飲下咽亦死熱湯亦忌並忌一切甜膩滋補及辛辣之物惟清爽鬆利之物可食如花紅枇杷生梨嫩藕之類霍亂因傷暑熱痧穢者當以蕎麥炒熟作湯服最妙既能通利以去暑穢又能和中環頭蘆稷湯能去穢痧止嘔吐尤能養胃和中三陰寒痧辨凡三陰症吐瀉並作後即轉筋未瀉時腹不痛瀉後腹微痛惟顙中與鼻尖有冷汗如珠又指尖羅頂有直縫羅頂低凹者邪即下陷不可救藥初起時宜飲以薑汁切忌茶湯甜物下咽即死再進附子回陽湯外治用挑痧法縮腳法灸臍用雷公散俱有救死回生之妙凡治霍亂宜戒穀食以清胃惟宜蕎麥蘆稷炒熟作湯用以代茶既有去邪逐穢之能又有養胃和中之妙但蕎麥性涼通利熱實之症為宜蘆稷性溫和中中氣虛者尤宜傷津嘔逆凡霍亂大吐後暑濕穢邪已去胸中通泰而乾嘔大渴舌中心絳燥無苔者此津液消耗也急宜鮮生地釵石斛麥冬花粉北沙參綠豆皮之類養之霍亂轉筋不拘因寒因暑總加木瓜於藥內邪去轉筋自止若吐瀉已停而筋尚轉是耗其津液而然也宜養液舒筋如鮮生地花粉鉤藤米仁木瓜之類陰霍亂凡霍亂實熱症皆中焦胃病寒症即胃傷生冷太陰感寒是也治法俱見前陰霍亂者乃少陰症初起吐利脈沉伏手足冷其舌形胖嫩淡紅不渴者是也四逆湯理陰煎之類察其宜剛宜柔投之如見舌苔紫色而干口渴乾嘔者當以金水六君煎和之如見舌形胖嫩而色黑滑者是太陰中寒理中症也不可認作少陰凡治太陰藥宜剛燥治少陰藥宜溫潤有少陰傷寒先從吐瀉而起但看舌形紫色無苔或舌中微白而四畔色絳六脈沉細似寐非寐者即是少陰傷寒治當益陰和中不可作霍亂治凡病起吐瀉而舌上有苔或黃或白者方是霍亂否則癍疹未透也緣二症中有濕熱之邪故生苔少陰乃虛症所發故舌但紫絳或淡紅而無苔臨症者辨之凡霍亂吐瀉發於夏秋之間固宜察其暑濕穢食之邪為治若治之不效或兼嘔吐煩悶脈伏足冷之症者又當察其是否癍疹痰飲不可草率也乾霍亂欲吐不吐欲瀉不瀉腹痛欲死俗名絞腸痧是也急用淡鹽湯或蔥礬水用鵝羽探吐得吐則生不吐則死吐後方用理氣和中清疏之劑隨症治之如已成閉症神昏不語放痧刮痧等法俱不效者急以鹽填滿臍孔灸之不計壯數乾霍亂神昏不語形脫者不治如開聲神清但吐瀉不得絞腸痛欲死者急用探吐法並放痧刮痧之法毒氣以下行為順景岳刮痧法妙如見痞滿燥實臍旁硬痛不可忍者下症也急以承氣湯下之此以提吐為逆達下為順也凡乾霍亂神昏不語而形脈不脫者可治脈伏而形神不失者亦可治或按穴放痧或背心刮痧再以川鬱金石菖蒲廣藿梗滑石粉通草等煎湯衝入西黃二分投之乾霍亂昏神不語六脈沉伏是否兼火當清者是否兼寒當溫者但察其唇齒舌苔之燥潤以別之乾霍亂大痛難忍大汗大渴舌黃燥刺用黃連絞水服之汗止者生汗不止者死霍亂髮燥地漿水冷服之絞腸痛蕎麥湯冷服之嘔吐不休環頭蘆稷湯冷服之霍亂腹痛行氣逐穢藥不效者飛鹽點湯冷服之探吐法以陰陽水對衝先以刀燒紅置鹽一撮於刀上即以熱鹽沖水中和勻令病人飲之居密室中以布袱拴緊其腹將鵝羽探吐得吐則生不吐則死如醒時切不可與粥飲與之立死不可與熱湯與之則心閉而死晚發參葉案晚發者夏受暑濕之邪留伏於裡至秋新邪引動而發也其症與瘧疾相似但寒熱模糊脈象沉滯舌苔黏膩脘痞煩悶午後更熱天明汗解或無汗清晨稍解此暑濕之邪留著於裡最難驟愈治法不外三焦主治在上焦則舌苔白膩頭脹身痛肢疼胸悶咽乾溺澀等症當泄氣分之熱宜連翹杏仁滑石薄荷橘紅通草半夏桔梗熱邪重加黃芩蘆根濕邪重加白蔻厚朴在中焦則舌苔微黃黏膩痞悶胸滿或目黃舌白口渴溺赤宜濕熱兼治用瀉心法半夏陳皮赤苓枳實川連通草之類若濕邪重則脾陽受傷目黃腹脹小溲不利或大便不實又宜溫中去濕如茅朮厚朴二苓澤瀉木香木瓜之類濕甚加乾薑濕熱結於下焦氣分必兼小腹脹滿小便不利宜茯苓豬苓滑石寒水石晚蠶砂茵陳澤瀉之類桂苓甘露飲亦可若暑濕之邪入於營分則口渴心煩舌赤宜清營分之邪犀角鮮地菖蒲元參連翹銀花之類若舌苔中黃邊絳齒燥唇焦脈左數右大此暑邪內燔氣血兩傷也玉女煎腳氣述古初起發寒熱殊類傷寒第腳膝痛或腫與傷寒異屬濕熱雖由坐臥濕地與濕水而得久之必濕化為熱初宜發散後兼分利與濕症同法主治大法用茅朮紫蘇二活秦艽米仁等以去風濕兼利關節黃柏黃芩以清熱防己木瓜萆薢以達下消腫利濕檳榔陳皮以行氣後佐以血分藥調之川斷芎歸丹參之類攻胃嘔逆二陳平胃加木瓜小水不利五苓散攻心則恍惚謬妄嘔吐不食眠臥不安左寸乍大乍小乍有乍無不治邪客三陽屬表見寒熱拘急宜汗邪客三陰屬裡見二便阻澀宜滲利雞鳴散治腳氣腫痛寒濕流注筋脈浮腫最驗檳榔為君重用陳皮鹽水炒吳茱萸少許鹽水炒木瓜紫蘇桔梗生薑雞鳴時服天明大便見黑色糞是濕毒已下也虛煩述古虛煩者因虛而煩躁發熱也但不惡寒頭身不痛與傷寒異耳雖有熱不可攻熱熱去則寒起誠格言也如勞役虛煩身熱頭痛氣口脈虛大者即勞倦內傷症也補中益氣湯主之蓋以甘溫之品補其中氣升其陽氣其熱自止或少加黃柏以滋腎陰其效如神如勞役虛煩身熱骨疼腿膝痠軟無力或兼自汗舌潤不渴者當以歸耆建中湯加川斷杜仲主之若傷寒煩躁發熱舌燥口渴妄言日常之事俗名勞倦實非也乃心包絡之火宜清之溫膽湯加川連鉤藤淡竹葉兼痰者加天竺黃川貝母如心氣虛而躁煩不寧不寐者左寸脈必虛小當以茯神遠志棗仁丹參之類以補心氣甚者加辰砂金箔之類以鎮心神虛甚加人參新法痰症新法肺風寒痰如見憎寒發熱鼻塞頭痛胸滿氣急或咳或喘右寸浮滑或沉伏者此風痰在肺也如舌白而潤口不渴者痰由寒邪生也宜二陳湯加桑杏前胡羌活蘇薄之類微散之喘加焦麻黃葶藶子以瀉肺如舌苔白燥口渴者肺家津液少也宜瀉白散加前胡杏仁橘紅茯苓象貝川斛薄荷枯芩之類肺風熱痰如微寒發熱胸悶氣逆咳嗽兼喘舌苔黃燥或白刺口渴脈數者此風熱客肺生痰也宜羚羊角前胡桑杏蔞霜貝母枯芩橘紅薄荷旋覆花淡竹葉之類以去風熱痰自平矣如痰閉氣逆加竹瀝薑汁潤之包絡熱痰如傷寒神昏譫語目睛微定或舌蹇語澀舌苔尖赤中白而燥者此熱痰乘於包絡也宜犀角尖川鬱金石菖蒲天竺黃川貝母鉤藤鉤淡竹葉栝蔞霜之類主之如舌絳神呆痰潮語蹇者內閉也加西黃痰挾痧疹凡時感傷寒初起即胸中煩悶氣急痰喘先用豁痰利氣藥痰已行而喘減但煩悶身熱不除反加耳聾足冷者此必痰挾痧疹也急宜透之提之如羚羊角連翹牛蒡防風乾葛薄荷枳殼桔梗蟬蛻之類痧疹挾痰凡時感初起煩悶嘔惡手足指冷寸口脈滯先用解表透疹之藥疹痧雖透而病勢不減滿悶喘急仍在者此必痧疹兼挾伏痰也當豁痰以透疹前胡杏仁象貝栝蔞橘紅海石羚羊牛蒡薄荷桔梗竹瀝薑汁之類主之痰行結解痧疹外達而諸症自平絡中濕痰如發熱脘悶胸脅肩背皆痛此濕痰竊踞肺胃之絡痰氣交阻故痛宜六安煎去甘草加桂枝鉤丁蒺藜栝蔞皮片薑黃白殭蠶木香汁之類通之行之痰入肝絡傷寒有解表之後肢體不能轉動者此痰入於肝絡也當以金星礞石半夏栝蔞茯苓陳皮天蟲全蠍薑汁炒蒺藜川桂枝旋覆花之類以搜入絡之痰肢自遂矣如未應即以養血藥兼之解後伏痰傷寒解表之後熱勢稍退但覺目鈍神呆身重或痛胸滿不暢者此胃中有伏痰也右關脈必沉伏或沉滑宜二陳湯加枳實栝蔞薑汁竹茹之類豁之行之中宮濕痰如傷寒胸悶寒熱模糊噁心不渴者中宮有濕痰也二陳湯加枳實厚朴紫蘇茅朮之類和之積痰如發熱胸悶咳嗽氣急痰多濃厚者中宮積痰也宜燥潤並用如南星半夏栝蔞海石枳實陳皮茯苓之類或導痰湯亦可解後余痰凡傷寒汗解後癍疹已透後尚覺餘熱未除目睛微定者痰也眼下黑色者亦痰也其證必中脘痞悶少納不飢宜二陳湯加枳實麥芽和之痰飲參葉案痰飲證治詳於金匱今述其要語冠諸首脈沉弦為飲面色鮮明為飲治飲當以溫藥和之飲家咳嗽當治飲不當治咳外飲治脾內飲治腎述仲景法寒邪犯肺飲發凡外感寒邪引動宿飲上逆咳嗽畏冷發熱當以溫藥和之桂枝淡乾薑半夏茯苓杏仁炙草溫邪犯肺飲發如溫邪上犯氣分以致伏飲內發上擾乘肺肺氣不降喘不得臥發熱無休或見咳紅亦屬絡熱宜桂枝合越脾法以開太陽使濁飲下趨且桂枝得石膏辛涼仍不礙於溫邪之治石膏桂枝半夏茯苓澤瀉杏仁米仁白芍甘草痰飲挾燥火凡咳嗽喉中燥痛或癢仍不渴飲者此痰飲挾燥火也夫脾家有飲故不渴而肺家有火故喉間燥癢也宜理氣分之熱兼逐脾家之飲勿以喉間燥痛而妄用滋清半夏茯苓重用橘紅杏仁川鬱金栝蔞皮白通草冰糖炒石膏此條新法陽虛飲泛如年高脾腎陽虛氣不收納痰飲上泛以致嘔咳或著枕就嗆乃痰飲伏於下焦腎絡之中至陰之界陽氣衰微則形寒畏冷下氣上逆則著枕就嗆治法當以溫藥和之宜桂苓朮甘湯以和脾都氣飲加熟附胡桃以治腎絡中伏飲如胸脅刺痛時吐酸飲脈沉弦而口不渴者此伏飲在絡也宜桂枝茯苓加薑汁炒蒺藜半夏旋覆花主之咳嗽嘔出涎沫面色鮮明不得飲食者非中虛也作飲邪治宜小半夏湯加茯苓桂枝杏仁傷食傷食亦頭痛惡寒發熱但身不痛右關脈短滑或弦滑與傷寒異胸膈飽悶惡食噯氣此食滯中脘也宜辛溫消導紫蘇厚朴枳實楂肉神麯麥芽之類兼風寒者身體拘痛也加羌防散之舌黃口渴者兼內火也加連翹黃芩萊菔子涼疏之若兼脹痛甚者挾痧穢也加廣藿梗川鬱金逐之按食與痰乃傷寒兼有之症臨症者必須兼參可也凡停食脹痛在大腹臍以上者尚在小腸之間宜消導不可下其痛滿在臍及少腹方是燥屎在於大腸下之可也蓄血蓄血傷寒者非因傷寒熱瘀蓄血乃平時勞傷所蓄之血也病不從太陽入故無惡寒頭痛之症但發熱口渴語言無倫小便利大便黑或胸脅間有痛處或因血鬱心脾如見鬼狀藥不宜涼亦不可熱當用川鬱金參三七生楂肉紅花全歸桃仁延胡香附丹參澤蘭之類和之行之如舌潤不渴者加肉桂溫之舌燥便秘加酒製大黃行之痧穢凡痧穢從口鼻吸入即從膜原流布三焦便見頭痛惡寒發熱骨節痠疼與傷寒相似但脈沉細或手足指冷腹滿嘔惡與傷寒異刺少商穴其血紫滯者是也須用川鬱金石菖蒲廣藿香檳榔厚朴青皮紫蘇等以逐穢邪則膜原清肅三焦通利而愈矣亦當兼察食痰暑濕為治邵評外經絡內臟腑膜原在內外交界之地章虛谷薛氏濕熱條辨釋膜原外通肌肉不獨口鼻所入之邪歸之肌肉濕熱之邪亦必歸之其為三焦之門戶而近胃口故膜原之邪必由三焦而歸脾胃也
