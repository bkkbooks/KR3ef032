body:
  text: 卷一類傷寒辨凡感四時六淫之邪而病身熱者今人悉以傷寒名之是傷寒者熱病之總名也其因於寒者自是正病若夫因暑因濕因燥因風因六淫之兼氣或非時之戾氣發為風溫濕溫溫病寒疫等症皆類傷寒耳病熱雖同所因各異不可概以傷寒法治之且傷寒正病絶少類症尤多苟不辨明未免有毫釐千里之差準繩獨以類症辨諸首亦以辨症為先務也用仿其意首列類症凡同傷寒之例而治者十一症不同者八症共一十九症庶臨症者得其先務云冬溫春溫寒疫熱病濕溫風溫霍亂痙濕痹風濕中暍以上十一症同傷寒施治傷食痰腳氣內癰虛煩蓄血黃耳赤胸以上八症不同傷寒施治自霜降以後天氣寒冷感之而病者傷寒也霜降以後當寒不寒乃更溫暖因而衣被單薄以致感寒而病者冬溫也邵評冬溫者冬時受邪而即病者也症多客寒包火春時天道和暖有人壯熱口渴而不惡寒者溫病也以辛溫藥汗之則壞矣若天令尚寒冰雪未解感寒而病者亦傷寒也邵評春溫病有兩種冬受寒邪不即病至春而伏氣發熱者名曰春溫若春令太熱外受時邪而病者此感而即發之春溫也辨症之法伏氣春溫初起但熱不寒而口渴此自內而發出於外也感而即發之春溫初起微寒後則但熱不寒此由肺衛而受也三月以後八月以前天道或有暴寒感之而病者時行寒疫也此寒疫亦傷寒也不得以正疫治之夏至以後時令炎熱有人壯熱煩渴而不惡寒者熱病也熱病與中暑相似但熱病脈盛中暑脈虛邵評熱病中暑兩病同在夏天故必以脈辨之熱病脈盛大而有力中暑脈虛弦而芤細夏月有病頭痛譫語自汗身不甚熱兩脛逆冷四肢沉重胸腹滿而渴者濕溫也其人常傷於濕因而中暑濕熱相搏故發此病不可發汗頭痛身熱自汗與傷寒同而脈尺寸俱浮身重默默但欲眠鼻鼾語言難出四肢不收者風溫也不可發汗病嘔吐而腹痛泄瀉惡寒發熱或吐或利而發熱者霍亂也身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者痙也太陽病發熱無汗反惡寒者為剛痙發熱汗出不惡寒者為柔痙邵評以有汗無汗惡寒不惡寒分別剛柔二痙剛為寒柔為風太陽病關節痛而煩脈沉而細此名濕痹其候小便不利大便反快但當利其小便病者一身盡痛發熱晡劇脈浮而濡額上微汗不欲去衣被或四肢浮腫此風溫也不可大汗若汗大出風去濕不去但令微微似欲汗出者風濕俱去也太陽中熱暍是也發熱惡寒身重而痛汗出而渴脈微弱以上十一症同傷寒施治頭痛發熱與傷寒同而身不痛右關短滑左脈和平者傷食也中脘必痞悶亦有停食兼感寒者人迎氣口脈俱大憎寒發熱惡風自汗胸滿氣上衝咽不得息與傷寒相似而頭不痛或時痛時止其脈緊而不大者痰也痰在上焦則寸口脈沉滑或沉伏痰在中焦則右關脈滑大有氣鬱則沉而滑夾食則短而滑凡脈弦滑者有痰飲偏弦者主飲沉弦者有懸飲內痛發熱憎寒頭痛肢節痛嘔惡與傷寒相似而痛起自腳腳膝腫痛兩脛腫滿或枯細大便堅者腳氣也脈浮數發熱灑淅惡寒若有痛處飲食如常者內癰也胸中隱隱痛振寒脈數咽乾不渴口中咳時出濁唾腥臭久而吐膿者肺癰也小腹重皮急按之痛便數如淋久必便膿血時時汗出復惡寒脈滑而數者腸癰也胃脘隱隱而痛手不可近胃脈沉細人迎逆而盛者胃脘癰也煩熱與傷寒相似而脈不浮緊頭不疼身不痛不惡寒或煩時頭亦痛煩止而痛止者虛煩也發熱如傷寒而其人有所從高墜下攧撲損傷或盛怒叫呼或強力負荷無何而病小便自利口不甚渴按胸脅臍腹間有痛處或手不可近者蓄血也以上出準繩發熱惡寒脊強背直有似痙狀耳中策策作痛者黃耳也此屬太陽風入腎經以荊防敗毒散加蟬蛻黃芩赤芍紫荊皮寒邪重者以小續命湯加白附天蟲天麻外治法用苦參磨水滴耳中發熱惡寒頭痛似傷寒而胸膈赤腫疼痛者赤胸也屬少陽風熱以荊防敗毒散加芩連栝蔞元參赤芍升麻紫荊皮大便燥實加大黃外治法用三稜針刺其血則腫消痛止矣黃耳赤胸出傷寒奧旨以上八症不同傷寒施治按傷寒類症雖多惟溫熱關於傷寒為尤重以今之傷寒大半屬於溫熱也且治法與傷寒不侔傷寒入足經而溫邪兼入手經傷寒宜表而溫邪忌汗傷寒藥宜辛溫而溫邪藥宜辛涼苟不辨明必有誤治故茲集特參以溫熱立論而以溫熱之法為兼治焉凡列於太陽症內是傷寒正病而列於陽明少陽經中其症都兼溫熱蓋少陽木火之原陽明濕熱之藪其風溫溫熱之邪自是同氣之感他如霍亂腳氣等症治法各備本門邵評此數句分別傷寒溫熱之來路不同治法用藥之各異大宜著眼察舌辨症法病之經絡臟腑營衛氣血表裡陰陽寒熱虛實畢形於舌故辨症以舌為主而以脈症兼參之此要法也茲將舌之部位形色詳列於左實臨症者之金鑑焉部位滿舌屬胃中心亦屬胃舌尖屬心舌根屬腎兩旁屬肝膽四畔屬脾又舌尖屬上脘舌中屬中脘舌根屬下脘形色白苔肺經絳苔心經黃苔胃經鮮紅膽經黑苔脾經紫色腎經焦紫起刺肝經青滑肝經診察白苔肺經候衛分氣分之表邪也肺屬金故白苔應肺肺主衛主氣主皮毛風寒先入皮毛內應乎肺又太陽主一身之表故肺家之邪即可以候太陽之表仲景麻黃湯亦瀉肺分之邪也舌無苔而潤或微白而薄者風寒也外症必惡寒發熱而口不渴宜溫散之舌苔白而燥刺者溫邪也邵評風寒在表故無苔而薄白外症必微寒繼即發熱不已此傷在手太陰肺經宜涼散之忌足經辛溫藥舌白而黏膩者濕邪在於氣分也外症必發熱頭重身痛而口不渴宜解肌去濕如桂枝秦艽羌活紫蘇二陳二苓之類邵評濕邪干犯氣分肺分雖兼太陽惟寒邪可用足經辛溫藥若風溫入肺症見發熱口渴咳嗽喉痛舌苔白燥或白兼邊紅治宜輕清涼解肺經如梔豉桑杏蔞皮象貝前胡薄荷蘇子黃芩桔梗之類邵評風溫犯肺之正法絳苔心經候營分血分之溫熱也心屬火故絳色應心絳深紅色心主營主血舌苔絳燥邪已入營中宜清絡中之熱血分之火忌用氣分藥凡溫邪從口鼻吸入上焦心肺先受如舌苔先白後紅者邪先入氣分後入營分也如初起舌即絳色者邪不入氣分而入營分也宜清解營分之熱犀角鮮生地北方無此丹皮元參之類暑邪溫疫如遇此苔亦宜泄營解毒凡白苔邪在氣分宜解表忌清裡絳苔邪在營分宜清熱忌發汗經主氣絡主血衛主氣營主血臨症最宜辨清黃苔胃經辨陽明裡症之熱邪也陽明燥金從土化故黃色應胃邪入手經以舌之絳白分心營肺衛矣邪入足經又當以舌之黃白分表裡為治也蓋白苔主表黃苔主裡太陽主表陽明主裡故黃苔專主陽明裡症而言辨症之法但看舌苔帶一分白病亦帶一分表必純黃無白邪方離表而入里邵評此以舌苔黃白分邪之在表在裡如見舌苔白中帶黃或微黃而薄是邪初入陽明猶帶表症微兼惡寒宜涼散之如黃而兼燥外症不惡寒反惡熱是傷寒外邪初入陽明之裡或溫熱內邪欲出陽明之表斯時胃家熱而未實宜梔豉白虎之類清之可也如厚黃燥刺或邊黃中心焦黑起刺臍腹脹滿硬痛乃陽明裡症也承氣湯下之紅色膽經候少陽內發之溫邪也少陽相火從火化故紅色應膽少陽以木火為用溫邪內發必借少陽為出路乃同氣之應也如淡紅嫩紅白中帶紅是溫邪之輕者初起微寒即發熱不已口渴甚者是也宜柴芩梔翹等清解之如純紅鮮紅起刺此膽火熾而營分熱急宜犀角翹丹等清解之如不解此溫邪伏於少陰而發於少陽之表也症匪輕渺速宜重加鮮生地麥冬元參之類以滋少陰之水而少陽之火自解矣大忌風藥內伏之溫邪自少陰而從少陽發出以救陰泄熱為要又風溫瘟疫等症如見舌苔鮮紅者當從手少陰治邵評從手厥陰心包絡施治即是治心黑苔脾經辨太陰濕土之寒熱也太陰濕土從濕化易雲水就濕故黑苔應脾太陰濕土所主而水就濕故脾家見症每每舌現黑色如舌苔灰黑而滑者此寒水侮土太陰中寒症也外症腹痛吐利手足指冷六脈沉細宜理中湯主之邵評寒中之太陰脾自宜溫中為定法如雜症而現黑滑苔者必是濕飲傷脾宜溫中和脾逐飲治之邵評寒濕水飲傷脾自宜溫中逐飲如白苔而兼帶灰黑色更兼黏膩浮滑者此太陰在經之濕邪是從雨霧中得之宜解肌滲濕如五苓散加羌防之類邵評濕入太陰之表故可解肌利濕如白帶黑點或兼黑紋而黏膩者亦屬太陰氣分之濕宜行濕和脾如黃中帶黑而浮滑黏膩者是太陰濕熱內結宜利濕清熱若黑而燥刺是陽經注入太陰之熱邪宜清火解毒兼陽明治如屢清不解腹無痞滿硬痛之症者不可妄投承氣是胃中津液乾涸少陰腎水不支宜大小甘露飲主之邵評前半條陽經熱邪注入太陰而陽明胃熱宜兼陽明治而用清解後半條是胃中陰液枯涸宜滋養而不可下如舌苔黑刺大便祕結臍腹硬滿攻痛此燥矢為患也承氣湯下之仍從陽明治若黑而堅斂焦刺如荔枝形者乃陽亢陰竭胃汁腎液俱涸也不治若諸書但以黑苔為腎氣凌心水來剋火百無一治庸有未驗邵評此係腎陰胃液俱竭熱陽亢極陰涸而死故曰不治不得已用大劑滋陰清熱之法藥勿間斷希救萬一又有以舌之五色分五臟乃五行之死法不足以測傷寒之變紫色腎經察少陰本臟之虛邪也少陰君火從火化故紫色應腎六經惟腎無實症故仲景於少陰症中揭出脈微細但欲寐為主病示正氣之虛也如見舌形紫而乾澀口渴唇燥外見少陰症者此腎陰不足坎中水虧宜壯水為主六味飲一陰煎之類如兼譫語神昏又當從手少陰治微清痰火如生地丹參茯苓川貝菖蒲鉤藤天竺黃之類如舌形胖嫩而色淡紅者外症必見躁擾不寧六脈遲微或動氣內發腹寒畏冷或初起吐利手足逆冷或格陽躁狂六脈洪數無根此腎氣大虧坎中火衰宜益火之原人參八味主之邵評腎陽衰而虛火上逆治以補火壯水與上條水虧不同如舌形紫燥唇焦齒黑二便俱祕此為陰中兼陽可兼陽明以治犀角地黃甘露飲之類邵評腎水虧而陽明熱治以滋水清熱凡舌形圓大胖嫩皆屬少陰虛症不拘傷寒雜證如見舌色紫如豬肝枯晦絶無津液者此腎液已涸不治痢疾見此苔胃陰已竭必死傷寒更衣後舌苔頓去而見紫色如豬肝者此元氣下泄胃陰已絶不治如舌苔去而見淡紅有神者佳邵評此腎胃陰液涸絶舌苔焦紫肝經辨厥陰陽毒之危候也厥陰風木從火化故焦紫應肝凡舌苔焦紫起刺如楊梅狀者此陽邪熱毒已及肝臟險症也大便祕者急以更衣散下之金汁人中黃之類大清大解之邵評熱毒入於厥陰陰傷陽陷故危險凡舌苔肝膽部位有紅紫點者肝臟伏毒也大凶之症急用犀角尖人中黃透之解之此陽毒謂陽邪熱盛不解其毒及於厥陰肝臟非金匱所稱陰陽毒也乃熱毒陷入至陰青滑肝經辨厥陰陰毒之危症也肝屬木故青色應肝凡舌苔青滑乃陰寒之象急宜四逆吳萸輩溫之外症若見面青唇紫囊縮厥逆筋急直視等症者厥陰敗症也不治凡舌苔焦紫如刺厥陰熱毒難治青滑厥陰寒邪吳萸溫之即愈邵評陰寒直中厥陰陽氣虛弱欲脫故為敗症察舌辨症歌六淫感症有真傳臨症先將舌法看察色分經兼手足營衛表裡辨何難邵評白苔主表黃苔主裡足經之邪分表裡治之白苔主衛絳苔主營手經之邪分心營肺衛治之凡診傷寒當先察舌之形色分別足經手經衛分營分在表在裡再參脈症施治無不獲效若拘定足六經治病非但無效且病亦鮮有合六經者傷寒兼六氣言故曰六淫感症邵評傷寒邪在足經故從足六經分表裡而施治溫熱暑疫邪入手經當辨明心營肺衛從上中下三焦施治不可拘定足六經認症也白肺絳心黃屬胃紅為膽火黑脾經少陰紫色兼圓厚焦紫肝陽陰又青邵評此條統論手經足經以舌之形色辨之此以形色分六經兼心肺兩手經足六經不言太陽者以太陽初感舌未生苔也故凡臨症見舌無苔而潤或微白而薄即是太陽黃苔陽明紅色少陽黑苔太陰紫色少陰焦紫厥陰陽邪青滑厥陰陰邪俱見前邵評上二條總論舌苔太陽與肺同主表邪尚在表故舌無苔而或薄白表白里黃分汗下絳營白衛治天淵次將津液探消息澤潤無傷澀已虧此以下辨營衛表裡治法白苔屬表當汗黃苔屬裡當下絳苔營分之熱宜清忌表白苔衛分之邪宜汗忌清治法天淵再以舌之燥潤驗其津液存亡不拘何色但以潤澤為津液未傷燥澀為津液已耗熱病以存津液為主故宜深察邵評傷寒邪從肌表而入以舌之黃白分表裡而汗下溫暑從口鼻吸入以舌之絳白分營衛而用清解以舌之潤燥辨其津液之存亡分際極清白為肺衛仍兼氣絳主心營血後看白內兼黃仍氣熱邊紅中白肺津干邵評衛之後方言氣營之後方言血衛氣營血逐層遞進須認明此四層施治邪之入先到衛分不解然後入氣分營分不解然後入血分白內兼黃仍屬氣分之熱不可用營分藥白苔邊紅此溫邪入肺灼干肺津不可辛溫過表清輕涼散為當邵評此經辨邪入之路有衛分氣分營分血分之不同臨症時最宜細審衛邪可汗宜開肺氣分宜清猛汗難入營透熱羚犀妙到血惟清地與丹邵評此條辨邪之在衛在氣在營在血分層治法凡舌苔白潤而薄邪在衛分可汗開肺即是開太陽如麻黃羌活之類如舌苔白而厚或兼干是邪已到氣分只宜解肌清熱如葛根防風連翹薄荷之類不可用辛溫猛汗也若寒邪化熱過衛入營或溫邪吸入竟入營分則舌苔紅絳而燥惟羚犀為妙品以能透熱於營中也邪在營分不解漸入血分則發熱不已宜清血分之熱鮮生地牡丹皮之類邵評此條以舌苔之黃白紅絳辨衛分營分之表裡界限極清白黃氣分流連久尚冀戰汗透重關舌絳仍兼黃白色透營泄衛兩和間邵評邪在氣分日數雖多可從戰汗而解若邪入營則不作戰如初入於營尚在營衛之間猶可透營以達至衛耳凡舌苔白中帶黃日數雖多其邪尚在氣分流連可冀戰汗而解若舌紅絳中仍帶黃白等色是邪在營衛之間當用犀羚以透營分之熱荊防以散衛分之邪兩解以和之可也邵評此條是透營泄衛之要法惟荊防不如薄荷連翹為穩白而薄潤風寒重溫散何妨液不幹燥薄白苔津已少只宜涼解肺家安邵評風寒在表舌薄白而潤可從足經用溫散藥如燥白尖紅此風熱入肺而津虧當從手經用輕清涼解此辨風寒與風熱治法不同凡風寒初入太陽則舌無苔或生苔白潤而薄此寒邪重津液不虧辛溫汗之可也如白苔雖薄而燥或舌邊舌尖帶紅此風熱之邪傷於氣分病在太陰手經津液已少不可過汗只宜清輕涼解肺分如前胡蘇子杏仁連翹黃芩薄荷桔梗淡竹葉之類苔若純黃無白色表邪入里胃家干更驗老黃中斷裂腹中滿痛下之安邵評舌苔純黃無白邪入胃經熱而未實宜白虎等湯清熱涼潤若焦黃斷裂熱入胃腑而燥實症必腹滿堅痛故可下之凡治病先要辨清營衛表裡上文辨營衛此論表裡然表證即屬衛分故此專論里症傷寒由表達里故舌苔先白後黃至純黃無白邪已離表入里即仲景所云胃家實也然舌苔雖黃而未至焦老裂紋起刺大便雖祕而未至痞滿硬痛尚屬胃家熱而未實宜清不宜攻必再驗其舌形黃厚焦老中心裂紋或起刺腹中硬滿脹痛方用承氣下之則安邵評邪入陽明有在經在腑之分有已實未實之別治法有宜清宜下之異臨症切宜詳察舌中心屬胃凡腸中有燥矢舌心必有黃燥黑燥等苔然腹無硬滿攻痛之狀亦只須養陰潤燥不可妄用承氣攻之邵評二條論外邪以舌之黃白分表裡惟舌燥有津虧邪實之不同須分別施治太陰腹滿苔黏膩蒼朴陳苓濕結開黃燥若還胸痞悶瀉心小陷二方裁邵評濕邪結於太陰症必胸腹滿悶濕阻氣機宜以苦溫開之若痰熱濕邪結於心下而痞痛者邪滯中宮宜瀉心陷胸以開痞滌痰陽明實滿舌苔老黃燥裂太陰濕滿舌苔白而黏膩陽明實滿滿及臍下少腹太陰濕滿滿在心下胃口邵評此數句辨症確切當熟記之濕邪結於太陰則胸腹滿悶宜苦溫以開之蒼朴二陳二苓之類若黃苔而燥胸中痞滿此陽邪結於心下按之痛者熱痰固結也小結胸症小陷胸法嘔惡溺澀者濕熱內結也瀉心法微黃黏膩兼無渴苦泄休投開泄安熱未傷津黃薄滑猶堪清熱透肌端邵評舌微黃薄滑邪在肺衛結於上焦氣分宜杏蔻桔橘輕苦微辛開泄上焦氣分以達邪不可用陷胸瀉心苦泄之法病有外邪未解而里先結者如舌苔黏膩微黃口不渴飲而胸中滿悶是也此濕邪結於氣分宜白蔻橘紅杏仁鬱金枳殼桔梗之類開泄氣分使邪仍從肺分而出則解矣不可用瀉心苦泄之法黃苔雖主裡如苔薄而滑者是熱邪尚在氣分津液未亡不妨用柴葛苓翹或梔豉翹薄之類輕清泄熱透表邪亦可外達肌分而解也此兩條舌色似里而實表不可作里症治濕留氣分苔黏膩小溺如淋便快聯濕結中焦因痞滿朴陳溫苦泄之痊邵評舌苔黏膩濕之證據當以苔之黃白分寒濕濕熱寒濕用苦溫以開泄之濕熱用苦寒以開泄之此以黏膩舌苔為濕邪之驗白而黏膩者寒濕黃而黏膩者濕熱更驗其小便不利大便反快為濕邪痞滿乃濕邪結於中焦宜厚朴蒼朮二苓二陳之類苦溫以開泄之若舌黃黏膩痞悶嘔惡大小便俱不利此濕熱結於中焦宜瀉心之類苦寒以開泄之上焦濕滯身潮熱氣分宣通病自痊濕自外來肌表者秦艽蘇桂解肌先邵評濕滯上焦宣通氣分則愈以濕邪從外來上焦氣分先受也非若內生之濕恆結中焦而痞滿也凡看舌苔或白或微黃而黏膩不渴者總屬濕邪但濕自內出恆結於中焦而成痞滿若濕自外來上焦氣分受之每見潮熱自汗醫者表之不解清之不應不知熱自濕中來只要宣通氣分如淡豆豉茯苓皮滑石粉半夏豬苓米仁廣皮白蔻黃芩之類氣分濕走熱自止矣若冒雨霧濕邪留於太陰肌分之表發熱自汗不解口不渴飲身雖熱不欲去衣被舌苔灰白黏膩宜桂枝秦艽紫蘇茯苓皮二陳姜皮之類解肌和表濕邪自去濕熱久蒸成內著厚黃嘔吐瀉心權若兼身目金黃色五苓梔柏共茵煎邵評濕熱結於中焦嘔吐痞滿舌苔黃厚宜瀉心開泄中焦若誤治遷延而成黃疸宜茵陳五苓梔子柏皮等方濕熱內著從飲食中得之嗜酒人多此苔必厚黃黏膩痞滿不飢嘔吐不納惟瀉心最效川連乾薑赤苓半夏枳實茵陳通草之類濕熱內結若錯治必致成疸宜五苓加茵陳梔柏之類邵評以上論黃白舌苔前二條論風寒後四條論濕症舌絳須知營分熱犀翹丹地解之安若兼鮮澤純紅色胞絡邪干菖郁攢素有火痰成內閉西黃竺貝可加餐邵評舌紅絳邪入營分也宜犀翹等清透之舌純紅鮮澤邪入胞絡也輕用菖蒲鬱金開之重用牛黃丸至寶丹紫雪丹芳香開祕若痰熱結祕加西黃川貝天竺黃清火化痰邪入營中宜泄營透熱故用犀角以透營分之熱邪翹丹鮮地以清營分之熱邪邪入心胞絡則神昏內閉須加川鬱金石菖蒲以開之若兼有火痰必致痰涎內閉更當加西黃川貝天竺黃之類清火豁痰心承胃灼中心絳清胃清心勢必殘君火上炎尖獨赤犀兼導赤瀉之安邵評黃苔而中心絳者胃火灼心也宜川連石膏以清心胃舌尖赤而有刺心火上炎也宜犀角川連合導赤散瀉小腸火府如黃苔而中心絳者心受胃火蒸灼也於清胃藥中加清心藥其勢必孤矣如舌尖獨赤起刺心火上炎之故犀角合導赤散以瀉之若見邊紅中燥白上焦氣熱血無干但清膈上無形熱滋膩如投卻病難邵評舌苔邊紅中心燥白乃上焦氣分無形之熱其邪不在血分切勿妄投滋膩血分之藥宜輕清涼解為治涼膈散去芒硝大黃加石膏能清膈上無形客熱其邪不在血分妄投滋膩必增病矣絳舌上浮黏膩質暑兼濕濁欲蒸痰恐防內閉芳香逐犀珀菖蒲滑郁含邵評舌絳黏膩上浮暑濕釀蒸痰濁蒙閉心包也急用芳香逐穢宣竅滌痰之法痰多可用西黃天竺黃之屬暑蒸濕濁則成痰暑濕兼穢恐蒙閉心胞故用菖蒲鬱金藉其芳香逐穢犀角以透營分暑邪琥珀滑石清暑利濕白苔絳底因何事熱因濕伏透之難熱毒乘心紅點重黃連金汁亂狂安邵評舌苔白底絳者熱被濕遏不得外透也用犀角滑石等藥泄濕透熱濕去則熱自解矣熱因濕邪遏伏宜泄濕以透熱如犀角滑石茯苓皮豬苓米仁茵陳黃柏之類若濕溫症舌現紅星點點此熱毒乘心必神昏譫語宜苦寒之品治之狂亂者非黃連金汁不解如無金汁以人中黃代之邵評舌苔有大紅點子者此濕溫症熱毒乘心也症必昏譫狂亂故用黃連清心火金汁解熱毒舌絳碎生黃白點熱淫濕䘌欲生疳古名狐惑皆同此雜症傷寒仔細探邵評舌絳碎而有黃白腐點者此濕熱邪毒蘊久不宣蒸腐氣血化為瘀濁得風木之氣化而成蟲也狐惑即牙疳下疳之古名也近時惟以疳名之牙疳即惑也蝕咽腐齦脫牙穿腮破唇下疳即狐也蝕爛肛陰由傷寒餘毒與濕䘌為害若胃強能食可任苦寒重藥者可治參金鑑邵評金鑑以牙疳下疳分狐惑與金匱所言似異按狐惑蟲症也上唇有瘡蟲食其臟兼咽爛名惑下唇有瘡蟲食其肛兼聲啞名狐面色乍白乍黑乍赤惡聞食氣情志默默此其候也參準繩邵評此參準繩與金匱之言相同又云狐惑蟲病也惑當作蜮看其上唇內生瘡如粟唾血心內懊憹而痛此蟲在上食其五臟下唇內生瘡者其人不寤此蟲食下部是也金匱蝕於上部則聲嗄甘草瀉心湯蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃熏之舌絳不鮮枯更萎腎陰已涸救之難紫而枯晦凋肝腎紅澤而光胃液干邵評紫絳不鮮枯晦且痿為肝腎陰涸而敗藥難救治若淡紅光潤鮮明者乃胃津干也急用甘涼濡潤之藥以救胃陰舌形紫晦如豬肝色絶無津液者為枯舌形斂縮伸不過齒為萎此肝腎已敗不治若舌色紅澤而光其色鮮明者屬胃陰乾涸猶可滋養胃陰甘涼純靜之品主之如鮮生地鮮石斛蔗漿梨汁之類邵評以上論紅絳舌苔黃厚方知邪入里黑兼燥刺熱彌深屢清不解知何故火燥津亡急救陰邵評舌苔黑燥陽明熱極然無痞滿之症不宜下而宜清清之不應腸中燥屎與熱邪固結土燥水虧胃液已干急宜甘寒涼潤以救胃陰陰回二便自通不可妄下黑燥為陽明之熱腹無痞滿硬痛非承氣症只宜清解若清之不應是腸中燥矢與熱邪固結胃土過燥腎水不支胃中陰液已干宜大小甘露飲以救胃汁陰液充溢陽邪自解二便自通黑滑太陰寒水侮腹痛吐利理中尋更兼黏膩形浮胖伏飲凝痰開逐斟邵評舌苔黑滑寒水侵侮脾土宜理中湯溫之若兼黏膩浮胖是濕痰寒飲伏於脾中宜溫運藥以開逐痰濕舌苔黑滑為太陰之寒所謂寒水侮土理中症也若更兼黏膩浮胖是濕痰寒飲伏於太陰當用溫藥和脾如二陳厚朴薑汁合五苓之類開之逐之痰飲自去舌見邊黃中黑膩熱蒸脾濕痞難禁吐嘔便祕因傷酒開泄中焦有瀉心邵評舌苔邊黃中心膩黑是胃熱蒸動脾濕蘊結中宮以致痞悶嘔吐便閉用瀉心湯開泄中焦胃熱蒸脾濕則舌黃中帶黑膩中焦痞滿嘔吐小便不利嗜酒人多此症邵評此三條論黑苔寒濕常乘氣分中風兼二氣自從同舌將黃白形中取得訣才將脈症通邵評寒濕風濕二氣只入氣分不入營分風溫之邪則由氣入營辨其舌苔黃白者邪在氣分紅絳者邪入營分再以脈症參之寒濕二氣都入氣分風兼寒濕亦入氣分風兼溫熱或入氣分或入營分矣氣分之邪於舌之黃白取之營分之邪於舌之紅絳取之得此要訣再將脈症兼參病無遁形溫邪暑熱走營中兼入太陰氣分同吸受心營並肺衛暑溫挾濕衛營通邵評溫暑二邪從口鼻吸入或入心營或入肺衛濕邪由肌表而入常走氣分若濕兼暑邪則營衛俱入矣溫暑二氣常入營分兼入氣分蓋溫暑都從口鼻吸入則上焦先受故或入心營或入肺衛或先衛後營惟濕邪常走氣分必暑挾濕濕挾暑則三焦營衛通入矣邵評二條論寒濕溫暑之入氣入營傷寒入里陽明主熱病陽明初便纏先白後黃寒化熱純黃少白熱蒸然邵評此熱病是伏氣所發初起即從陽明而達於外與感而即發之溫病自外入內者自是兩種不可混治太陽主表陽明主裡傷寒由表達里故在表屬太陽入里即屬陽明腑病熱病自內發外借陽明為出路故初起即在陽明但看舌苔先白後黃者傷寒由表達里寒化為熱也若初起純黃少白或黃色燥刺是熱病發於陽明由里出表熱勢蒸然內盛也更參外症初起惡寒發熱為傷寒壯熱無寒為熱病邵評傷寒由表入里先太陽後陽明故舌苔先白後黃見症初起惡寒熱病自里出外初起即從陽明為出路故舌苔純黃少白見症壯熱不寒胸腹灼手以此為辨最為粗確熱病無寒惟壯熱黃芩梔豉古今傳惡寒發熱傷寒症發汗散寒表劑先邵評此條亦伏氣所發之熱病切不可辛溫發汗宜用梔豉黃芩等方清解少陽陽明若是傷寒可用表劑發汗矣凡溫熱之症不可發汗如仲景陽明病之梔豉湯少陽病之黃芩湯皆可通治少陽溫病從何斷舌絳須知木火燃目赤耳聾身熱甚梔翹犀角牡丹鮮邵評舌絳赤外症耳聾目赤者是溫病從少陽而發出也當清解木火之郁與傷寒少陽症之可用表散不同故忌汗散凡溫病熱病初起皆純熱無寒熱病發於陽明溫病發於少陽當從何法斷之但看舌苔黃燥為陽明熱病絳赤為少陽溫病溫病宜用犀角梔翹鮮地丹皮之類以解木火之郁大忌汗散邵評此三條論溫熱病由於伏氣所發以舌苔辨之最精若是溫邪從上受竅中吸入肺先傳芩翹梔豉桑蔞杏氣燥加膏肺分宣邪入心營同膽治再加元麥郁菖鮮邵評春時溫邪從口鼻吸入受而即發舌苔白燥者邪先入肺也從肺衛氣分治之若舌鮮紅而絳邪入心營也治與少陽膽經同法加入清心開竅之品溫邪從內發者以少陽膽經治之若因天時晴燥太過其氣從口鼻吸入則上焦心肺受邪舌苔白燥邊紅治在氣分舌色鮮紅治在營分營分與少陽膽經同法亦用犀角丹皮鮮生地之類再加元參麥冬川鬱金鮮菖蒲以清心開竅也邵評此即發之溫病分營衛治與伏氣內發不同臨症時最宜細辨寒溫二氣前粗辨暑濕相循病必纏濕病已陳黏膩舌只將暑症再提傳邵評上文論傷寒溫病以下言暑邪濕溫暑傷氣分苔因白渴飲煩嘔咳喘連身熱脈虛胸又滿無形氣分熱宜宣蔞皮貝杏通芩滑通草滑石梔豉翹心竹葉煎或見咳紅荷葉汁痞加朴蔻鬱金川邵評此條暑傷氣分治從肺衛肺氣鬱則暑邪逆入營中故咳紅暑入心營舌絳紅神呆似寐耳如聾溺淋汗出原非解失治邪干心主宮犀滑翹丹元地覓銀花竹葉石菖同欲成內閉多昏昧再入牛黃即奏功邵評此條暑入營中治以清營開泄暑熱之邪上蒙清竅則耳聾不與少陽同例忌用柴胡乘於胞絡則神昏宜清心開閉凡邪在手經忌足經藥邵評凡溫熱暑邪由口鼻吸受邪在手經從三焦立法忌用足經藥此與治傷寒分別處也暑濕合邪空竅觸三焦受病勢瀰漫脘悶頭脹多嘔惡腹痛還防瘧痢干梔豉杏仁芩半朴銀花滑石郁紅安鬱金橘紅邵評暑濕合邪由口鼻吸受三焦俱病邪初入氣分其勢尚輕故用梔豉輕劑若傳變瘧痢等症宜隨症用藥治之暑邪挾濕從口鼻空竅觸入則三焦氣分受病頭脹脘悶嘔惡此邪初入見症其勢尚輕故只用梔豉等以清氣分暑熱之邪留於募原則變瘧入於腸胃則成痢治宜隨症加減邵評此條暑濕合邪其症尚輕若邪留膜原為瘧邪入腸腑成痢脾與胃以膜相聯故曰膜原脾胃之交半表半裡也猶足少陽之半表半裡耳濕溫氣分流連久舌赤中黃燥刺干咯血毋庸滋膩入耳聾莫作少陽看三焦並治通草茹竹茹杏金汁銀花膏滑寒石膏滑石寒水石若得疹痧肌內透再清痰火養陰安邵評濕溫重症三焦俱病故舌赤中黃燥刺耳聾是濕熱上蒙清竅不可作少陽治咯血是熱傷肺絡不可用滋膩藥宜清三焦氣分之邪若邪從外達而發疹痧再清痰火漸入養陰治之凡暑濕合邪輕則氣分微結重則三焦俱病清解不應即屬濕溫重症肺氣不得宣暢則釀成膿血濕熱上蒙清竅則耳聾無聞治當急清三焦氣分一鬆則疹痧得以外達再議清火清痰漸入養陰之品邵評此條濕溫重症惟恐人見咯血而認陰虛見耳聾誤作少陽施治故特揭之苔形粉白四邊紅疫入募原勢最雄急用達原加引藥一兼黃黑下匆匆邵評舌苔粉白邊紅疫邪入於膜原也用吳又可達原飲治法若舌變黃燥黑苔邪入胃腑用承氣下之惟達原飲中分三陽加引經藥凡傷寒初起苔形粉白而厚四邊紅絳者此瘟疫症也邪在募原其勢最雄頃刻傳變診家不可輕視吳又可用達原飲加引經表藥透之達之如兼太陽加羌活陽明加葛根少陽加柴胡如舌變黃燥色乃疫邪入胃加大黃下之如變黑色入里尤深用承氣下之疫勢甚者其舌一日三變由白變黃由黃變黑當數下之邵評此條邪由膜原傳胃自表入里故可用足經藥從吳又可達原飲與下條邪在手經大異又云此條由膜原入胃自表傳裡故可從足經用藥下條疫邪由衛入營逆傳心包當從三焦立法用手經藥與溫暑治法相通二條邪傳經絡不同舌苔各別治法用藥大異讀者大宜著眼若見鮮紅純絳色疫傳胞絡及營中清邪解毒銀犀妙菖鬱金黃溫暑通邵評舌絳鮮紅疫邪自衛入營逆傳胞絡當從三焦立法用手經藥清營開閉與溫暑治法相通較上條自表入里大不同也瘟疫一症治分兩途但看舌苔白而黃黃而黑者疫邪由表達里汗之下之可也如見舌苔鮮紅絳色此疫邪入於營分及胞絡之間汗下兩禁惟宜清營解毒逐穢開閉如犀角銀花菖蒲鬱金西黃金汁人中黃之類與溫熱暑症治法相通邵評此條疫邪由衛入營從手經用藥與溫暑大致相同溫邪時疫多癍疹臨症須知提透宜疹屬肺家風與熱癍因胃熱發如茲邵評此條溫暑癍疹與傷寒發癍不同疹屬肺經風熱癍是胃家伏熱時疫癍疹兼有毒氣均宜提透清解熱毒疹癍色白松肌表血熱如丹犀莫遲舌白荊防翹薄力舌紅切忌葛升醫邵評白疹邪在氣分舌白淡紅宜松肌達表從肺清透紅疹邪在營分舌苔絳赤宜清營宣透斷不可用柴葛足經藥癍疹發於氣分其色淡紅而白者舌苔亦白宜葛根防風蟬蛻荊芥連翹薄荷牛蒡之類松肌達表若見赤癍丹疹邪在營分血分舌必絳赤宜犀角連翹鮮生地人中黃淨銀花之類透營解毒大忌升葛足經之藥邵評此二條癍疹在氣在營不可用傷寒法施治也凡屬正虛苔嫩薄淡紅微白補休遲厚黃膩白邪中蘊診者須知清解宜不拘傷寒雜症正氣虛者其舌苔必嬌嫩而薄或淡紅或微白皆可投補若見黃而厚白而膩總屬內邪未清不可遽進補藥邵評此條憑舌苔以驗其虛實分別宜補宜清之總訣察目法一兩目赤色火症也必兼舌燥口渴六脈洪大有力宜犀角連翹等清透之陽毒三黃石膏湯表裡兼解之若目赤顴紅六脈沉細手足指冷者此少陰虛火上冒假熱真寒也六脈洪大按之無力者亦是一兩目黃色此濕熱內盛欲發黃也必兼小便不利腹滿口渴脈沉數輕則茵陳五苓散重則茵陳大黃湯若目黃小便自利大便黑小腹硬滿而痛屬蓄血桃仁承氣湯下之若目黃身冷口不渴脈沉細屬陰黃茵陳理中湯邵評熱瘀下焦與蓄血下焦其辨在小便不利為熱瘀小便自利是蓄血一病人目眵多結者肝膽火盛也宜清之一病人目睛微定暫時轉動者痰也宜加味導痰湯痰去目珠自然流動矣一病人眼胞上下黑者痰也一病人目色清白寧靜者多非火症不可妄用寒涼一病人目不識人陽明實症可治少陰虛症難治一凡目昏不知人或戴眼上視或目瞪直視或眼胞陷下皆屬死症六經本病按傷寒斷無日傳一經之理仲景既無明文其說始於誤解經義素問熱論篇云傷寒一日巨陽受之故頭項痛腰背強二日陽明受之故身熱目痛鼻乾不得眠三日少陽受之故胸脅痛而耳聾此言三陽受邪發病之期有淺深先後之次序非謂傳經之日期也故下文云七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞此言病之向愈大約以七日為期以七日始行盡本經也故太陽病至七日始衰而頭痛少愈則六日內只在本經非傳至厥陰明矣注疏者以六日為傳經已盡以七日巨陽病衰為再傳經釋之致後人皆以日傳一經為常例不知六氣之傷人無常或入於陽或入於陰靈樞云中於面則下陽明中於項則下太陽中於頰則下少陽以此可知三陽各自受邪非必從太陽傳入也則太陽受病一日發陽明受病二日發其義顯然故傷寒非必始太陽而終厥陰亦非一經止病一日亦非一經獨病相傳大抵今之傷寒無不兼經而病即古人所稱合病並病之症後學不解此旨而欲拘拘於六經傳次印證今病宜無一症合其式矣茲將六經古法述於前新法續於後其各經兼併之症列於六經正病之下庶臨症者得其把握焉太陽總要述古麻黃湯桂枝湯大青龍湯小青龍湯麻杏甘石湯桂枝加厚朴杏仁湯葛根湯五苓散桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯麻黃連翹赤小豆湯太陽本病述古發熱惡寒惡風頭痛項強體痛凡風寒初感先入皮毛肌表外症便有頭痛項強身痛腰痛骨節煩疼發熱惡寒此皆太陽經之見症如無汗而脈浮緊此營衛俱強而表實也用麻黃湯以發表使營衛之邪從皮毛而出則諸症自除矣如脈浮而弱汗自出者此營強衛弱而表虛也用桂枝湯以解肌使營衛和而邪自解矣如不汗出而煩躁此內有伏火為外寒所郁也宜大青龍湯外散表寒內清裡熱則表裡俱解矣若表不解咳而微喘發熱不渴者此心下有水氣不得化汗干肺而喘咳也宜小青龍湯以行水發汗喘加杏仁以下氣如小便不利小腹滿去麻黃加茯苓以行水若身熱無汗口渴而喘者此外寒束內熱也宜麻杏甘石湯以解肺分之邪其喘立止如感寒而喘桂枝加厚朴杏仁湯主之如身與骨節俱不疼痛獨頭項痛而背強牽引𠘧𠘧脈浮惡風無汗者此風傷於太陽筋脈也風能劫液其牽引之狀即變痙之端宜葛根湯主之以解肌表之風邪而生陽明之津液則筋脈舒而無牽引之患矣如汗後表熱未解脈浮數煩渴飲水而小便不利者此熱結膀胱水停下焦也五苓散微汗以利之如八九日過經不解發熱惡寒如瘧狀一日二三發其人不嘔非少陽也小便清者無裡熱也面有熱色者微邪未解也身癢者邪在皮膚中欲出不得也宜小汗之桂枝麻黃各半湯若有汗者宜桂枝二麻黃一湯熱多寒少宜桂枝二越婢一湯若不汗妄下瘀熱在裡但頭汗出小便不利身體發黃此太陽誤治變症也麻黃連翹赤小豆湯主之以分解表裡使濕熱之邪一從麻黃髮汗而出太陽之表一從赤小豆連翹根之利小便而出太陽之裡黃自退矣發熱熱無休止曰發熱風寒客於太陽有即發熱者有至一二日始發熱者然必兼惡風惡寒頭痛身疼等症方為太陽發熱宜汗之類方注云太陽發熱寒時亦熱熱時亦寒也金鑑云翕翕表熱蒸蒸裡熱俱有自汗症表熱自汗宜桂枝解肌裡熱自汗宜涼膈承氣不可誤治當審其尿之白赤舌之潤燥為別愚按表熱自汗畏風惡寒裡熱自汗則不惡風寒尤當認別邵評辨表熱裡熱分汗清下三法為治惡寒此風寒客於營衛非比寒熱之惡寒雖身大熱亦惡寒也發熱無汗惡寒為表實宜麻黃湯發熱有汗惡寒為表虛宜桂枝湯邵評以有汗無汗辨表虛表實金鑑云發熱惡寒發於陽表也有汗桂枝無汗麻黃無熱惡寒發於陰里也有汗桂枝加附子湯無汗宜麻黃附子細辛湯邵評以有熱無熱辨發於陰發於陽惡風風邪傷衛則惡風均屬表症但惡風比惡寒為輕耳頭痛頭痛雖屬三陽惟太陽獨多故頭痛專主表太陽頭痛必兼惡寒發熱表解自除陽明頭痛在額前目鼻等處無汗為表症宜葛根湯加白芷蔥白等汗之若自汗不惡寒反惡熱大便實小便赤當以陽明裡症治之承氣湯少陽頭痛在頭角耳根脈弦數口苦是也小柴胡去參加川芎有痰如栝蔞參準繩項強太陽傷寒必頭痛項強太陽中風兼濕成痙亦項強金鑑云項強太陽病項背強太陽陽明病也脈浮無汗從傷寒傳來宜葛根湯有汗從中風傳來宜桂枝加葛根湯若脈沉而項背強邪已入胸宜栝蔞桂枝湯體痛風寒客於太陽而身痛但拘急耳中濕則身痛不能轉側陰毒身痛則體勢沉重宛如被杖以此別之太陽身痛解表自除風濕身痛宜桂枝加附子湯陰症身痛四逆真武輩溫之參準繩金鑑云身痛未汗屬表實宜麻黃湯汗後身痛屬表虛宜桂枝新加湯若身痛尺脈遲是血少營氣不足雖未經汗不可發汗宜建中湯加歸耆以補營血也風濕身痛令人一身盡痛不能轉側筋脈牽引煩疼不寧宜桂枝附子湯少陰身痛則脈沉四肢逆冷宜附子湯厥陰身痛厥逆汗出不止下利清穀宜四逆湯邵評身痛有表實表虛營虛血少風濕各因若少陰厥陰二經中寒亦有身痛臨症均須細辨太陽兼經新法北方地厚天寒人之稟氣亦厚風寒所感只在本經留連故多太陽正病若大江以南地勢卑天氣暖人稟薄一感外邪即從太陽而入陽明少陽或從太陽而入太陰少陰總屬太陽兼症不得以太陽正病治之太陽陽明太陽少陽太陽兼肺太陽太陰太陽少陰太陽陽明凡風寒初感便見頭疼發熱惡風惡寒腰疼骨痛脈來浮緊或浮緩口不渴舌潤無苔者此風寒客於太陽陽明營衛之間也因非太陽正病故項不強耳治宜辛散羌防芎芷蘇葉朴陳薑蔥之類溫中散寒則食化而表解矣若惡寒甚而寸關脈沉遲者寒邪重也宜麻黃桂枝等辛溫汗之若飽悶惡食右關脈短滑者胃中停食也兼消導楂肉麥芽神麯之類風寒如見舌苔白而燥或兼微黃口渴便赤脈來浮滑者此太陽感寒陽明有火也或風熱之邪客於陽明之表也均宜涼散以羌防葛根連翹黃芩梔子之類清熱解表風熱如初起惡寒即發熱不已目赤多眵舌苔焦刺口渴多飲唇皴齒燥脈來洪滑此內有伏火外感新邪而發當以陽明為主治宜涼解之如犀角連翹黃芩薄荷梔子豆豉淡竹葉之類如兼頭痛惡寒可加羌活以撤太陽之邪自能得汗而解若用風藥發表則液燥火熾反無汗而加劇矣風火邵評此風火正治法太陽少陽凡人腠理疏豁其邪即從太陽而入少陽蓋少陽本屬相火溫邪與相火同氣相招也如見舌苔白中帶紅外症頭痛身熱口苦眼赤多眵脅痛耳鳴脈浮弦而數此木火之邪當從少陽治宜柴芩連翹梔子牛蒡薄荷木通等解之如未解加鮮生地牡丹皮鉤藤池菊之類清之風溫邵評此風溫入少陽經正治法太陽兼肺凡感外邪頭痛惡寒發熱而兼咳嗽者此傷風之重症傷寒之輕症也蓋肺主皮毛太陽主一身之表原相聯屬但兼咳嗽則邪外傳於肺而解不致傳裡故為輕症主治以手太陰為主如寒邪重則舌潤不渴宜六安煎加羌活蘇葉之類汗之如寒天兼喘氣口脈閉加麻黃肺受寒邪如發熱頭痛咳嗽外雖惡寒而口渴舌燥此肺有火邪而太陽感寒也宜羌活前胡桑杏羚羊薄荷黃芩貝母橘紅桔梗之類外散寒邪內清肺火兼喘者火為寒鬱麻杏甘石湯妙寒包火邵評開肺即是開太陽此寒包火正治法太陽太陰凡人之胃陽充旺則風寒之入只在陽經盤旋不致直入三陰若胃陽一虧則寒中太陽而太陰脾經亦與之同時並受如發熱惡寒即兼泄瀉者是也必舌潤不渴脈來沉緩法當溫中散寒宜羌活紫蘇厚朴焦曲廣皮木香茯苓炙草之類外散寒邪內和脾胃俾得微汗利止身涼而愈如感之輕則寒熱泄瀉治法亦同傷寒太陽少陰胃陽為三陰之障陽氣一虛則寒邪即能襲入三陰然腎氣不虛則少陰不致受邪若腎氣一虛則坎中之陽不足以御陰邪即從太陽而入於腎凡見太陽表證而脈沉細肩背惡寒大便不實小便清白者此即太陽與少陰俱病重症也法當溫里散寒宜桂枝湯加當歸酒炒山藥乾薑獨活細辛胡桃之類溫腎逐邪若目戴眼上視氣促而喘或角弓發痙尤為危候景嶽所謂太陽未解少陰先潰是也須大溫中飲主之冀其回陽作汗庶有生機傷寒陽明總要述古麻黃湯桂枝湯瓜蒂散梔子豉湯白虎湯豬苓湯大承氣湯小承氣湯調胃承氣湯茵陳蒿湯陽明本病述古胃實不便自汗不眠頭汗出手足汗潮熱譫語狂亂循衣摸床渴凡身熱微惡寒舌苔白頭額目痛脈浮洪微滑無汗而微喘者此風寒客於陽明營衛而表實也宜發汗麻黃湯主之如脈浮而遲汗出微惡寒者此風邪客於陽明營衛而表虛也宜解肌桂枝湯主之此外邪初入陽明之表即在營衛之間當同太陽施治不得以陽明正病治之以外症猶有微惡寒也若發熱汗出惡風鼻鳴乾嘔如桂枝症而頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也宜瓜蒂散吐之邵評寒抑胸中之陽病在陽明之表此即痰飲類傷寒症此病機在胸中痞硬不頭痛項強餘症雖似桂枝非太陽中風可知胸中為陽明之表寒邪結而不散胃陽抑而不升故成痞象惟用酸苦湧泄之味越之則胃陽得升胸寒自散里之表和表之表自解矣此邪不在營衛而在胸中故不用汗法而用吐法若二三日後外症身熱自汗出不惡寒反惡熱身重鼻乾不眠內症咽乾口苦煩渴飲水心中懊憹胸滿而喘舌苔白刺或兼微黃脈象洪滑此陽明內熱欲出之表為陽明半表半裡之症斯時汗下兩忌惟宜吐法以越胸中之邪梔子豉湯主之嘔加半夏腹滿加枳實身黃加黃柏茵陳如大熱汗出大煩大渴脈洪大浮滑不惡寒反惡熱舌苔黃燥者宜白虎湯主之胃火一清則津液生而煩渴解汗止身涼矣若發熱脈浮渴欲飲水小便不利者豬苓湯主之使熱從下泄諸症自除矣以上三症俱陽明內熱欲出之表症分三焦主治熱在上焦梔子豉湯越之熱在中焦白虎湯清之熱在下焦豬苓湯利之若潮熱自汗不惡寒反惡熱六七日不大便腹脹滿繞臍痛煩躁譫語喘冒不得臥腹中轉矢氣或自利純清水咽燥口渴舌苔燥黃起刺脈沉實滑數者陽明實熱里症地道不通燥矢為患也其脈沉實滑數心下痛滿堅硬及臍腹者大承氣湯急下之如大便不甚堅燥腹滿硬痛不甚者小承氣湯微和之如大便燥硬而證未劇心下不甚脹滿者調胃承氣湯潤燥以和之若惡寒未罷腹未堅滿屎未燥硬脈弱不實均不可用承氣邵評若惡寒未罷腹未堅滿屎未燥硬脈弱不實均不可妄用承氣如身熱發黃但頭汗出而身無汗小便不利渴欲飲水此為鬱熱在裡茵陳蒿湯主之邵評陽明鬱熱發黃陽黃也便實者茵陳蒿湯便溏茵陳五苓散胃實不便大便難大便硬燥矢悉屬裡症宜承氣下之然必候其舌苔黃厚焦刺腹中硬滿脹痛方可議下邵評用下須有真憑實據按承氣症後人以熟地歸芍養陰之品用代大黃芒硝等藥者非蓋傷寒熱病每每不得大便若腹中無痞滿硬痛之狀者非承氣症外雖有潮熱譫語自汗等症亦只宜清火潤燥養陰聽其自然不可攻下所謂下不嫌遲也必腹中痞滿實而脹痛者方是承氣的症斯時燥矢積壘胃底陽土亢極腎水欲涸若不急下則地道不通而死故以芒硝軟堅朴實推送大黃達下則燥矢得下腸胃通和而解所謂土鬱奪之也養陰之品惟宜施於汗後餘熱未退二便雖祕絶無硬滿之苦者此法方為切當附記於此以俟臨症者審察焉邵評辨津枯熱結與燥實治法大異最宜著眼自汗衛氣者護衛皮膚腠理也邪氣干之則衛氣不能外固而津液走泄漐漐然汗出矣風與暑濕之邪皆令自汗寒邪傷於營衛則膚腠閉密故無汗及邪傳裡為熱則營衛通腠理開亦令汗自出矣邵評寒邪在表則無汗風暑濕邪及邪傳裡俱有自汗若汗出惡風及微惡寒者皆表未解而為陽明表症宜解肌桂枝湯至於漏不止而惡風及發汗後反惡寒者此屬表虛宜溫之玉屏風加附子邵評表邪與陽虛自汗異治若身熱汗出不惡風寒者此為表解屬裡為陽明本病大熱煩渴白虎症便硬譫語承氣症邵評自汗屬陽明有經熱腑實之不同似陽明症一曰柔痙發熱汗出不惡寒似陽明而身反張為異一曰風溫汗出身熱似陽明而脈浮身重多眠為異以上參準繩邵評柔痙與風溫二症俱有自汗似屬陽明察其見症非陽明恐人誤認故特揭出傷寒奧旨云傷風則惡風自汗傷濕則身重自汗中暑則脈虛煩渴自汗濕溫則妄言自汗風溫則鼾眠自汗柔痙則搐搦自汗陽明則潮熱自汗勞倦則身倦自汗亡陽則漏不止自汗邵評自汗各有因當分因施治不眠有承氣症脈弦長小便不利大便乍難乍易微熱喘冒不得臥者燥屎也邵評燥屎內結不眠必兼有腹脹硬之症宜以小承氣湯加川連清下之有梔豉湯症發熱汗出不惡寒反惡熱咽燥口苦而喘煩躁不眠者內熱欲出也又有汗吐下後虛煩不得眠反復顛倒心中懊憹亦梔子豉湯或竹葉石膏湯頭汗出發黃頭汗出者熱不得外越而上泄也背強惡寒頭汗出者寒濕客搏經絡也下血譫語頭汗出者熱入血室也虛煩懊憹頭汗出者邪客胸中熱氣蒸於上也水結胸頭汗出者水氣停蓄不得外行也往來寒熱頭汗出者火邪熏灼上炎也皆當分門施治邵評少陽木火上炎而頭汗亦屢見之關格症不得尿頭無汗者生有汗者死濕家誤下額上汗出微喘小便不利者死以上參準繩邵評微喘額汗陽從上脫小便不利陰已下竭陰陽離決安得不死按陽明熱不得越上蒸於首而頭汗出者不惡寒而惡熱寒濕客摶於經而頭汗出者必惡風惡寒參金鑑邵評此辨寒熱濕邪在表在裡之法語最簡當手足汗胃主四肢為熱聚於胃其津液旁達於手足也陽明病手足汗潮熱譫語便硬者可下若陽明胃土中寒脾不約束津液橫溢四肢猶如陰盛霪雨滂沱故汗出而冷也陽虛失運中寒不化故不能食而小便不利也大便必先硬後溏今雖便硬手足汗出非陽明實熱者比不可攻攻之必作固瘕宜厚朴甘草生薑半夏人參湯以上合參準繩金鑑固瘕硬屎下後即瀉清水也潮熱屬陽明裡症陽明旺於申酉故潮熱發於午後如潮信之按時故名潮熱陽明病潮熱譫語大便硬者可與承氣不硬不可與若陽明病潮熱大便溏小便自利胸脅滿不去者小柴胡湯譫語譫語譫語皆胃中熱甚心為熱冒則神識昏亂而語言謬妄也諸症譫語脈短者死脈自和者愈邵評譫語為胃熱有虛熱實熱之不同須分別治之譫語氣短為氣虛正虛不能勝邪故死陽明胃實則潮熱譫語汗出脈滑疾胃中有燥屎也宜下之他如發汗後下利後下血後俱有譫語悉屬虛參準繩金鑑云心氣實熱而神有餘則發為譫語譫語為實故聲長而壯亂言無次數數更端也心氣虛熱而神不足則發為鄭聲鄭聲為虛故音短而細只將一言重復呢喃也凡譫語鄭聲與陽經同見者均屬熱證可以攻之與陰經同見者總為寒證可以溫之若陽經無可攻之證當清解之陰經無可溫之證當清補之狂亂經曰邪入於陽則狂傷寒熱毒在胃乘於心則主發狂邪熱極矣用甘草湯候冷調下鵲石散二錢邵評胃熱乘心可用大黃黃連瀉心湯煎成沖童便蓮心最效甚則銼入犀角末金汁如狂症太陽蓄血發狂則少腹硬痛小便自利陽明蓄血如狂則喜忘大便黑均以桃仁承氣湯主之又有陽盛陰虛之人作汗將解之時奄然發狂濈然汗出而解者當須識之不可與藥也以上參準繩邵評如狂有蓄血狂汗之分凡胃熱乘心則神昏狂亂表實無汗者三黃石膏湯裡實不便者承氣湯無表裡症而熱極者白虎解毒等湯參金鑑循衣摸床此為危惡之候陽明裡熱之極脈弦者生脈澀者死以弦長胃氣尚存可下承氣故也然亦危極矣蓋生者未必盡生而死者斷無可生之理邵評此症胃氣不虛者尚可救治然亦危險虛者必死無疑若見於三法之後乃大虛之兆不必辨其陰陽虛實當以獨參湯六味飲時時與之每有生者渴經云病人不惡寒而渴者此轉屬陽明也故渴列陽明門然六經皆有渴病者參準繩邵評渴雖屬陽明然六經皆有渴症渴病多因三法傷其津液胃中乾燥故渴陽邪往乘三陰太陰則嗌乾少陰則口燥厥陰則消渴亦屬熱傷津液也太陽之渴用五苓散者以水停下焦小便不便也陽明之渴用白虎湯者以胃熱飲水不已也少陽症具心煩渴而用小柴胡湯和解去半夏加花粉者避燥以生津液也以上參金鑑凡渴欲飲水者當少與之以滋胃燥則胃和而愈若恣意飲之必致停水為病陽明新法江蘇閩浙天氣溫暖地勢卑濕乃天下濕熱之區陽明氣盛血熱容納水穀亦人身濕熱之藪若感風溫風熱之邪病都不由太陽而入陽明者口鼻吸入或從太陽而即入陽明者皮毛傳入陽明內熱之邪與外邪風熱相搏凝滯成毒每多發癍發疹若不辨明熱與寒邪之異概用太陽經藥發表汗不得出癍不得透溫熱內燔爍干胃中津液而成壞症死者多矣用將陽明熱病諸條臚列於後惟在臨症者之圓機焉凡遇發熱身痛口渴唇燥或初起微寒即發熱不已舌苔中黃邊白或黃燥如刺脈來洪滑此陽明內熱為外感新邪引動而發也宜犀角連翹牛蒡薄荷黃芩葛根防風木通之類清解之若見煩悶嘔惡足冷耳聾脈沉伏或浮躁者此癍疹欲透也亦用此方透癍解毒渴而乾嘔者加蘆根一握如遇脈象沉鬱不可認為寒此必癍透不快也如關上見伏脈此必熱毒凝滯癍不得出也若右關脈伏而兼胸痛氣急或咳者此必有伏痰也又當以治痰為主總以舌苔黃燥為實熱之憑勿以脈象沉遲為虛寒之驗也陽明以胃實為病故大便不通然熱邪外無出路每每下逼大腸而下黃黑稠黏之糞下時肛門必有熱氣此因外不得解而邪從下泄雖通仍作不通論勿止之或從下泄之後反能得汗而解即不能得汗亦只清火解毒兼養陰液其邪自能漸解身涼或從養陰之後陰液外溢反得大汗而解或有熱毒內結癍疹不得外透反從下泄之後癍疹始出或用透發不應只用清火解毒癍疹反透此皆熱毒內結使然以舌苔黃燥者論陽明內熱引發邵評傷寒與溫熱本自不同傷寒大便溏為邪已盡溫熱大便溏為邪未盡必大便硬乃為無濕斯不可再攻耳惟熱毒總以舌苔黃燥為憑若新邪外觸內發伏邪重而新邪輕勢所必然如癍疹已透只宜清解毒火微兼養陰柴葛升提之品俱不可投宜連翹赤芍元參花粉知母黃芩銀花鮮生地人中黃之類癍毒自化矣邵評餘毒未清禁用升提若見舌絳如朱目赤如火口燥唇裂汗出津津此陽明血熱邪從內發已遍三焦即陽明熱病也切忌風藥升散宜涼膈散去芒硝大黃加石膏牛蒡赤芍鮮生地牡丹皮主之大便祕者去硝留黃陽明血分熱病邵評陽明血分熱病忌用升提若見發熱自汗舌自如刺或黃燥口渴不惡寒反惡熱此陽明氣分之熱宜梔子豉湯加連翹黃芩淡竹葉蘆根之類清之陽明氣分熱病邵評此陽明氣分熱病正治法化癍解毒之後或汗解之後尚有餘熱未退大便雖閉腹中調和者只宜養陰退陽甘露飲加減妙陰液復餘邪自退大便自通矣有身熱已退獨額熱未除者此胃中有餘邪也宜清疏陽明如連翹黃芩生楂麥芽枳殼金斛之類如已身涼獨腹熱未退此脾家有火也加生白芍清之陽明兼肺前太陽兼肺在寒邪一邊此陽明兼肺在溫邪一邊均以手太陰為治如遇發熱惡寒咳嗽喉燥渴飲舌苔白中帶黃或白而燥刺或邊紅中白脈來浮數此風溫客於太陰手經而內熱發於陽明之表也宜羚羊角前胡杏仁連翹薄荷桔梗黃芩豆豉淡竹葉之類以解風熱如兼煩悶嘔惡脈沉足冷者欲發痧疹也亦以此方加牛蒡防風透之邵評風溫初入肺衛在陽明之表如痧疹已透尚有頭脹心煩脘悶咳嗽者肺氣不得宣暢也宜梔豉蔞仁桔梗黃芩連翹牛蒡川貝鬱金之類使肺氣通暢痧疹透達諸症自解若痧疹已透仍然胸脅悶痛咳嗽喘急者此有伏痰也其氣口脈閉是痰之驗也宜豁痰利氣如前胡杏仁栝蔞橘紅蘇子象貝桔梗枳殼萊蔔子竹瀝薑汁之類投之痰自出矣陽明少陽凡風寒之入由皮毛而腠理腠理為陽明少陽之界作表症看非邪已入陽明之裡而復傳於少陽也柯韻伯力辨陽明傳少陽之謬以此如身熱口渴微兼惡寒舌苔中白邊紅或根白尖紅脈來弦滑此邪入肌肉腠理之間陽明少陽之表證也宜解肌法如柴葛連翹薄荷黃芩橘紅之類以取肌分之汗熱自退矣傷寒如見舌苔白少紅多初起微寒即發熱不已此陽明輕而少陽重氣分少而營分多宜犀角連翹丹皮鉤丁黃芩薄荷黑梔之類以清營分之熱太忌汗散溫邪邵評此條溫邪自口鼻而受由肺衛而入手少陽三焦從心營肺衛治用手經藥與上寒邪在足經者治法不同大宜留意陽明太陰前陽明少陽邪由陽明之表而來此陽明太陰邪從陽明之裡而及胃與脾聯此表裡俱病也如見舌苔白帶灰黑色或白中帶黑點或邊黃中黑或前半黃後半黑或純黃燥苔或黃分八字種種形色皆陽明太陰之驗外症身體灼熱口渴唇燥左關數右關滑此陽明熱邪內蘊以致癍不得透毒不得解因與太陰為表裡而傳入也急宜透之提之不使毒邪陷入三陰用二角芩連連翹牛蒡桔梗薄荷等使癍外達而解如癍點隱隱不得外透加角刺數分以透之如大便祕而潮熱譫語者陽明為重太陰為輕下之可也邵評陽明熱邪內郁成癍不外達而內傳太陰實熱症也仍宜提邪外達陽明少陰前陽明太陰因陽明之邪失表失清以致將陷太陰作實證治故猶用提透此陽明少陰由其人本屬陰虛即病在陽明而少陰已不能支此土來剋水水不濟火也當作虛症治凡見舌苔中黃邊紫前半黃後半紫或前半白後半紅脈左數右洪外症潮熱舌燥唇焦口糜氣穢齒衄煩渴此景嶽所謂陽明有餘少陰不足之症也宜大小甘露玉女煎之類隨症加減無不應手邵評此腎陰虧而胃有熱氣血兩燔灼耗腎水之正法少陽總要述古小柴胡湯黃芩湯大柴胡湯柴胡去參夏加桂枝蔞根湯小建中湯黃連湯少陽本病述古口苦咽乾目眩耳聾往來寒熱胸脅滿痛嘔按少陽屬半表半裡故仲景以口苦咽乾目眩為一經主病蓋膽屬木而少陽為相火此皆木火上炎之證已該傷寒雜症而言閲少陽篇內或言傷寒或言中風或言並病或言轉屬本無一定若執定從太陽陽明傳入不啻癡人說夢矣凡遇傷寒初起頭痛發熱而脈弦細者此少陽初感寒邪故頭痛發熱與太陽同而脈則現少陽本象也少陽少血多火雖有表邪不可發汗當以小柴胡湯和之若發熱耳聾目赤胸滿而煩者此少陽中風也蓋少陽屬木火風中其經亦同氣相感風動火炎故見症如此耳目為表之裡胸中為里之表亦當用小柴胡湯和之若頭痛胸滿口苦咽乾或往來寒熱脈浮而弦自下利者此太陽少陽合病也緣熱邪入少陽之裡膽移熱於脾故下利黃芩湯主之其邪不在半表而在半里故不用柴胡而主黃芩嘔加半夏生薑治痰飲也傷寒汗出不解十餘日結熱在裡心下痞硬嘔吐下利復往來寒熱者大柴胡湯主之此熱邪從少陽而結於陽明故合治之傷寒四五日身熱惡風頭項強桂枝症脅下滿柴胡症手足溫而渴者小柴胡湯主之按此是太陽少陽並病當用小柴胡去參夏加桂枝栝蔞根兩解之陽明病發潮熱陽明大便溏小便自可胃未實胸脅滿者少陽小柴胡湯主之按此陽明少陽合病因胃家未實故從少陽胸脅滿一症即用小柴胡和之使熱邪從少陽而解不復入陽明矣陽明病不大便胸下硬滿而嘔尚在少陽部位舌上白苔者可與小柴胡湯按白苔屬痰飲溢於上焦與小柴胡則痰飲化而津液行胃氣一和則上焦仍得汗出而解矣邵評若痰飲溢於上中焦症見少陽陽明可用柴胡溫膽湯傷寒陽脈澀陰脈弦法當腹中急痛先用小建中湯不瘥者小柴胡湯主之按尺寸俱弦為少陽受病今陽澀陰弦是寒邪傷於厥陰也腹中為厥陰部位故急痛先用小建中所以平肝散寒也未瘥仍用柴胡者使邪引出少陽而解也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之此寒熱相持於內故用姜連以和里胃中寒邪尚可外達故用桂枝以和表此仍不離少陽之和法亦可兼治厥陰寒熱嘔逆邵評因上熱下寒格拒中宮故腹痛而嘔吐用黃連湯開痞而和上下也且黃連湯與小柴胡湯俱是樞機之劑而為和法小柴胡和其表裡黃連湯和其上下同一和法而有橫直之不同也口苦咽乾論云少陽之為病口苦咽乾目眩也此皆膽火內盛上走空竅而然不拘傷寒雜症以少陽相火治之柴芩梔子丹皮之類邵評此症是膽火上升不拘傷寒雜病皆當清其相火目眩眩頭旋目花也在少陽為木火上炎凡鉤藤天麻池菊等均屬熄風妙品宜加入之汗吐下後屬虛無疑耳聾少陽中風則耳聾無聞厥陰榮衛不通耳聾囊縮者死凡傷寒溫疫耳聾為常例然以此可察病之重輕其耳漸醒其病漸退其聾漸甚其病漸進按金鑑云目眩耳聾少陽本病病退自復若三法後目眩兼神昏語亂者乃神散氣脫之候不治若誤發濕溫之汗以致耳聾不能言語者名重暍死證也邵評以耳聾察病之輕重驗其精氣之傷與不傷也惟瘟疫耳聾不關少陽治不同例往來寒熱少陽有往來寒熱寒已而熱作熱已而寒起相因不已是也為少陽主證小柴胡湯邵評邪與陽爭則寒與陰爭則熱在半表半裡則往來寒熱少陽在半表半裡故為主症太陽有如瘧寒熱寒熱無休止之常日三五發謂之如瘧此太陽未盡之表邪也無汗宜麻桂各半湯有汗宜桂枝二麻黃一湯熱多寒少宜桂枝二越婢一湯若寒熱有作止之常一日一次或間日一次謂之瘧不得概以小柴胡治之參金鑑邵評太陽表邪未盡不可不汗故用此三方然亦不可過汗故用此二方微汗之按往來寒熱雖為少陽本病而所因有三如少陽自受寒邪陰氣鬱遏初則不能發熱惡寒至五六日鬱熱內發與寒邪相爭則為往來寒熱一也或太陽受寒過五六日餘邪轉屬少陽而為往來寒熱二也或少陽自受風邪即為往來寒熱三也不得執定從太陽傳來其胸脅苦滿默默不欲飲食心煩喜嘔此皆少陽本病也或煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者此皆少陽或有之證也總以小柴胡湯主之其或有之證治法悉在本方加減內須細閲之參來蘇集邵評少陽在半表半裡為樞機之經偏寒偏熱本無一定故多或然之症胸脅滿痛邪氣傳裡必先自胸而脅以次經心腹而入胃也是以胸滿多帶表症脅滿多帶半表半裡故胸中窒梔子豉湯以吐虛煩胸中痞硬氣上衝咽喉不得息者瓜蒂散以吐實痰作表症治若胸滿痛及脅為少陽症小柴胡湯參準繩按金鑑云脈浮惟胸滿而不及脅者仍屬太陽表分也宜麻黃湯因胸及脅而皆滿者屬少陽經宜小柴胡湯若十餘日不解胸脅滿而兼乾嘔潮熱者是少陽兼陽明也宜大柴胡加芒硝兩解之若表已解心下及腹引脅滿硬而痛乾嘔小便不利者是停飲內實也宜十棗湯攻之邵評胸脅滿痛有表裡病因之不同當分經辨症施治惟伏暑濕溫脅痛寒熱如瘧不可誤作柴胡證以香附旋覆花蘇子廣皮半夏茯苓米仁治腹滿加川朴痛甚加降香久不解間用控涎丹甘遂大戟白芥子為末神麯糊丸嘔邪在半表半裡多嘔故嘔屬少陽然六經皆有嘔症各照本經治之邵評嘔屬少陽以木火上升犯胃胃逆不降而嘔也然六經皆有嘔症故分別治之按金鑑云表邪入里裡氣拒格上逆作嘔屬少陽宜小柴胡湯主之若表邪不解而嘔屬太陽宜柴桂湯若食谷欲嘔屬陽明中寒宜吳茱萸湯嘔吐涎沫屬厥陰亦宜吳茱萸湯嘔吐蛔烏梅丸嘔而飲飲而嘔相因不已是停水也宜五苓散邵評嘔有多因宜分經辨症為治臨症時切須細審少陽新法經云冬傷於寒春必病溫夏必病熱又曰冬不藏精春必病溫故凡腎虛多欲之人寒邪乘間而伏於少陰久則寒化為熱至春陽氣升發新邪引動而發於少陽者為溫病至夏陽氣大泄新邪外觸而發於陽明者為熱病邵評冬令閉藏邪不外發春夏陽氣泄越而病溫熱溫病發出之途由少陽熱病發出之途由陽明但有伏氣所發受而即發兩種極宜分辨然溫熱之症四時俱有有伏氣內發而病者如冬月伏寒夏月伏暑再感新邪而發者是也有時邪外觸而病者如秋應涼而反熱冬應寒而反溫感其氣而即病者是也辨症之法凡見純熱無寒而口渴者即是溫熱非傷寒也但看舌苔白黃而燥者乃陽明見象純紅而燥者乃少陽見象陽明宜存肺胃之津少陽宜顧肝腎之液前陽明新法已陳溫熱之概茲專以少陽溫病為主而兼以手三陰為治焉邵評純熱無寒而口渴伏氣所發溫熱則然也若受而即發之病邪遏肺氣初起必微寒而後發熱不已須分辨之若苔燥是溫熱病之的據凡人腠理疏豁風溫之邪即能直入少陽以少陽屬木火同氣相感也或由其人素有伏邪因風寒外觸其邪直從內發而出於少陽者亦溫病也其症初起或見微寒即發熱不已口苦目赤脅痛胸滿渴而欲嘔脈來弦滑而數舌苔白兼邊紅或淡紅色此邪初發於少陽也宜柴芩梔丹翹薄清解之至四五日舌苔純紅起刺煩躁不寧六七日耳聾顴紅神昏譫語或汗出不解或癍疹透於胸前此時木火大熾營分血熱已極大忌風藥劫液宜用鮮生地一二兩犀角連翹黃芩薄荷丹皮黑梔鉤藤銀花之屬以清膽腑之熱兼解營分之邪熱毒自解矣少陽兼營熱如見目赤面紅神呆不語舌如芒刺或癍見紫色此包絡之火亦盛也宜犀角鮮地鉤丁連翹川連菖蒲丹皮黑梔銀花等解之芒刺一退即當水中養木寒涼不可過分宜六味甘露等湯加減少陽兼包絡火邵評滋腎陰清胃熱以生津液乃少陽兼心包絡正法如初起即見舌苔鮮紅神昏譫語煩躁不寧者此溫邪上乘包絡也防發丹疹切忌升葛荊防宜犀角連翹鉤丁薄荷丹皮川斛菖蒲天竺黃淡竹葉人中黃淨銀花之類以解包絡營分之熱則毒透而神清矣溫邪上乘包絡如舌苔紅中兼白色症見譫語咳嗽者此風溫入於心肺兩經也宜透營分之熱兼泄氣分之邪當用羚羊角連翹薄荷黃芩象貝杏仁蔞皮丹皮元參梔子之類次用梨汁蔗漿金斛麥冬花粉粉參之類以養肺胃之陰溫邪入心肺兩經邵評溫邪入心肺以存陰化熱為正治如癍疹已透之後依然神昏譫語目睛微定舌色鮮紅者此熱痰乘於包絡也宜犀角尖鮮菖蒲天竺黃川貝母連翹鉤丁丹皮淡竹葉竹茹辰砂之類以開熱痰神自清矣火清毒解之後如見虛煩嘔惡驚悸不寐只用溫膽湯和之熱痰乘包絡邵評包絡熱痰由包絡之熱已化而痰邪留伏胃中治以滌痰和胃如火邪既退之後身體不能轉側而兼脅痛者此必有入絡之痰也宜天蟲全蠍鉤藤桂枝栝蔞澤蘭竹瀝薑汁之類追之痰入絡中如癍疹已透而熱邪未退舌絳神呆語言顛倒小便赤澀點滴如稠此熱結小腸所致夫小腸結則火邪逆乘心包故神昏急用導赤散加川連連翹赤小豆梔子等以清小腸之熱則便利而神清矣小腸熱結以上諸症皆溫邪為病故入少陽新法內邵評心與小腸相表裡小腸為火腑邪熱內結小腸而逆乘心包是腑病及臟也用苦味清火先入心且小腸火腑非苦不通也少陽陽明前陽明少陽是表症此少陽陽明是里症少陽之邪不解熾入陽明胃腑外症耳聾顴紅發熱便祕舌苔邊紅中燥黃乃二陽合病也仿大柴胡意用柴芩枳實連翹赤芍製大黃微下之若見舌苔黃中現出黑點煩悶噁心身痛足冷此胃中熱毒欲發癍也宜透癍解毒犀角連翹梔子牛蒡黃芩薄荷銀花之類傷寒邵評少陽木火挾胃熱而發斑也宜急急透斑解毒為要少陽太陰凡見舌苔尖紅根黑或邊紅中黑或紅中帶黑點面紅目赤唇燥口渴齒縫出血或鼻流衄血此少陽毒盛火抑癍不得透腠理閉塞以致陽邪陷入太陰此病由於失表失清急宜清解用犀角連翹牛蒡黃芩薄荷丹皮元參鮮生地淨銀花之類以化癍解毒蓋病由於失表恐癍不能外達皮毛故從解化傷寒邵評邪在少陽之時未曾清解以致毒火抑遏陷入太陰斑不得透仍用清透之法為治少陽少陰少陽之邪不解則包絡熱而肺門閉肺竅不通則傳濡之液流入少陰脈象弦細而數舌苔尖紅根紫或純紅起刺耳聾齒枯舌燥唇焦午後發熱神昏不語或鄭聲作笑此少陽木火大熾反逼少陰二少失司病匪輕淺急宜解木火之郁以救少陰之水用柴芩鮮地丹皮黑梔連翹川連鮮菖蒲之類以清之解之如不應急當滋少陰之水以濟少陽之火如六味飲一陰煎之類加減投之服後舌轉微紅神清齒潤則木火之郁解而少陰亦治矣溫病少陽厥陰少陽與厥陰為表裡木火之邪無處發泄勢必連及於肝此表裡俱病法當從少陽治以引陰出陽邵評木火之邪連及厥陰表病及里也少陽病入厥陰由表及裡治法當使其邪仍從少陽外出為妥如見舌起紅刺或黑中有紅點外症發熱惡寒如瘧狀手足乍溫乍冷煩滿消渴譫語二便不通脈弦而數方用柴芩川連鮮地丹皮梔子鉤丁薄荷等以散風木之郁使邪復出少陽而解溫病邵評少陽溫病木火鬱邪轉入厥陰表與里同病也其邪尚輕故用清散少陽使邪外出
