body:
  text: 卷二三陰總辨撰傷寒書者每於三陰或熱或寒之故都模糊過去即有傳經直中之分亦非仲景本旨此處不明何以臨症用陳鄙見質諸高明一三陰有陽經注入之邪有本經自感之邪注入之邪則傳變不一陽主動也自感之邪則在本經陰主靜也邵評傳經自受是邪入三陰之兩大法門一三陰世都以傳經直中分兩門傳經悉指為熱直中悉指為寒此說似是而實有未盡者夫傳經即邪從三陽經傳入直中即本經自受之風寒也蓋邪之傳入三陰熱症固多而寒症亦間有本經中寒固無熱症而中風亦能發熱未可以此分寒熱了之其症細述於左邵評不可以傳經自受分其寒熱者以陰經寒邪不能發熱陰經風邪亦有發熱也一邪從陽經注入三陰則或為熱症或為寒症如邪入太陽先作鬱熱以次傳入陰經則為熱症或邪在太陽不及鬱熱即入少陰而現少陰形證則為寒症或太陽之邪即入少陰而仍帶太陽標病則為先寒後熱之症或太陽之邪不傳陽明少陽便入三陰隨其人之體質虛實臟腑寒熱則從陰化為寒症從陽化為熱症或風溫之邪從三陽入陰經則無不為熱症凡三陰篇內所稱轉屬陽明而用承氣等湯皆陽經傳入之熱症也邵評邪入三陰或寒或熱之故分別詳明一三陰自受之邪各有中風中寒之症三陰中風則能發熱以風屬陽邪故也三陰中寒則不能發熱以寒屬陰邪故也即少陰有反熱之症亦必帶太陽標病而然後人但知傳入三陰為傷寒不知三陰自感亦傷寒也故於本經中風發熱便誤認為傳經標病以本臟中寒無熱即指為直中陰症詎知桂枝湯為表之裡藥固能兼治三陰自感之風邪而理中四逆等湯本治三陰自感之寒邪也耶蓋風寒六氣之傷人或入於陽或入於陰原無一定但值何經之虛而治之不得專以太陽為受邪之始也故三陰固有陽經注入之症亦有本經自感之症均屬傷寒不必另立名目也茲於三陰經中無直中之條非略也正不敢蛇足耳邵評三陰自受寒邪不能發熱三陰自受風邪亦能發熱不可因其有熱誤認為陽經傳入之熱症也惟三陰自受風邪宜桂枝湯和表自受寒邪用理中四逆溫里一三陰自受之邪論中有可歷指而見者如太陰病脈浮者可發汗宜桂枝湯此太陰中風也如太陰病腹滿而吐自利益甚時腹自痛此太陰中寒之症也如少陰中風脈陽微陰浮者為欲愈此即少陰中風欲愈之脈也至於少陰中寒宜汗者麻黃附子細辛湯當溫者附子四逆等湯是也如厥陰中風脈微浮為欲愈此即厥陰中風欲愈之脈也厥陰中寒即當歸四逆加吳萸生薑湯是也閲少陰厥陰篇內止有中風欲愈之脈並無未愈之證治者必有闕文也邵評此論三陰自受風寒脈症治法分別精細一三陰篇內惟少陰有大承氣急下三症而太陰厥陰篇內並無承氣之條奈何後人反稱邪在厥陰三承氣選用夫承氣本陽明胃藥少陰用承氣者蓋因腎水一虧胃土燥實病已轉屬陽明故急下以存陰液仲景述厥陰病云下之利不止此厥陰忌下之明戒也焉有邪在厥陰反用承氣之理聖訓具在是非自見邵評論三陰熱邪結實可用承氣攻下之法否則切不可用之理分別甚精太陰總要述古理中湯桂枝湯五苓散四逆湯四逆加人參湯三物白散桂枝加芍藥湯桂枝加大黃湯太陰本病述古腹滿腹痛發黃吐利太陰濕土所主仲景以腹滿而吐食不下時腹自痛自利不渴等症為太陰病乃濕土自病非陽經注入之症也其脈必沉而細無論外受寒邪內傷生冷總以溫中散寒為主理中湯主之邵評太陰受邪有二端一因外受風寒一因內傷冷食與他經不同也自受寒邪治宜溫中若太陰中風其脈尺寸俱浮其症四肢煩疼者可發汗宜桂枝湯其脈陽微陰澀而長者為欲愈也太陰腹滿而痛自利不渴者因於寒咽乾而渴者因於熱因於寒濕土自病宜理中溫之因於熱病必關於陽明或暴煩下利或發黃便硬此脾家熱即屬胃家之熱為轉屬陽明之症宜從陽明治邵評同是滿痛自利著眼渴與不渴不渴自受寒邪故宜溫渴是陽經熱邪傳入太陰脾胃相連故病關陽明太陰熱邪轉屬胃腑故可從陽明治此太陰滿痛自利以渴不渴辨寒熱最為要訣傷寒脈浮而緩身不發熱手足自溫者太陰也太陰身當發黃若小便自利者不能發黃蓋寒濕傷於肌肉不能外越皮膚故發黃若小便利則濕氣下輸膀胱便不發黃設小水不利當用五苓散利之若寒濕傷於太陰之表可從小便而出若濕熱傷於太陰之裡又當從大便而出故至七八日暴煩下利雖日十餘行不必治之以脾家實所積腐穢行儘自止矣蓋不須溫亦不須下也邵評太陰熱邪暴煩是里陽陡發下利雖多正是脾家穢積之去路去盡則自止此條是太陰濕熱故脈浮緩治當利小便若七八日暴煩下利有陽氣來復脾家所有積穢下儘自止不須用溫與下也傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也自利不渴者屬太陰以其臟有寒故也當溫之四逆輩邵評太陰自受寒邪氣機下注故有下利之兆自利因於寒濕故不渴治當溫臟祛寒惡寒脈微而復利四逆加人參湯主之邵評惡寒而脈微下利陽虛而陰勝也此為陰寒下利用四逆湯溫里人參補虛最為精當下利十餘行脈反實者死此脾氣虛而邪氣盛故也太陰腹滿時痛誤下之胸下結硬而成寒實結胸無熱症者與三白小陷胸湯病在膈上者必吐膈下者必利如不利進熱粥一杯利過不止進冷粥一杯三白小陷胸湯即三物白散邵評腹滿時痛太陰寒邪誤與寒藥下之寒邪與寒藥相結成寒實結胸與熱實結胸不同故用溫通一法無熱症者不四肢煩疼也若太陽誤下續得自利脈弱腹滿而痛此太陽之熱邪陷於太陰之裡也腹滿時痛為虛宜桂枝加芍藥湯腹滿大痛為實宜桂枝加大黃湯然脈弱則胃氣亦弱故云設當用大黃芍藥者宜減之邵評下利為太陰本症自利因脾實穢盡則愈自利因臟寒者四逆輩溫之此自利因太陽誤下而邪入太陰則腹滿時痛當加芍藥大實痛者當加大黃矣然下後脈弱則胃氣亦弱當小其制而減用之雖然下利腹痛熱邪為患故用芍藥若陰寒腹痛非芍藥所宜仲景與大黃並提勿得輕視若誤下太陽熱邪陷入太陰是陽經注入之症分虛實治之腹滿腹屬陰屬裡故陽明裡症是腹滿三陰俱有腹滿太陽汗後腹滿脾胃不和也二陳湯加厚朴和之陽明潮熱腹滿燥矢也下之身黃小水不利腹滿濕熱也茵陳蒿湯邵評腹滿有汗後脾胃不和之虛滿有燥矢濕熱二症之實滿當分因施治太陰腹滿有虛寒如腹滿時痛食不下吐利交作是也理中湯加厚朴有實熱如腹滿大痛咽乾便祕或發黃或暴下赤黃此脾家實熱為轉屬陽明宜承氣加減合參準繩金鑑邵評腹滿有虛寒是太陰本症宜溫中有實熱是太陰轉屬陽明宜下之腹痛邪氣入里與正氣相搏則腹痛故太陽無腹痛少陽有脅痛而無腹痛陽明裡症有腹痛三陰俱有腹痛當分部位中脘痛屬脾脈沉遲者內寒理中湯陽脈澀陰脈弦小建中湯邵評三陽惟陽明有腹痛三陰俱有腹痛須分部位當察其所痛之因分別施治少腹痛屬厥陰界分四肢逆冷小便清白是冷結膀胱宜當歸四逆加吳茱萸生薑湯溫之如不厥冷小便自利者是血蓄膀胱宜桃仁承氣湯小便不利者是水蓄膀胱五苓散大小便俱不利者是水熱蓄積八正散邵評少腹痛有血蓄水蓄水與熱俱蓄三因分別治法甚精惟桃仁承氣之大黃宜用醋炒若大實小腹滿痛或繞臍攻痛不大便脈實者承氣湯邵評胃腑熱實燥屎作痛故用下法發熱口渴脈弦洪而腹痛者屬脾熱芍藥黃芩湯腹痛欲吐利煩躁飽悶者防痧毒當刺委中少商等穴合參準繩金鑑邵評痧穢內滯氣閉作痛治宜芳香開泄按腹痛有虛實按之痛甚屬實按之痛減屬虛有寒熱自下逆攻而上者火也自上奔迫於下者寒也又傷寒腹痛以涼水試之其痛稍可者熱也轉甚者寒也邵評辨明虛實寒熱痛勢之不同甚精又評試辨寒熱之法亦當發黃傷寒發黃惟陽明太陰兩經有之陽明病應遍身有汗今但頭汗出小便不利心中懊憹身必發黃者瘀熱在裡內外無從發泄也發汗已身目皆黃者大發濕家汗風去濕不去也發汗已太陰病身當發黃因小便不利濕土為熱所蒸而黃色外現也若小便自利小腹硬滿者瘀血發黃也邵評以小便利不利分發黃蓄血是已惟膽汁入血為膽黃其症治尚須補入治法陽明發黃乃胃家移熱於脾必二便俱祕茵陳蒿湯太陰發黃是脾家濕熱必小便不利大便反快茵陳五苓散邵評發黃有太陰陽明濕熱虛實之不同若發黃而二便俱祕者乃陽明胃實移熱於脾故宜用下若發黃而小便不利大便反快乃太陰脾濕蒸熱故宜清利若發黃汗出身冷脈沉遲者陰黃也茵陳五苓加乾薑參準繩邵評寒濕留滯而成陰黃故宜溫通若更陽虛可用茵陳四逆湯金鑑云表實無汗發黃者宜麻黃連翹赤小豆湯汗之裡實不便者宜茵陳蒿湯下之無表裡症而熱甚者宜梔子柏皮湯清之大便溏小便不利發黃者宜茵陳五苓散利之陰證發黃者宜茵陳四逆湯溫之環口黧黑冷汗者陰黃死症也身體枯燥如煙煤者陽黃死症也邵評發黃有汗下清利溫五種治法治黃之法不外是矣陰黃陽絶陽黃陰涸均是死症吐利按太陰腹痛吐利一屬寒濕六脈沉細舌潤不渴是也宜理中二陳藿朴之類溫中散寒一屬濕熱舌燥口渴小便短赤是也宜二陳二苓枳實厚朴川連之類清熱利濕邵評太陰腹痛吐利二症有寒濕濕熱二因宜溫宜清治法不同必須詳辨太陰新法東南之地水潦歸焉居其處者多蒙濕邪之害然閩廣濕勝江浙則濕熱相兼感之為病內應太陰以太陰濕土所主也今將太陰本病傳經並列於下病無遁形矣凡見腹痛吐利交作脘悶不食六脈沉細或伏舌苔黑滑或白滑口不渴飲此太陰感寒本病也當以理中湯為主治兼外感加蘇葉脹滿加厚朴有食加青陳楂曲之類吐多加丁香藿梗瀉多加木香木瓜太陰感寒邵評此太陰感寒之正法有腹痛痞滿嘔吐不納舌燥渴飲或大便泄瀉小水不利或二便俱祕此濕熱內結於太陰急宜開之須半夏赤苓厚朴草蔻川連通草廣皮滑石之類如便祕不瀉加枳實大黃行之此即轉屬陽明也濕熱內結邵評此濕熱內結之正法如發熱不已頭重身痛大便順小便澀脘滿不飢舌苔白膩脈象沉細而緩者此濕邪內著太陰受病也宜二陳茅朮厚朴豬苓澤瀉茵陳米仁姜皮之類濕邪去熱自退矣汗多加桂枝秦艽汗少加紫蘇濕邪內著若發熱一身盡痛而兼四肢微腫者此風濕流注手足也宜二陳加米仁桂枝秦艽防己羌活木瓜片薑黃之類足脛紅腫合二妙風濕流注凡傷寒熱甚不解但頭汗出腹滿溺澀目黃口渴舌苔黃膩此濕熱鬱於太陰欲發黃也急用茵陳二苓枳實厚朴黃柏梔子茅朮秦艽車前澤瀉等利之清之二便俱祕小腹脹滿者此轉屬陽明也宜茵陳蒿湯濕熱發黃凡遇傷寒發熱之症已經解表清裡俱不應但看舌苔白滑黏膩脘悶噁心口不渴飲雖熱不欲去衣被者此外感風濕之邪著於太陰肌軀之表其病尚在氣分宜解肌法用桂枝秦艽紫蘇半夏苓皮姜皮厚朴廣皮之類微微汗之則風濕俱去矣肌表風濕邵評此肌表風濕之正法若一身盡痛可再加羌防白芷若外感濕邪又兼內傷生冷以致寒熱泄瀉者太無神朮散加減妙內外寒濕以上諸條皆太陰本經自病若邪從陽經傳入太陰則熱愈深毒愈甚舌見純黃純黑唇齒焦燥目黃面赤腹大熱或晡熱手足不欲暖蓋小便赤澀舌無芒刺者熱毒暴下也舌起芒刺者大便不通也三陰無竅俱借陽明為出路故兼見陽明證者為輕大便通者只宜清裡解毒大便不通者兼導之清之清裡解毒如犀角芩連梔翹銀花人中黃之類導下如枳實厚朴檳榔大黃之類陽邪傳入太陰熱症若由失表失清以致毒邪凝結於裡陷於太陰每有發為五癍者其症反脈靜身涼有似邪退正復之象但看舌苔純黃中見黑點純黑中見紅點或黑苔聚於中心此皆生癍之驗也火重者癍必紅毒深者癍反白若藍癍則食毒俱足胃將爛矣紫癍發於少腹章門之間毒傳於腎也黃癍發於手足唇口之上毒歸於脾也均屬危惡之症治法亦只清解毒火宣通氣血用犀角連翹赤芍銀花川連人中黃栝蔞皮牛蒡子檳榔楂肉天蟲角刺之屬內外兩解若見面白目青則陽氣下陷已屬不治此藥又不可投若見身上汗出津津則元氣已泄其死尤速蓋病邪傳裡雖病太陰而三陰與之同病者也所藉者獨一肺經而已肺氣開則面紅肺氣閉則面白若面黃則膽氣絶矣身黃則脾氣絶矣病在三陰臨症者尤宜深察焉陽邪內陷太陰癍症少陰總要述古麻黃附子細辛湯麻黃附子甘草湯附子湯四逆湯通脈四逆加人參湯真武湯豬苓湯黃連阿膠湯四逆散大承氣湯少陰本病述古但欲寐口燥咽乾咽痛吐吐利下利少陰症仲景以脈微細但欲寐為主病此指正氣之虛非示邪氣之實也凡舌乾口燥心煩泄利下重是少陰實邪見象引衣蜷臥下利清穀腹痛吐瀉是少陰虛寒見證脈以沉實有力為實熱沉細無力為虛寒須分屬之又煩為陽躁為陰少陰以煩為生機躁為死兆邵評此辨少陰虛寒實熱之見症脈象分際極清凡初起發熱身痛而頭不痛脈沉而微細無里症但欲寐者此少陰感寒之表症也宜麻黃附子細辛湯峻汗之若發熱在二三日後麻黃附子甘草湯微汗之蓋少陰與太陽為表裡故發熱即可發汗是假太陽為出路也邵評三陰無表熱見症少陰病反發熱是外連太陽之表也故用麻附細辛發汗溫經在二三日後見症稍緩方內去細辛而用甘草者用藥亦緩也若惡寒身痛手足冷骨節痛口中和而脈沉者是表裡俱寒也附子湯大溫大補之邵評寒傷腎陽陽氣大虛故專用溫補若下利清穀裡寒表熱手足厥冷脈微欲絶但欲寐者此太陰轉少陰也四逆湯主之邵評寒邪轉入少陰而陽大虛不能內守治以扶陽散寒此即俗名漏底傷寒症之正法若反不惡寒或咽痛乾嘔腹痛面赤或利止脈不出此下元虛極陰症似陽也通脈四逆加人參主之蓋蔥體空味辛能入肺以行營衛之氣薑附參甘得此以奏捷於經絡之間而脈自通矣邵評寒中少陰陰盛格陽陽被寒鬱故見此假熱之症用通陽散寒之法若腹痛下利四肢沉重疼痛小便不利者此坎中陽虛不能以制陰水致陰濁停蓄宜真武湯壯元陽以消陰翳培陽土以泄陰水則開闔得宜小便自利腹痛諸症自除矣以上諸條皆少陰虛寒之證邵評腎陽虛弱水氣濁陰凝蓄用壯陽泄濁以利水氣一法按手足厥冷專指指掌言四逆兼脛臂言故少陰下利手足厥冷猶為可治四肢逆冷則死少陰病下利六七日咳而嘔心煩不眠小水不利者此少陰陽邪停水也宜豬苓湯主之使熱邪從小便而出諸症自解矣邵評此少陰陽邪挾水氣上逆為病用滋陰利水導熱下行一法少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之此傳經熱邪擾動少陰之陰腎水虧則君火旺故以芩連瀉心膠黃育陰且雞子黃色赤而通心阿膠色黑而通腎坎離合治自然熱清而煩解少陰病四逆泄利下重或咳或悸或小便不利或腹中痛四逆散主之此陽經熱邪擾於陰分而厥也蓋四逆有寒熱之分胃陽不敷於四肢為寒厥陽邪內擾於陰分為熱厥寒則下利清穀熱則泄利下重故用芍藥枳實以清泄之柴胡以升散之則升降利而厥逆諸症自解矣以上三條皆陽經熱邪傳裡但不轉屬陽明故不用承氣邵評此陽邪傳裡少陰熱厥證因陽邪陷入陰中陽內而陰反外以致陰陽脈氣不相順接而為四逆此熱厥也或咳或悸等症皆因水氣為患也少陰樞機無主故有此或然之症用四逆散以斂陰泄熱以散四逆之熱邪後隨症加味以治或然之症此少陰氣分之下劑也少陰病有大承氣急下者三症一曰得二三日口燥咽乾急下之一曰自利清水色純青心下痛口乾燥急下之一曰六七日腹脹不大便者急下之此皆陽經熱邪傳裡銷爍腎液以致胃中大實病已轉屬陽明故用承氣急下邵評少陰用承氣急下三症此是陽經熱邪傳入少陰臟不能容則還而轉屬陽明胃腑腑實燥熱灼耗腎精胃液而見口燥咽乾下水便祕腹脹等症故急下之以救陰液但欲寐衛氣寤則行陽寐則行陰故寐為足少陰病若欲寐無表裡症身和脈小是已解也風溫症亦欲寐多眠則有脈浮發熱汗出身重鼻息鼾鳴之異口燥咽乾屬熱邪有實熱宜承氣有虛熱宜養陰邵評口燥咽乾屬熱邪但熱有虛實治宜分別咽痛少陰之脈上貫肝膈循喉嚨系舌本故咽痛獨列少陰篇內少陰咽痛屬熱者有半夏散及湯又甘草湯桔梗湯此散火也屬寒者有桂枝幹薑湯治汗多亡陽也有通脈四逆湯治陰盛格陽也參準繩邵評咽痛熱症是虛火上升寒症有亡陽格陽二症金鑑云咽痛一症寒熱皆有腫痛為熱症仲景有甘桔半夏苦酒豬膚等湯調治不腫而痛為寒症宜四逆湯加桔梗主治也邵評咽痛寒熱俱有腫者為熱不腫為寒治當分別吐有寒熱之分熱者寸口脈數發熱煩渴渴欲飲水水入即吐者宜五苓散食入口即吐者宜二陳湯加薑汁炒連和之邵評吐症寒熱均有此條熱吐又有水逆痰熱格拒二症寒者口不渴而吐理中去白朮加生薑參準繩邵評此治寒吐之正法亦可加石蓮丁香金鑑云口不渴厥而吐屬寒宜理中吳萸輩渴而得食即吐屬火實熱黃連解毒湯虛熱乾薑黃芩黃連湯渴而飲飲而吐吐而復渴屬水逆五苓散邵評吐症不渴為寒渴為熱熱有虛實之分吐利少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之乾嘔吐涎沫亦此湯吐利止而身痛不休者當和解其外宜桂枝湯下利少陰病下利屬於熱者四症四逆泄利下重四逆散邵評陽郁不達於四肢故逆下重者熱之徵也此陽邪下陷而入陰中用四逆散泄熱散邪下利六七日咳而嘔渴心煩不得眠者豬苓湯邵評此虛熱下焦有水治以導水泄熱自利清水色純青心下痛口乾燥者大承氣邵評陽明燥實熱利旁流故急下以存陰下利咽痛豬膚湯邵評陽邪傳入少陰虛火上升治以滋陰泄熱少陰病下利惡寒而蜷手足溫者可治四逆湯四肢逆者不治少陰病脈浮而遲表熱裡寒下利清穀四逆湯主之大汗若大下利而厥逆者四逆湯邵評大汗則亡陽下利則亡陰陰陽俱虛厥冷而利非清穀急溫之陽回而生可望也少陰至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣真武湯邵評腎中陽虛復受寒邪腎火衰而不能化水致水積下焦用真武湯壯元陽以消陰水少陰病下利清穀裡寒外熱手足厥冷脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之邵評真陽之氣被陰寒所迫不安其處而遊散於外故顯假熱之象而實非熱也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之邵評陽邪入里便膿血者為協熱下利是白頭翁湯症此少陰病便膿血而下利為下焦不約而裡寒也因桃花湯固下而散寒少陰病下利脈微者與白通湯邵評用白通湯通陽散寒姜附之辛溫破陰固里蔥白之辛通入脈引陽也此方最合利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服後脈暴出者死微續者生邵評白通湯中加人尿膽汁之咸苦寒為反佐從陰引陽使不格拒脈暴出是無根之陽發露無遺故死脈微續者被抑之陽來復有漸故生下利死證少陰病下利止而頭眩時時自冒者死邵評此腎氣下絶無根之陽泛上神氣散亂陰陽俱脫是以死也少陰病自下利汗出煩躁不得寐者死少陰病惡寒身蜷而利手足逆冷者不治邵評躁不得寐則陰陽盡虛邪氣獨盛正不勝邪擾亂不寧頃刻離散而死下利發熱汗出不止者死邵評下利發熱陰不內守汗出陽從外亡是謂有陰無陽故死下利厥逆躁不得臥者死邵評厥利不止臟腑氣絶矣躁不得臥精神不治矣微陽不能久留故死下利十餘日脈反實者死邵評利十餘日正氣受傷其脈反實邪未衰也正虛邪盛不克支撐故死少陰新法按少陰為生死之關故仲景歷言死證然於傳經熱邪若兼陽明猶可養陰退陽自感寒邪正氣未潰猶可溫腎散寒均非死證凡看傷寒熱病診得六脈沉細似寐非寐皆屬少陰見象宜兼少陰以治如兼咳嗽邪在肺腎之間如兼泄瀉邪在脾腎之間如兼昏昧邪在心腎之間此病不在三陽而在手足三陰是為三陰兼症不得因身熱概以三陽經藥治之凡診傷寒熱病微見惡寒發熱不已咳嗽不渴六脈沉細身靜蜷臥舌苔微白兼紅或淡紅而潤此肺腎虛寒而感外邪也宜桂枝湯加陳皮杏仁川羌半夏山藥茯苓之類微汗之如不應急當以金水六君煎加杏仁生薑胡桃蘇葉之類投之無不取效肺腎虛寒挾感如初起發熱惡寒大便泄瀉舌苔白嫩而兼少陰脈症者此寒邪客於脾腎之間宜溫中散寒如桂枝紫蘇廣皮厚朴山藥焦曲乾薑茯苓甘草之類溫散之脾腎俱寒挾感若初起惡寒發熱口渴唇燥舌苔嫩紅而干或絳底浮白或兼咳嗽或兼煩躁六脈弦數無力或浮洪無力此陰虛水虧而挾外感也陰虛於下則陽亢於上故見躁煩勿以陽明火症治之亦宜金水六君去半夏用生地加川斛丹皮豆豉羌活之類滋養陰液以汗之如兼嘔惡當留半夏加竹茹以和胃如兼咳嗽加旋覆花甜杏仁以降氣如經汗表升提太過以致虛火上冒目赤顴紅大渴煩躁嘔惡不納者亦宜金水六君煎加麥冬代赭之類養陰鎮逆汗多合生脈陰虛有火挾感如陰虛有火而挾外感以致頭疼惡寒發熱不止因口燥渴而食生冷遂致泄瀉舌苔微白兼淡紅舌形雖濕而干此脾本虛寒因津液少而渴故一食生冷即見泄瀉治宜和脾以益少陰如生地丹皮茯苓山藥廣皮叉斛苡仁甘草蓮肉等主之兼表症者加蔥白豆豉或羌活葛根亦可如表症已除而但發熱口渴兼便溏者前藥加糯米炒麥冬沙參以生津液自然渴解熱止脾寒腎熱挾感如初起吐利止後發熱脈沉細手足冷舌形紫絳無苔者此少陰症也勿以霍亂治之舌潤不渴當以金水六君煎加丁沉溫以和之舌燥口渴亦以金水六君加麥冬糯米粉炒北參益陰和中以生津液如吐瀉傷津口大渴而小水不利者急以左歸飲加參麥歸芍斂陰生津自然渴解便利若妄利小便則死矣少陰病起吐利邵評此少陰吐利之正法分溫中滋液斂陰生津三則治法極精如初起發熱神呆不語六脈沉細短數似寐非寐或煩躁狂言此邪在心腎之間或因受驚痰乘包絡治宜清心豁痰如茯神小草菖蒲天竺黃川貝丹參麥冬鉤丁薄荷辰砂之類以清包絡之痰神自清矣如舌形絳燥口渴唇乾六脈沉數前方宜加生地丹皮淡竹葉之類以清心包之火如大便祕結不妨加犀角數分心腎熱邪若神昏譫語發熱仍欲暖蓋目睛上視大便不實舌色紫絳而圓雖干無刺外雖躁擾此陰不兼陽忌用寒涼不可誤認陽明妄投犀角宜左歸六味等湯微加清心之品如鉤藤川貝麥冬之類治之為當心腎虛邪邵評此心腎虛邪之正法此條與上條同是心腎之邪然有虛實之不同上條實而心經見症多此條虛而腎經見症多用藥清補不同當細辨之若身熱足冷面赤戴陽脈來沉細無力或數大無力或陰陽俱緊其人煩躁欲狂揚手擲足或欲坐臥水中舌苔紫色少神或闊大胖嫩或淡紅圓厚雖濕而干此躁也非煩也陰盛格陽也急以八味投之或參附湯加熟地投之如得躁定脈圓舌轉微白庶有生機陰盛格陽以上諸條皆少陰本經自病若是陽經熱邪傳至太陰已多危候至入少陰生者少死者多矣凡見神氣昏沉語言顛倒齒枯齦黑午後身熱目睛上視舌苔紅中有黑點黑中有紅點頭項強小便澀雖醒似睡雖渴不知消水時作鼾睡聲形似死證然舌不卷囊不縮面不青息不高喉顙不直四肢不厥鼻不扇耳不焦不魚目不鴉口尚有可治之理如舌苔燥刺而便祕者宜兼陽明以治方用犀角生地丹皮麥冬花粉川斛茯神鉤丁川貝膽星之類以養陰退陽陰液復外可得汗而解內可得便而解即寒中亦有散邪之義也若大便不實舌無燥刺此陰不兼陽即屬虛症為難治宜右歸六味出入為當邵評陽經熱邪傳入少陰實則轉屬陽明宜兼陰陽治之虛則邪伏少陰仍從本經治之語最精確凡少陰症六脈沉細似寐非寐其舌紫色是也然紫而鮮潤者可治紫而枯晦如豬肝色者不治或紫色而間微白苔者方佳邵評從少陰脈症舌色辨其陰液之存亡以決病之可治不可治的論也有初起吐瀉如霍亂陡然變重昏昧者少陰症也邵評少陰症似霍亂戒勿誤認此條最須著眼厥陰總要述古當歸四逆湯桂枝湯白頭翁湯烏梅丸乾薑黃連黃芩人參湯刺期門四逆散白虎湯厥陰本病述古氣上衝心吐蛔厥下利少腹滿囊縮仲景述厥陰病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止此皆厥陰自病之熱症並非傷寒傳經之熱邪蓋厥陰內藏相火其消渴火盛水虧也氣上撞心心中疼熱肝火乘心也飢不欲食食即吐蛔風木剋土胃中空虛也下之即利土受木賊不禁再利也不得以傷寒正病視之邵評此厥陰病之總綱總而言之太陰厥陰皆以里症為提綱太陰主寒厥陰主熱太陰為陰中之至陰厥陰為陰中之陽兩陰交盡名曰厥陰其脈絡於少陽厥陰熱症皆少陽相火化合耳凡傷寒手足厥冷脈細欲絶者此寒傷厥陰之經但當溫散其表不可遽溫其里當歸四逆湯主之蓋厥陰相火所寄臟氣本熱寒邪止得外傷於經而不內傷於臟故止用桂枝以解外邪當歸以和肝血細辛以散寒大棗以和營通草以通陰陽則表邪散而營衛行手足溫而脈自不絶矣若其人素有寒邪加吳茱萸以溫本臟之寒邵評以傷寒邪傷厥陰之經未傷於臟陽虛血弱用此方行營衛而散表邪最效論曰厥陰中風脈微浮為欲愈脈不浮為未愈按此止有欲愈未愈之脈並無未愈之證治不能無闕文之憾要不出乎桂枝湯為主治邵評厥陰中風以脈辨病之欲愈未愈亦是診病之一法風中厥陰本經脈微浮風邪外出故欲愈也不浮而沉則風邪入里木鬱不舒則下克脾土必變熱利下重渴欲飲水之症宜白頭翁湯主之白頭翁秦皮以平風黃柏黃連以清火是苦以堅之也若厥陰久痢不止當用烏梅丸酸以收之邵評此厥陰陽邪下陷協熱下利之正法厥陰寒格醫復吐下之食入口即吐乾薑黃連黃芩人參湯主之此寒格於下拒熱於上故格拒不納芩連以清上熱乾薑以開寒格因誤治以虛中氣故用人參助乾薑以壯胃陽而開陰格邵評寒熱相阻則為格症用此湯開其寒熱之格拒而兼補裡虛也傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門邵評腹滿譫語由於肝火木旺脾家有熱脈浮緊者為弦弦乃肝脈脈症是肝邪乘脾之候肝木侮土理尚順直故曰縱刺期門者瀉肝邪也按腹滿譫語為太陰陽明裡症脈浮而緊為太陽陽明表脈何以辨其為厥陰脈法曰脈浮而緊者名曰弦也內經謂諸腹脹大皆屬於熱又曰肝氣甚則多言是腹滿由於肝火而譫語乃肝旺所發也肝木侮脾故曰縱厥陰忌汗下故刺期門以泄之傷寒發汗嗇嗇惡寒大渴欲飲水其腹必滿此肝乘肺也名曰橫刺期門自汗出小便利其病欲解邵評肝邪挾火而刑肺金肺氣不得宣布故渴飲而腹滿木反乘金侮所不勝寡於畏也於理不順故曰橫橫者曲也刺期門亦瀉肝邪也按其腹因飲多而滿則非太陰之滿飲水不消亦非厥陰之消渴此肝邪挾火而刑肺金故大渴肺氣不能通調水道故腹滿侮其所勝曰縱侮所不勝曰橫自汗出小便利其病欲解者得汗則發熱惡寒之表症自解得小便利則腹滿之裡症自除邵評前第一條消渴氣上撞心是肝邪乘心上條腹滿譫語是肝邪乘脾此條惡寒飲水是肝反乘肺肝寄相火有瀉無補者此類是也厥陰有臟厥有蛔厥臟厥至七八日脈微膚冷不煩而躁無暫安時此屬臟冷純陰無陽故不治邵評此是臟厥主症與蛔厥不同分辨在此其但躁而無暫安時者浮陽外越不久即散陰氣寒結於腸中乃純陰無陽故不治也蛔厥亦有脈微膚冷此內熱外冷故時煩而躁其顯症在吐蛔宜烏梅丸主之邵評此與臟厥之躁無暫安時者不同況有吐蛔見症是蛔厥而非臟厥矣蓋外寒遏熱於內蛔不安而動則其人時煩蛔靜則煩躁亦止非若臟厥之無暫安時也用烏梅丸以溫臟安蛔最合凡厥者必發熱前熱者後必厥厥深熱亦深厥微熱亦微厥少熱多其病當退厥多熱少其病當進邵評傷寒以陽氣為重此以厥熱之微甚即覘其人陽氣之多寡熱多則陽氣未傷故病當退厥多則陽氣衰少故病當進厥微者四逆散厥深者白虎湯此肝火乘胃也邵評此是陽邪熱厥由邪火乘胃也加左金丸尤效脈滑而厥為熱厥宜白虎湯若反發其汗必口傷赤爛邵評脈滑而厥者里有熱也陽邪入里陰氣被格陽內陰外故熱深則厥甚熱微則厥亦微此為熱厥與寒厥之脈微欲絶者大相徑庭矣此當有口燥舌乾之症用白虎湯清裡除熱其厥自已氣上衝心此腹中之氣時時上衝也氣撞心疼吐蛔者厥陰病也不吐蛔者病在陽分表邪也桂枝湯氣上衝咽而喘者胸中有痰也瓜蒂散參金鑑邵評分肝火表邪痰逆三因最精按厥陰氣撞熱疼知飢不納食則吐蛔等症總屬肝胃之病因胃中虛寒肝風襲胃相火挾濁陰上衝故致斯症治法當以苦辛酸寒熱並用如川連吳萸黃芩乾薑茯苓半夏川椒烏梅之類參葉案吐蛔胃中虛冷理中安蛔散肝邪犯胃烏梅丸邵評此中虛寒伏之正法又肝胃不和之正法厥厥者手足逆冷有陰陽之分自熱至溫自溫至厥者邪從三陽經來傳經之熱邪也四逆散甚者四肢雖厥大便祕小便赤脈沉滑此陽症似陰所謂厥深熱亦深也宜白虎承氣等湯為治邵評此為陽邪熱厥治法陰厥乃三陰自受寒邪或腹痛吐利或下利清穀宜四逆湯理中湯當歸四逆湯主治參準繩邵評此陰勝寒厥治法按少陰有寒厥而無熱厥厥陰有寒熱二厥寒厥者止寒而不熱也熱厥者由熱而至厥由厥而至熱相因不已也當分陰陽淺深治參金鑑邵評此辨寒厥熱厥見象之不同下利熱者下利譫語有燥矢也宜小承氣湯熱利下重欲飲水者白頭翁湯邵評此熱利分陽明厥陰最為精確寒者下利清穀手足厥冷者四逆湯下利汗出而厥者亦四逆湯邵評寒利以扶陽為主少腹滿臍下為少腹夫胸中滿心下滿皆氣也腹滿多有燥矢也少腹滿溺與血之分也邪結下焦津液不通則溺蓄血氣不行則血結皆為脹滿而痛也若小便利者為蓄血宜桃仁承氣湯小便不利者為水蓄膀胱宜五苓散二症俱是熱邪若四肢厥冷小便清白而小腹滿痛者為冷結膀胱宜當歸四逆加吳萸生薑湯治之合參準繩金鑑邵評少腹滿有寒熱二因邪熱入於膀胱又有血蓄水蓄之不同最宜細辨囊縮舌卷囊縮者死熱極而縮者承氣寒極而縮者四逆吳茱萸邵評合虛實寒熱二因治法最精厥陰新法按六經主病仲景非專為傷寒立言如厥陰所述氣衝吐蛔等症乃厥陰風木自病不拘傷寒雜症但見嘔逆吐蛔者即是肝邪犯胃宜兼厥陰而治要知六淫傷寒兼帶厥陰者可治若從三陽傳至厥陰則熱極生風九竅將閉所形皆敗症矣今將厥陰本病治法列於下勿以傷寒傳經目之可也凡遇傷寒熱病症見乾嘔渴飲胸膈滿悶格食不下或兩脅抽痛舌苔黃黑或兼吐蛔此即症兼厥陰肝邪犯胃而然也宜用桂枝芍藥川連乾薑茯苓半夏黃芩之類主之吐蛔加椒梅寒熱似瘧加柴胡引出少陽肝邪犯胃凡傷寒暑濕之症有嘔吐青緑黑臭之水或黃黑濁飲或兼吐蛔此邪已犯厥陰因胃中空虛肝風乘虛襲胃所吐之物乃胃底腸中之陰濁被肝風翻騰遂至逆湧而上出於口俗名胃底翻是也治宜泄厥陰以安陽明如桂枝白芍川連吳茱萸半夏茯苓椒梅之類以泄厥陰次用人參代赭茯苓半夏乾薑川連烏梅之類以安胃鎮逆若其人陽明虛餒不禁酸苦又當安胃為主微兼泄肝宜人參薑連吳萸白芍茯苓半夏烏梅代赭之類主之肝風內襲若身熱耳聾口渴胸腹板實入暮譫語嘔逆吐蛔舌苔黃中帶灰黑此濕熱之邪結於厥陰之界病勢最險宜川連枳實半夏茯苓菖蒲烏梅薑汁之類治之濕溫干厥陰若邪從三陽經傳入即在太陰已多危候再入少陰生者少死者多矣至傳厥陰內風已盛九竅熱極將閉無庸議治邵評陽邪傳至厥陰入里極深厥陰內寄相火邪熱與相火兩相蒸灼傷陰最速陰液消耗邪熱陷閉故症多不治凡見面青目白面黃目青面白目紫筋急直視角弓反張舌焦耳聾皆厥陰將敗形色舌卷囊縮鴉口嘬嘴昏不知人醒作睡聲蹺足喉直撮空視躍躍欲起脈硬如弦此皆厥陰死證陽邪傳入厥陰死證救逆述古逆者汗吐下三法與病相逆也救逆者救其誤治之變症也仲景一百十三方每多因救誤而設茲特彙集救誤諸條分汗下兩門以便查閲誤汗例傷寒脈證當服麻黃湯發汗若尺中脈遲是營氣不足不可發汗若誤汗之遂漏不止惡風小便難四肢微厥難以屈伸此津脫陽虛也當以桂枝加附子湯回陽止汗邵評尺遲營弱不可發汗誤汗而津脫亡陽外風復襲此勢所必然也傷寒發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之蓋汗為心液過多則心氣虛桂枝甘草能扶陽以補心氣也若至振振劈地則當用真武矣邵評妄汗傷心液虧氣餒而心悸與心下有水氣而悸者迥別傷寒汗出惡風脈浮緩微弱桂枝症也誤以大青龍汗之致其人厥冷筋惕心下悸頭眩熱仍不退身肉瞤動振振欲劈地者真武湯主之內鎮少陰水逆外救太陽亡陽邵評發汗過多亡腎陽而水氣上侵凌心作悸與上條心虛而悸者不同傷寒脈浮醫以火迫劫其汗致亡陽驚狂起臥不安宜桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之斂鎮心陽其狂自定矣邵評陽者心之陽即神明也亡陽者火氣通於心神被火迫而不守則外亡也故用桂枝加龍牡取其補心鎮逆而固脫故曰救逆去芍藥者欲其急復心陽耳脈浮宜以汗解誤以火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也火逆又誤下之以虛其陰復因燒針以益其陽致煩躁者桂枝甘草龍骨牡蠣湯主之邵評火逆燒針又復下之三番誤治陰陽俱已虛竭煩躁者驚狂之漸也心陽內傷故用桂甘以復心傷之氣龍牡以安煩亂之神的是正法發汗多致亡陽譫語此非胃實不可下柴胡桂枝湯和其營衛以通津液後自愈邵評少陽不可發汗汗則津液越出必胃燥而譫語故用柴胡桂枝湯和其營衛上焦得通津液得下胃和則愈服桂枝湯大汗出後大煩渴不解脈洪大者胃中津液干而火獨盛也白虎加人參湯主之邵評服桂枝汗大出而大煩渴脈見洪大其邪已去太陽之表而入陽明之裡矣陽明為津液之府熱邪內入津傷火盛故用白虎加人參湯清熱存陰為治的是正法下之後復發汗晝日煩躁夜而生靜不嘔不渴無表症身微熱此邪已退而陽氣衰弱也乾薑附子湯主之邵評此條下後復汗晝煩夜靜無表裡症而脈沉微是純陰無陽之象陽將去矣幸此微熱未除煩躁不寧之際獨任乾薑附子以急回其陽為治也傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊復發汗動經身為振振搖者茯苓桂枝白朮甘草湯主之此亦陽虛飲蓄而致頭身振搖即真武之輕者邵評尤在涇曰此傷寒邪發飲發之症逆發氣沖寒飲上搏於膈也故令頭眩脈沉為在裡且既經吐下復發其汗則陽益虛而津液耗故身振振搖也與此湯導飲和中益陽固衛柯韻伯注此症是木邪侮胃吐下之後陽氣內擾故心下逆滿裡虛氣逆則氣上衝胸起則頭眩表陽虛也脈沉緊為弦肝木犯胃則弦邪在裡而反發汗以攻表經絡更虛寒邪由經而入里陽氣外虛不能主持諸脈故一身振搖也與此湯和經散寒益陽補陰此說與尤說不同録存以備合參然當從尤注為是傷寒脈浮自汗出小便數心煩微惡寒以上俱似桂枝症腳攣急此一症與桂枝獨異乃陰虛之象反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者有陽越之象作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸此湯純陰以復其陰陰陽兩和其腳即伸矣若胃氣不和譫語者中焦有留邪少與調胃承氣湯微滌陽明所結之餘邪則譫語自止邵評此症即陰虛於下而又陽逆於上則必先復陽氣而後復其陰氣故用甘草乾姜辛甘以復其陽陽復則厥止而足溫矣更作芍藥甘草甘酸以復其陰陰生則兩腳即伸矣或胃不和而譫語少與調胃承氣和胃則愈發汗後腹脹滿者虛邪入里也厚朴生薑半夏人參湯主之邵評此汗後氣虛氣窒不行而腹脹滿其人內雖作脹外無脹形故湯中用人參甘草甘溫補中而益元氣然徒補則愈窒滯故用厚朴薑夏行氣而除腹滿此補泄兼行之法也誤下例傷寒誤下之續得下利清穀不止身疼痛者急當救里宜四逆湯此下利不止陽氣下脫雖有身痛表症當以救里為急救里之後身疼痛清便自調者急當救表宜桂枝湯此清穀已止而身痛不除仍從表治也邵評寒邪在表而誤下臟虛內寒而下利清穀胃陽已亡矣身疼痛邪在表也雖表裡皆困然臟氣內虛無以為散邪之地故必先溫其里裡氣固而身痛未除表未解也再當治表不然表邪內入而增患矣傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯邵評大下復汗正虛邪入心下痞而惡寒邪入里而表未罷當先解表而後攻痞痞或能解表邪必復入里為患況痞亦未必能解耳太陽病下之後脈促胸滿者桂枝去芍藥湯主之蓋中氣虛而表邪仍在故用桂枝而去芍藥若微兼惡寒者陽氣尤虛也桂枝去芍藥加附子湯主之邵評此治妄下陽虛寒結之正法又評風寒在經本無下法誤下而陽氣大傷其脈必促而無力胸中虛滿按之必軟而不痛乃邪客胸中而無實熱其邪仍在陽分胃陽因下而傷寒邪將結而未聚故用辛甘溫藥從陽引而去之微惡寒者陽虛而陰氣凝聚前方恐不勝任故加附子以通陽而逐陰邪也太陽病下之微喘者表未解也桂枝加厚朴杏仁湯邵評此是寒喘誤下而表氣不固故不用麻黃而用桂枝加朴杏若熱邪淫肺作喘當用麻杏甘石湯誤用桂枝陽盛則斃耳服桂枝湯或下之仍頭痛項強翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之此心下雖滿不硬而痛尚微乃心下有水氣故也若小便利邪仍在太陽之表鬚髮汗今小便不利病在太陽之府非桂枝症未罷也但當利其小便邵評太陽經病挾水治以小青龍腑病挾水治以五苓散臨症務須細辨本太陽病醫反下之因而腹滿時痛此引邪入太陰也桂枝加芍藥湯主之大實痛邪氣結於太陰之裡桂枝加大黃湯主之邵評因誤下後引太陽之邪入里其邪未盡離乎太陽自表而入仍欲自表而出用桂枝以去太陽未盡之邪加芍藥以和裡虛之腹痛加大黃下里實之痛也太陽病桂枝症醫反下之熱邪下陷利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之因表未解故用葛根因喘汗而利故用芩連之苦以泄之堅之邵評本太陽桂枝症法宜解表而反下之裡虛邪入陽重熱利表裡俱熱症似虛而脈實勿蹈盛盛之咎用葛根之輕清以解肌芩連苦寒以清裡甘草和中喘除利止表裡俱解矣又評脈促者數而時一止也前條胸滿脈促是陽虛寒入用桂枝去芍藥甚則加附子辛溫藥扶陽散寒此條脈促喘而汗出是陽盛熱入用葛根芩連辛寒藥解肌清熱同見促脈辨其陽虛陽盛寒邪熱邪全在有力無力中分出用藥之寒溫如同冰炭學者可不細心辨認乎傷寒十三日不解胸脅滿而嘔此少陽的症醫以湯藥下之不應又以丸藥下之因日晡潮熱已而微利潮熱者胃實也然屬少陽之邪宜先用小柴胡以解外後以柴胡加芒硝主之邵評此少陽經邪因誤下而成胃實之症為少陽陽明並病胃實者可下而症兼少陽則不可下故用小柴胡以解外加芒硝以治裡實太陽病過經十餘日反二三下之後二三日寒熱而嘔柴胡症仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者猶有里症為未解也與大柴胡下之則愈邵評服小柴胡後而嘔不止心下滿痞而鬱郁微煩者此邪氣鬱滯於裡胸膈氣分之熱欲出不出欲結不結里未解也當大柴胡下其熱則愈亦先表后里法也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不能轉側者柴胡加龍骨牡蠣湯主之此足太陽少陽之邪因誤下入里以致正氣虛而擾動少陰手經現症錯雜藥亦隨症施治邵評下後熱邪內攻而胸滿邪痹於上也小便不利火盛水虧邪痹於下也煩驚者邪動於心而神明內亂也譫語者邪結於胃此病之在裡者也一身盡重難以轉側者是陽內而陰反外少陽之樞機不利筋脈骨肉並受其邪此病之在表者也夫合表裡上下而為病者必兼陰陽補瀉之劑以施治俾得表裡虛實泛應曲當而錯雜之邪庶可盡解耳此是下後亡陰之症與火逆亡陽之症不同又評此太陽病並以少陽因下而兼入胃腑之症與此湯外以解熱邪內以除水濕兼鎮浮越之氣而補其中州之虛也邪從太少來故仍用柴胡桂枝黃芩半夏治胸滿也龍骨鉛丹牡蠣治驚煩也人參甘草補正氣也小便不利茯苓譫語大黃身重不能轉側桂枝茯苓傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心下煩者此為未解也柴胡桂枝幹薑湯主之此本少陽症而誤汗下之柴胡症仍在故仍用柴胡加減心煩不嘔而渴故去參夏加栝蔞根胸脅滿而微結故去大棗加牡蠣小便雖不利而心下不悸故不去黃芩而加茯苓雖渴而表未解故不用參而加桂枝以乾薑易生薑者散胸中之滿結也初服煩即微者黃芩栝蔞之功繼服汗出便愈者桂枝柴胡之力也邵評此亦太陽轉入少陽之症此微結是指心下痞結病在胸脅與陽微結不同也傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之此病發於陽而誤下之外熱未除而內熱又結於心中故結痛梔豉所以宣通熱邪也邵評心中結痛身熱不去其邪未盡入里與結胸症之心痛而身不熱者不同用梔子豉湯散邪撤熱輕於小陷胸湯之蕩實除熱是火鬱發之之法也傷寒醫以丸藥下之身熱不去微煩者梔子乾薑湯主之此以丸藥大下則寒氣留中可知故用梔子以解微煩乾薑以逐內寒而散表熱寒因熱用熱因寒用也邵評丸藥妄下熱陷寒留身熱不去內無結痛而見微煩知正氣虛不能與邪相爭為外熱內寒之症故用梔子以撤胸中陷入之邪乾薑以復下藥損傷之氣也傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之此因誤下移邪於心胃故用梔子以治心煩枳朴以泄腹滿是兩解心腹之妙用也邪雖在胃便未燥硬則不可下此為小承氣之先著邵評此症邪已入胃則不可吐便未燥硬則不可下此梔子厚朴湯重於梔豉而輕於承氣也太陽病外症未除而數下之遂協熱而利利下不止心下痞硬表裡不解桂枝人參湯主之此因數下之後雖初因協熱而里必虛寒故用溫補邵評此症表裡俱虛其病根在心下非辛熱何能化痞而軟硬非甘溫無以止利解表用理中加桂枝雙解表裡之法此條雖不言脈其脈微弱可知又評喻嘉言曰設利止則其邪可從里解乃下利不止是里解無期設結開則其邪可從表解乃心下痞硬是表解無期此際欲解表裡之邪全賴中氣為之敷布否則上下交徵中氣立斷其能解耶理中湯加桂枝一法握樞而運真無為之上理矣傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止一誤再誤醫以理中與之利益甚理中者理中焦也此利在下焦赤石脂禹餘糧湯主之此因下藥太過手陽明大腸受傷關閘不闔二味澀以固脫也復利不止當利其小便蓋分其清濁則便自堅邵評服瀉心湯已心下之痞氣既除而中焦脾胃之氣亦豁然矣復與下藥大腸滑脫利遂不止以理中溫補而利益甚此利在下焦須用澀劑以收之復利不止者利其小便以分清之則無餘治其愈自可必也厥陰寒格醫復吐下之致食入即吐乾薑黃連黃芩人參湯主之此陰格於下拒陽於上而為吐故用芩連之苦寒以泄熱乾薑之辛溫以通寒格誤吐誤下中氣必虛故用人參安胃和中其吐自止邵評寒熱相阻則為格症寒熱相結則為痞症此病輕於痞故用瀉心之半發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯吐之此因三法後正氣虛實邪雖去而其餘邪因虛留於上焦結於肺胃之間非汗下所能除者惟吐之則餘邪結氣無不出矣邵評陽明之虛煩與太陽不同心胸居胃上即陽明之表凡心胸有病皆陽明表邪其治法亦與太陽大異太陽之表當汗而不當清宣陽明之表當清宣而不當汗太陽之裡當利小便而不當下陽明之裡當下而不當利小便今人但知汗為解表故於仲景大法中但知汗下而遺其清宣之法耳梔豉湯本為煩躁設又可以清宣陽明之虛煩乃陽明之表劑也救逆新法古人云汗多亡陽者因發汗太過身之陽氣隨汗而走泄也下多亡陰者因屢下而重傷陰血也桂枝下咽陽盛則斃者因表實無汗陽氣內盛誤投桂枝如抱薪救火也承氣下咽陰盛則亡者症非陽明不可攻下誤用硝黃陽氣滅絶也要知汗多亡陽是衛氣本虛之人陽盛則斃是陰液本虧之症也下多亡陰由其陽氣本盛止傷陰分陰盛則亡由其陽氣本衰不禁陰藥也故論症於今當以汗多亡陽下多亡陰為戒蓋汗本津液所化而風藥尤能燥其陰血胃中本無熱邪而承氣即能銷滅真陽用録救誤諸條以佐古法所未逮傷寒如經發表多者則津液內竭血不榮筋以致手足攣疼二便艱澀當以加味逍遙散加熟地枸杞鉤藤邵評過表汗多陰液傷耗而筋脈失養則手足攣疼津枯熱結則二便艱澀也養血榮筋兼以疏利的是正法傷寒過表二候三候不解大汗不止舌卷而黑氣促似喘六脈洪數無根者已成敗症也當以大劑左歸合生脈投之汗止喘定有得生者傷寒過經不解舌燥口渴小便不利者此發表風藥太過津液源竭也宜左歸飲去茯苓加麥冬歸芍以救津液自然行矣傷寒過經不解發表攻裡不當以致真陰耗竭二便燥結不出胃陰大傷不納不飢宜一味養正滋陰使胃陰充足自能納穀知飢宿垢自下左歸合生脈或甘露加人參邵評病久元氣已虛復誤表誤攻陰液耗而胃氣受傷致便閉不納治當滋陰養胃大忌消導攻伐傷寒如遇過表大汗不止身肉瞤動頭眩不起振振欲劈地者此陽津陰液俱脫也急以左歸合參麥五味挽之邵評表汗過多陰傷而虛陽浮越陰陽兩脫之候也用左歸合參麥救陰扶元固是但當參用和陽鎮逆之品如龍蠣龜版白芍之類更妥傷寒誤表大汗不止津液外泄胃陰虛餒以致嘔惡不已食入即吐者宜金水六君煎加麥冬沙參和中以復津液自然嘔止而納穀矣邵評此誤表汗多陰液耗而有痰熱胃氣上逆之救誤法如過表大汗胃陰空乏以致乾嘔厄逆不止水漿不進亦宜金水六君合生脈加丁香柿蒂胡桃肉代赭石之類止之如不應宜都氣飲加人參胡桃肉紫石英之類以納之不用磁石者因過表傷肺恐吸其氣也邵評此過表汗多肺胃陰傷氣逆不降之救誤法有陰虛挾感之症誤用柴葛犀角升提之藥發表以致虛陽上冒膈悶嘔惡煩躁不寧六脈洪大按之無力者亦宜金水六君合參麥加代赭和中以益少陰則陰陽和熟睡而解矣邵評陰虛受邪誤用升散陰傷而陽不附陰嘔惡煩躁脈大無根當加育陰潛陽為是有營虛衛弱之人挾感惡寒發熱腰疼骨痛不可峻汗誤用表藥汗大泄反加惡寒身痛發熱不止當以歸耆建中湯調和營衛則諸症自解矣邵評營衛虛而挾邪當調和營衛治之凡遇外感表症診得兩手脈寸軟尺遲舌潤無苔者營衛兩虛之症也當以黃耆建中湯加防風汗之以上誤汗例邵評此憑脈用藥調和營衛兼以散邪之良法如經攻裡不當以致下利不止百骸解散無氣以動用大劑補中益氣加炮姜溫之提之如兼汗出而喘急用參附湯加熟地大溫大補之邵評此誤攻中氣大傷脾腎陽虛之救誤法如經攻裡太過以致下焦受傷腸胃並連直漏直泄利無關閉者陽明關閘已撤也急用桃花湯重加人參主之邵評此過用攻下腎命火衰胃腸虧乏滑脫不守用桃花湯澀以固脫極是有胃中谷食未化誤下之食為寒凝以致胸膈高起手不可近者治宜溫胃和中二陳湯加炮薑枳實厚朴楂肉之類溫以化之以上誤下例邵評此下早傷中寒藥與之食滯凝結治以溫中開化亦屬救誤之正法凡停食症初起所停之物未化糟粕在胃之上脘大忌早下宜運中導滯誤下則寒藥與食互結愈不能化症似結胸必待其已化糟粕停在胃之下脘近腸腑者方可攻下切記切記宿食在胃之上脘可用吐法瘥後諸病述古大病後從腰以下有水氣牡蠣澤瀉散主之水氣此脾胃氣虛土不能攝水故溢下焦腰以下為腫也腰以上腫者當發汗腰以下腫者宜利小便大病瘥後喜唾久不了了胃上有寒當以丸藥溫之宜理中丸喜唾邵評唾涎沫也中土陽虛不能收攝津液而冷涎上泛也宜理中丸加益智仁溫納之胃中虛寒則津液不能收攝故喜唾宜溫胃傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之欲吐此津液不足故虛羸少氣虛火上炎故氣逆欲吐宜養肺胃之陰則津液復諸症自除矣邵評肺胃津虧氣餒餘熱挾胃火上升竹葉石膏湯卻是正法惟竹葉宜易竹茹病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令人微煩損谷則愈日暮微煩陽明旺於申酉戌宿食在胃故日暮微煩當小下之以損宿谷枳實梔子豉湯主之大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚此勞復因病後氣虛邪氣又結於上焦其症不一故不著其病形惟散其上焦之邪足矣勞復邵評正虛而復受外邪病之變見不一故不定症形當隨症治之有宿食加大黃此指勞復之有宿食在腸胃者故可下非治食復也若宿食在胃脘當消導在上脘吐之亦可瘥後諸病新法瘥後浮腫傷寒瘥後肢體浮腫者脾虛有水故也須實脾利水宜冬朮茯苓皮米仁扁豆山藥木瓜車前澤瀉之屬治之或以米仁糯米煮粥食佳邵評有不因於水而亦浮腫者此元氣大虛肝木侮土名為氣腫與水腫見象不同須分別治之瘥後昏沉傷寒瘥後十餘日或半月漸至昏沉者皆緣發汗未盡餘邪在於心包故也或兼潮熱或兼寒熱似瘧宜連翹梔子豆豉麥冬菖蒲淡竹葉鉤丁丹參之類清之解之邵評邪在心包症見昏沉然有痰熱內伏者亦見昏沉宜分辨之汗後頭疼傷寒發汗後熱勢略減頭痛仍在者邪未盡也宜再汗之若汗後反劇而煩擾者必挾火挾痰或挾斑疹未透也宜細審之凡大汗後熱不退脈不靜者作危症斷之或誤發溫病濕溫之汗亦反劇邵評頭疼雖是表症然有肝陽痰火獨熱上攻諸內因且有虛實不同當審因治之解後額熱如熱退後額熱未除目神似覺呆鈍此胃中余滯未清額屬陽明故獨熱宜清疏之二陳加連翹黃芩山楂神麯之類清之和之邵評胃中痰食邪熱逗遛故額熱未除陽明行身之前額為陽位陽盛則熱也清和的是正法解後腹熱如已身涼獨腹熱未除此脾火內甚也養陰藥中加生白芍自除瘥後耳聾傷寒身涼後尚有耳鳴耳聾等症乃餘邪留於少陽故也宜養陰藥中加柴胡菖蒲鉤丁池菊通草荷葉之類以清解少陽之郁邵評耳聾一症半屬少陽然其因不一有虛實之不同腎開竅於耳腎虛精脫則耳聾也痰火上升阻閉清竅其耳亦聾又溫暑熱病之耳聾由於陰虧邪盛不關少陽禁用柴胡升提種種各因虛實不同當分別施治瘥後語蹇傷寒熱退之後其舌轉動不靈語言蹇澀不清者亦系邪留肝脾所致宜加味逍遙散去白朮加生地鉤藤菖蒲蒺藜天蟲之類邵評心脾腎三經之脈皆縈繞於舌心腎虛則舌不靈動痰阻脾絡肝風內擾則語言蹇澀不清總是虛風痰火為病須分因治之瘥後不寐傷寒熱退之後夜不欲寐者胃不和也溫膽湯和之驚悸不寧者心氣虛也加棗仁遠志解後咳嗽如熱退之後尚有咳嗽未除此餘熱在肺也宜滋養肺胃之陰其嗽自止如南沙參麥冬骨皮知母象貝川斛花粉茯苓杏仁桑皮蔗汁梨汁之類或加生地玉竹之類邵評凡感外邪而有病者症見咳嗽其病為輕以其邪傳入肺肺主皮毛邪從外達也內傷虛症見咳則重五臟傳乘肺受火刑水源涸竭每多死症故咳嗽一症虛實病因當細細分辨而治焉瘥後盜汗傷寒瘥後餘熱盜汗不止者陰虛有火也當歸六黃湯加減無熱惡寒而盜汗不止者陽虛也黃耆建中湯加減邵評陰虧火盛內蒸燔灼津液外泄也育陰瀉火固表為治自汗不止者陽虛也玉屏風加牡蠣龍骨收之邵評衛陽虛弱不能固護腠理表虛而自汗出也實表固澀之法此方極驗瘥後妄言凡傷寒熱病每有身涼熱退之後其人如癡言語謬妄者此心神虛散不復所致但當調養氣血兼治其心可也神復妄言自止邵評病退而妄言人癡自是心神虛散但痰火餘邪內伏包絡肝膽諸經亦有此症當辨別論治瘥後吐涎沫此土虛不能攝水也六君加益智仁攝之若其稠飲自下焦漾漾而起溢出口中者此腎氣不納濁陰上泛也宜都氣飲加胡桃補骨以納之或少佐熟附以收之或佐白朮以制之邵評涎沫者寒飲也其人胃有寒飲病後脾虛土不制水水飲上逆而吐也病屬脾胃尚在中焦治以溫胃和脾滌飲之法若從下焦泛上而出者是腎陽大虛陰濁上干是腎水上泛之症急當溫納腎陽鎮逆制水主治解後下血傷寒解後復有下血者乃失汗之餘邪也當清之生地丹皮地榆川斷槐米魁芍薏苡仁黑荊芥之類治之自愈邵評病解下血由於初起失汗邪不外達而內入陽邪熱盛熱傷陰絡而血下溢也治以清營涼血和絡之法瘥後頤毒頤毒因汗下清解未盡其邪結於少陽陽明二經發於兩頤者陽明部位也發於耳之左右者少陽部位也宜連翹敗毒散消散之如二活荊防連翹赤芍牛蒡桔梗土貝蒺藜薄荷銀花甘草之類少陽加柴胡此症初起速宜消散緩則成膿如元氣虛者須兼歸耆補托潰膿後當大補氣血為主然發於陽明者易治發於少陽者難治邵評陽明多氣多血且為中土萬物所歸無所傳變故易治少陽屬膽膽為清淨之腑受邪則難治瘥後酒復傷寒身涼後因飲酒復熱以酒性熱有火能助餘邪故也必兼煩悶乾嘔口燥不納等症急用川連葛花連翹生梔枳實烏梅銀花等解之邵評餘邪未盡得酒以助其濕火胃熱氣升而復病也宜清熱和胃治之瘥後食復傷寒熱退之後胃氣尚虛餘邪未盡若納穀太驟則運化不及餘邪假食滯而復作也仍發熱頭痛煩悶不納宜枳實梔子豉湯加生楂肉麥芽連翹萊蔔子等涼疏之無火舌潤不渴者調中湯亦可瘥後勞復傷寒瘥後元氣未復餘邪未清稍加勞動其熱復作即多語梳頭洗面更衣之類皆能致復既經復熱必有餘火餘邪結於中所以仲景主以枳實梔子豉湯蓋豆豉撤表邪梔子清裡熱枳實開胸中餘邪之結凡治勞復當以此方為主如兼嘔惡痞滿加半夏竹茹如見舌黃口渴加黃芩連翹如兼飽悶挾食加楂肉麥芽如兼頭疼惡寒加蘇荷蔥白如兼寒熱寒多加桂枝紫蘇熱多加柴芩一二劑後必復汗而解此屢試屢驗者不可妄投補中以致閉邪增病邵評病後元虛餘邪餘火留結於中又加勞動復受外邪而病故名勞復此虛而有邪用表裡並治之法此與但虛無邪之勞復自是二種氣虛勞復亦有瘥後餘火餘邪已盡止因正氣大虛因勞復熱微兼惡寒四肢倦怠無氣以動脈虛右大舌潤無苔胸膈寬暢者此真氣虛勞復也宜補中益氣湯甘溫補之升柴須蜜炙汗多惡寒歸耆建中妙邵評病退邪去勞而復作見症俱是虛象與上條挾邪勞復之症不同陰虛勞復熱病傷陰腎氣已虧稍加勞動微挾風寒其病復作症仍頭痛發熱惡風舌燥口渴六脈浮數者此陰虛勞復也凡復症必挾風寒外邪仍宜梔子豉湯加蔥白薄荷鮮生地淡竹葉麥冬骨皮之類微汗之如兼太陽加羌活陽明加葛根少陽加柴胡瘥後色復傷寒瘥後氣血未充早犯房事則內損真氣外觸邪氣而復作也其症頭重不舉目中生花腰脅痛小腹裡急絞痛憎寒發熱或陰火上衝頭面烘熱胸中煩悶是也若卵縮入腹脈離經者死舌伸出數寸者亦死宜六味飲加麥冬豆豉梔子煎湯調下燒褌散若小腹急痛脈沉足冷須用當歸四逆加吳茱萸湯煎成調下燒褌散邵評病後氣陰兩虛早犯房事真元大傷而復著外邪邪入下焦陰分銷爍陰精為病極重臨症極宜細辨陰陽易男女新愈交接病男傳不病之女曰陽易病女傳不病之男曰陰易此感其餘邪而生疾也其症身重氣乏百節解散頭重不舉目中生花熱上衝胸憎寒壯熱頭面大熱在男子則陰腫痛引小腹在婦人則裡急痛連腰胯甚者手足冷攣拳男子卵陷入腹婦人痛引陰中皆難治也若見舌吐出者死治法用竹茹半升煎湯調下燒褌散有黏汗出陰頭微腫為效或用韭白根一握兩頭尖十四枚水煎候冷服取黏汗為效亦可調下燒褌散瘥後調理傷寒熱退之後有宜和中者有宜養陰者如其人中氣虛者病退後必納穀少運化遲或大便不實或噁心吐涎宜六君子加減和中形寒畏冷宜黃耆建中溫補之凡此症脈皆緩大舌皆白嫩可辨如其人陰分虛者必有餘熱未盡舌燥口渴二便艱澀脈兼微數等症宜生金滋水飲或甘露飲加減養之邵評感症熱退之後有宜和中者有宜養陰者調理之法須分陰虛氣虛瘥後禁忌大病後正氣未復凡飲食起居俱不可不慎也如酒肴甘脆肥鮮生冷等物皆不可犯只宜糜粥自養少食而頻則易運化不可過飽及他有所食雖思之勿與也新瘥後當靜臥非但體動勞復即梳頭洗面濯足多言皆能令人勞復若新瘥未滿百日而犯房事者不治
