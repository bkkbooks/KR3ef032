body:
  text: 花序上古之人稟天地渾穆之氣以生壽永而無病中古自軒轅氏嘗百草分經絡始知有藥始知有病岐伯氏通脈理辨病因始知有醫聖人懼後世疾痼而不求治則著靈樞素問內經諸書以垂世後人宗之代有名醫各有著論隨時施治無非救世之苦心然而病情多端其變幻叵測而速於死者莫如傷寒一症藥一誤投病不可挽諸名家述傷寒略而不周惟張仲景先生定一百一十三方治分六經可謂該之後學誤以類傷寒作正傷寒治而不分手足無怪乎病之淺者深深者危危者莫救浙西吳坤安先生親炙吳中葉天士薛生白兩先生深探傷寒之秘旨應世三十年凡傷寒一症在經治經杜傳經之漸無論虛實數劑而愈使病者不傷元氣易於痊復仁心妙手聞之耳熟先生安於家不肯輕出余羈職守南朔間隔徒忻慕焉乃弟友石輯先生平日所著書為四卷名之曰傷寒指掌北來就正於余並囑序余讀其自序觀其門類及論症用藥處方分條析理古今來治傷寒之法莫能越其範圍知先生得力於仲景者深矣而前後條辨諸書胥成渣滓余樂為之序以共世也學者獲此卷讀之循序而進以治傷寒分六經之法治雜症無不應手以盡其妙豈獨治傷寒一症哉時嘉慶十有二年歲次丁卯中秋太醫院院使花映墀拜題自序僕少多疾病薄弱無能遂究心於醫以求衛生之道無如質性魯愚醫理深奧會將仲景傷寒反復研求不得其旨用旁索諸家之書以求其理惟準繩彙集諸賢之大成非操明敏之資不能溯流窮源余皆獨抒所見別開徑竇不無與聖訓相悖謬徒滋心中之蠱惑迨觀方中行之條辨喻嘉言之尚論雖彼此互異均可謂獨出新裁發明古訓至掃叔和之偽明仲景之真不使魚目溷珠碔砆亂玉非嘉言慧眼靈心誰能及此更閱柯韻伯之來蘇集王晉三之古方注尤能得仲景之深心重開生面故其發明方義兩賢如出一揆至若辨六日傳經之妄闢三方鼎立之謬改服麻桂於太陽未衄之前移系白散於太陰誤下之後千古疑團一朝打破又謂仲景傷寒已兼六氣六經主病已該雜症非專指傷寒立言柯氏以前孰能指出厥旨金劉河間叔季人也擾攘之世炎火統運見仲景傷寒每詳於寒而略於溫特著醫書四種其直格一書每多發明溫熱之理惜雜於正傷寒內在乎明眼擇取厥後紺珠一書亦宗河間之法但以雙解散用代麻黃桂枝等湯以治傷寒則竟以傷寒為溫熱矣不知仲景麻黃桂枝等湯原治傷寒河間雙解通聖等法原治溫熱兩不相侔不可移易一經倒施禍如反掌嗟乎寒溫之別判若天洲寒溫之治反如冰炭何朦混若此賴周禹載薛生白諸先生出見世之傷寒正病絕少類症殊多寒症絕少熱病殊多恐人誤以傷寒正法施治乃作溫熱暑疫全書濟世夫溫熱暑疫皆熱病也其云傷寒自表達里溫熱自內發外溫病發於少陽熱病發於陽明仲景黃芩湯治少陽溫病白虎湯治陽明熱病並非傷寒之方此真發前人所未發其覺迷救世之功誠非淺鮮近又出傷寒第一書云仲景傷寒治分九州此書專主揚州分野雖其說不足憑信然觀其用藥遠熱投涼以透癍解毒為主亦治溫熱之良法也第求其六淫之治未免寡陋獨葉天士先生所留治案每寓傷寒於六氣之中妙法精義無不畢備其云仲景傷寒先分六經河間溫熱須究三焦此即先生分治寒溫之大法明示人不可以足經之藥混治手經之病只此二語已得傷寒之肯綮奈世人不察反憾葉案無傷寒甚矣傷寒之難明也僕自矜管窺之見一割之能述六經本病一卷變病類病一卷先古法次新法古法悉本準繩金鑑選注來蘇集之註釋新法則參葉案第一書溫熱全書之治焉書成非敢出而問世姑存之以就有道之政云爾時嘉慶元年仲秋吉日苕南吳貞坤安氏識
